<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0284c7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="סמינרים">
<title>התחברות · רישום סמינרים</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/svg+xml" href="./icon-192.svg">
<link rel="apple-touch-icon" href="./icon-192.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: 'Heebo', sans-serif; font-weight: 500;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #f0f9ff, #e0f2fe 60%, #bae6fd);
    background-image:
      linear-gradient(135deg, #f0f9ff, #e0f2fe 60%, #bae6fd),
      repeating-linear-gradient(45deg, transparent 0 10px, rgba(2,132,199,0.04) 10px 11px);
  }
  .card {
    background: white; border-radius: 16px; padding: 40px 48px;
    max-width: 440px; width: 90%;
    box-shadow: 0 10px 40px rgba(2,132,199,0.15);
    text-align: center;
  }
  .logo {
    width: 72px; height: 72px; border-radius: 50%;
    background: linear-gradient(135deg, #0ea5e9, #0284c7);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 36px; margin-bottom: 20px;
    box-shadow: 0 4px 12px rgba(2,132,199,0.3);
  }
  h1 { color: #0c4a6e; margin: 0 0 8px; font-size: 24px; font-weight: 800; }
  .subtitle { color: #64748b; font-size: 14px; margin-bottom: 32px; }
  .google-btn {
    width: 100%; padding: 12px 16px; border: 1px solid #dbe4ef; border-radius: 10px;
    background: white; color: #1a3655; font-weight: 600; font-family: inherit; font-size: 15px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px;
    transition: all 0.15s;
  }
  .google-btn:hover { background: #f0f9ff; border-color: #0ea5e9; box-shadow: 0 2px 8px rgba(2,132,199,0.15); }
  .google-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .google-btn svg { width: 20px; height: 20px; }
  .msg {
    margin-top: 20px; padding: 12px 16px; border-radius: 8px;
    font-size: 14px; display: none;
  }
  .msg.error { background: #fef2f2; color: #b91c1c; border: 1px solid #fca5a5; display: block; }
  .msg.info { background: #f0f9ff; color: #0c4a6e; border: 1px solid #7dd3fc; display: block; }
  .footer { margin-top: 28px; color: #64748b; font-size: 12px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🎓</div>
  <h1>רישום סמינרים</h1>
  <div class="subtitle">התחבר עם חשבון Google שלך</div>

  <button class="google-btn" id="btn_google">
    <svg viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    התחברות עם Google
  </button>

  <div class="msg" id="msg"></div>

  <div class="footer">
    רישום סמינרים · מערכת ניהול
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="./config.js"></script>
<script>
  const sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY);
  const msgEl = document.getElementById('msg');
  const btnGoogle = document.getElementById('btn_google');

  function showMsg(text, kind='info') {
    msgEl.textContent = text;
    msgEl.className = 'msg ' + kind;
  }

  // אם כבר מחובר — הפנה לדף הראשי
  sb.auth.getSession().then(({ data }) => {
    if (data.session) {
      // בדוק שהוא מורשה
      checkProfile(data.session.user);
    }
  });

  async function checkProfile(user) {
    showMsg('בודק הרשאה...', 'info');
    const { data, error } = await sb.from('user_profiles').select('role, is_active')
      .ilike('email', user.email).maybeSingle();
    if (error) {
      showMsg('שגיאה בבדיקת ההרשאה: ' + error.message, 'error');
      return;
    }
    if (!data) {
      await showRequestAccess(user);
      return;
    }
    if (!data.is_active) {
      showMsg('⛔ המשתמש שלך מושבת.\nפנה למנהל המערכת.', 'error');
      await sb.auth.signOut();
      return;
    }
    window.location.href = './index.html';
  }

  async function showRequestAccess(user) {
    // מחפש בקשה ממתינה בלבד — מאושרות/דחויות לא חוסמות הגשה חדשה
    const { data: existing } = await sb.from('access_requests')
      .select('id, status, requested_at')
      .ilike('email', user.email).eq('status', 'pending').maybeSingle();

    if (existing) {
      showMsg(`⏳ בקשתך לגישה הוגשה ב־${String(existing.requested_at).substring(0,10)} וממתינה לאישור מנהל.`, 'info');
      await sb.auth.signOut();
      return;
    }

    const fullName = (user.user_metadata && (user.user_metadata.full_name || user.user_metadata.name)) || '';
    const card = document.querySelector('.card');
    card.innerHTML = `
      <div class="logo">🔐</div>
      <h1>אין לך הרשאה עדיין</h1>
      <div class="subtitle">${user.email}</div>
      <div style="text-align:right; margin: 18px 0; color: #334155; font-size: 14px; line-height: 1.6;">
        המייל שלך לא רשום במערכת. תוכל לבקש גישה — מנהל יקבל את הבקשה, יאשר, ותוכל להיכנס.
      </div>
      <label style="display:block; text-align:right; font-weight:600; margin:10px 0 4px; color:#334155; font-size:13px;">השם שלך:</label>
      <input id="req_name" type="text" value="${String(fullName).replace(/"/g,'&quot;')}" style="width:100%; padding:10px; border:1px solid #dbe4ef; border-radius:8px; font-family:inherit; font-size:14px; text-align:right;">
      <label style="display:block; text-align:right; font-weight:600; margin:12px 0 4px; color:#334155; font-size:13px;">הערה למנהל (אופציונלי):</label>
      <textarea id="req_note" rows="2" style="width:100%; padding:10px; border:1px solid #dbe4ef; border-radius:8px; font-family:inherit; font-size:14px; text-align:right; resize:vertical;"></textarea>
      <div style="display:flex; gap:8px; margin-top:14px;">
        <button id="btn_req_submit" class="google-btn" style="flex:1; background:linear-gradient(135deg,#0ea5e9,#0284c7); color:white; border:none;">שלח בקשה</button>
        <button id="btn_req_cancel" class="google-btn" style="background:#f1f5f9;">ביטול</button>
      </div>
      <div class="msg" id="msg"></div>
    `;

    document.getElementById('btn_req_cancel').addEventListener('click', async () => {
      await sb.auth.signOut();
      location.reload();
    });

    document.getElementById('btn_req_submit').addEventListener('click', async () => {
      const name = document.getElementById('req_name').value.trim();
      const note = document.getElementById('req_note').value.trim();
      const btn = document.getElementById('btn_req_submit');
      btn.disabled = true;
      btn.textContent = 'שולח...';

      const { error } = await sb.from('access_requests').insert({
        email: user.email,
        full_name: name || null,
        notes: note || null,
      });
      if (error) {
        const m = document.getElementById('msg');
        m.textContent = 'שגיאה: ' + error.message;
        m.className = 'msg error';
        btn.disabled = false;
        btn.textContent = 'שלח בקשה';
        return;
      }
      card.innerHTML = `
        <div class="logo">✉️</div>
        <h1>הבקשה נשלחה</h1>
        <div class="subtitle">${user.email}</div>
        <div style="text-align:right; margin: 24px 0; color: #0c4a6e; font-size: 15px; line-height: 1.7;">
          מנהל המערכת יקבל התראה.<br>
          ברגע שתאושר — תוכל להתחבר שוב.
        </div>
      `;
      await sb.auth.signOut();
    });
  }

  btnGoogle.addEventListener('click', async () => {
    btnGoogle.disabled = true;
    showMsg('מעביר לגוגל...', 'info');
    const redirectTo = window.location.origin + window.location.pathname;
    console.log('=== DEBUG: starting OAuth ===');
    console.log('redirectTo:', redirectTo);
    console.log('SUPABASE_URL:', window.SUPABASE_URL);
    console.log('SUPABASE_KEY (first 20 chars):', window.SUPABASE_KEY.substring(0, 20));
    try {
      const result = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo },
      });
      console.log('OAuth result:', result);
      if (result.error) {
        showMsg('שגיאה: ' + result.error.message, 'error');
        btnGoogle.disabled = false;
      } else if (result.data && result.data.url) {
        console.log('Redirecting to:', result.data.url);
        showMsg('מעביר לגוגל... אם לא קורה כלום אחרי 3 שניות — משהו חוסם', 'info');
        // חלק מהדפדפנים מחייבים מעבר ידני
        setTimeout(() => {
          if (document.location.href.indexOf('login.html') !== -1) {
            showMsg('⚠️ לא הועברת לגוגל. בדוק אם יש חוסם פופ־אפים. לחץ כאן: <a href="' + result.data.url + '" target="_self">לעבור ידנית</a>', 'error');
            btnGoogle.disabled = false;
          }
        }, 3000);
      } else {
        showMsg('משהו מוזר — אין שגיאה אבל גם אין redirect. בדוק מסוף.', 'error');
        btnGoogle.disabled = false;
      }
    } catch (e) {
      console.error('Exception:', e);
      showMsg('חריגה: ' + e.message, 'error');
      btnGoogle.disabled = false;
    }
  });
</script>
</body>
</html>
