function applyFilters() {
  const q = document.getElementById('q').value.trim().toLowerCase();
  const fs = FILTER_STATE;
  // יעודכן אחרי הפילטור בתחתית
  const _ = null;

  // מפה של seminar_id → name לחיפוש מהיר בתוך _regs
  const semNameById = {};
  DATA.seminars.forEach(s => { semNameById[s.id] = s.name; });

  // בודק אם ערך בודד תואם לסט — כולל טיפול ב־EMPTY_MARKER
  const matchValue = (set, val) => {
    if (val == null || val === '') return set.has(EMPTY_MARKER);
    return set.has(val);
  };

  VIEW = ROWS.filter(r => {
    if (fs.sector.size && !matchValue(fs.sector, r.sector_bucket)) return false;
    if (fs.placement_seminar.size && !matchValue(fs.placement_seminar, r.placement_seminar)) return false;
    if (fs.placement_status.size  && !matchValue(fs.placement_status, r.placement_status)) return false;

    // קטגוריית מוסד אחים + דגל "אחיות בסמינר"
    if (fs.sibling_categories.size) {
      const SIB_SEM_FLAG = '__אחיות_בסמינר__';
      const hasSpecial = fs.sibling_categories.has(SIB_SEM_FLAG);
      const regularSet = hasSpecial
        ? new Set([...fs.sibling_categories].filter(x => x !== SIB_SEM_FLAG))
        : fs.sibling_categories;

      let matches = false;
      if (regularSet.size) {
        const sibCats = r.sibling_categories || [];
        if (sibCats.length === 0 && regularSet.has(EMPTY_MARKER)) matches = true;
        else if (sibCats.some(c => regularSet.has(c))) matches = true;
      }
      if (hasSpecial && !matches) {
        // לוגיקה חדשה: בודקים האם לבת יש אחות בסמינר ש**היא עצמה** מקושרת אליו
        if (_hasSiblingInGirlSeminar(r)) matches = true;
      }
      if (!matches) return false;
    }

    // סמינרים + תשובות — חוצה־העדפות
    if (fs.any_seminar.size || fs.any_response.size) {
      const regs = r._regs || [];
      // טיפול ב־ריקים: אם רישומים ריקים לגמרי
      if (regs.length === 0) {
        const semOkEmpty = fs.any_seminar.size === 0 || fs.any_seminar.has(EMPTY_MARKER);
        const respOkEmpty = fs.any_response.size === 0 || fs.any_response.has(EMPTY_MARKER);
        if (!(semOkEmpty && respOkEmpty)) return false;
      } else {
        const hit = regs.some(reg => {
          const semName = semNameById[reg.seminar_id] || '';
          const resp = reg.response || '';
          const semOk = fs.any_seminar.size === 0 ||
            (semName ? fs.any_seminar.has(semName) : fs.any_seminar.has(EMPTY_MARKER));
          const respOk = fs.any_response.size === 0 ||
            (resp ? fs.any_response.has(resp) : fs.any_response.has(EMPTY_MARKER));
          return semOk && respOk;
        });
        if (!hit) return false;
      }
    }

    // סינונים פר־עמודה (מהכותרת) — תמיכה בערכי מערך + <ריקים>
    for (const [key, set] of Object.entries(COL_FILTERS)) {
      if (!set || !set.size) continue;
      const col = ALL_COLS.find(c => c.key === key);
      const filterKey = col && col.filterFromKey ? col.filterFromKey : key;
      const val = r[filterKey];
      if (Array.isArray(val)) {
        if (val.length === 0) {
          if (!set.has(EMPTY_MARKER)) return false;
        } else if (!val.some(v => set.has(String(v)))) {
          return false;
        }
      } else {
        if (val == null || val === '') {
          if (!set.has(EMPTY_MARKER)) return false;
        } else if (!set.has(String(val))) {
          return false;
        }
      }
    }

    if (q) {
      const blob = `${r.family_name} ${r.first_name} ${r.national_id} ${r.mother_name||''} ${r.father_name||''} ${r.mother_phone||''} ${r.father_phone||''} ${r.community||''}`.toLowerCase();
      if (!blob.includes(q)) return false;
    }
    return true;
  });
  // sort
  VIEW.sort((a,b) => {
    const av = (a[sortKey]||'').toString();
    const bv = (b[sortKey]||'').toString();
    return av.localeCompare(bv, 'he') * sortDir;
  });
  render();
  updateStats(); // הסטטיסטיקה מתייחסת לעמודה הנבחרת
  if (typeof updateMobileStatsBar === 'function') updateMobileStatsBar();
}

const EMPTY_MARKER = '<ריקים>';
function uniq(arr) { return [...new Set(arr.filter(x => x != null && x !== ''))].sort((a,b)=>String(a).localeCompare(String(b),'he')); }
// מוסיף <ריקים> בראש אם יש ערכים ריקים
function uniqWithEmpty(arr) {
  const values = arr.map(x => (x == null || x === '') ? null : x);
  const hasEmpty = values.some(v => v === null);
  const unique = [...new Set(values.filter(v => v !== null))].sort((a,b)=>String(a).localeCompare(String(b),'he'));
  return hasEmpty ? [EMPTY_MARKER, ...unique] : unique;
}

// מקור ערכים לכל שדה סינון:
//   'any_seminar' — כל שמות הסמינרים מהמסד
//   'any_response' — ENUM_RESPONSE
//   'placement_status' — ENUM_STATUS (רשימת האפשרויות המלאה, לא רק מה שיש)
//   'sector' — ערכים שקיימים בפועל (כולל מורשת)
//   'placement_seminar' — שיבוצים בפועל
function getFilterOptions(field) {
  if (field === 'any_seminar') {
    const names = [...new Set(DATA.seminars.map(s => s.name))].sort((a,b)=>a.localeCompare(b,'he'));
    // <ריקים> אם יש תלמידות בלי אף רישום
    const anyEmpty = ROWS.some(r => !(r._regs || []).length);
    return anyEmpty ? [EMPTY_MARKER, ...names] : names;
  }
  if (field === 'any_response') {
    const anyEmpty = ROWS.some(r => (r._regs || []).some(reg => !reg.response));
    return anyEmpty ? [EMPTY_MARKER, ...ENUM_RESPONSE] : ENUM_RESPONSE;
  }
  if (field === 'placement_status') {
    const anyEmpty = ROWS.some(r => !r.placement_status);
    return anyEmpty ? [EMPTY_MARKER, ...ENUM_STATUS] : ENUM_STATUS;
  }
  if (field === 'sibling_categories') {
    const anyEmpty = ROWS.some(r => !(r.sibling_categories || []).length);
    return anyEmpty ? [EMPTY_MARKER, ...ENUM_INST_CAT] : ENUM_INST_CAT;
  }
  const keyMap = {
    sector: 'sector_bucket',
    placement_seminar: 'placement_seminar',
  };
  return uniqWithEmpty(ROWS.map(r => r[keyMap[field] || field]));
}

function setupMultiSelect(wrap) {
  const field = wrap.dataset.filter;
  const baseLabel = 'הכל';  // תמיד כשאין בחירה מופיע "הכל"; התווית נמצאת מעל
  const btn = wrap.querySelector('.ms-btn');
  const pop = wrap.querySelector('.popover');
  const textEl = btn.querySelector('.text');

  const render = () => {
    const opts = getFilterOptions(field);
    const selected = FILTER_STATE[field];
    // snapshot למקרה של "ביטול" (×)
    const snapshot = new Set(selected);

    // דגל מיוחד — רק לשדה "קטגוריית מוסד אחים"
    const SIB_SEMINAR_FLAG = '__אחיות_בסמינר__';
    const hasSpecial = (field === 'sibling_categories');
    const specialHtml = hasSpecial ? `
      <label style="background:#fffbea; border:1px solid #f0d97b; border-radius:5px; padding:6px 8px; margin-bottom:8px; font-weight:600;">
        <input type="checkbox" value="${SIB_SEMINAR_FLAG}" ${selected.has(SIB_SEMINAR_FLAG) ? 'checked' : ''}>
        🎯 אחיות בסמינר
        <div style="font-weight:400; font-size:11px; color:var(--muted); margin-top:2px;">מציג בנות עם אחות במוסד שהוא אחד הסמינרים. אם נבחר סמינר ספציפי (מ"סמינר" או "שיבוץ") — רק ביחס אליו.</div>
      </label>` : '';

    pop.innerHTML = `
      <div class="actions">
        <button type="button" data-act="all">בחר הכל</button>
        <button type="button" data-act="none">נקה</button>
        <button type="button" class="done" data-act="confirm">אישור</button>
        <button type="button" class="close-x" data-act="cancel" title="ביטול">×</button>
      </div>
      ${specialHtml}
      <input class="search" placeholder="חיפוש...">
      <div class="opts">
        ${opts.map(o => `
          <label><input type="checkbox" value="${String(o).replace(/"/g,'&quot;')}" ${selected.has(o) ? 'checked' : ''}>${o || '(ריק)'}</label>
        `).join('')}
      </div>`;

    // מאזין לכל תיבות הסימון — גם רגילות וגם הדגל המיוחד
    pop.querySelectorAll('input[type="checkbox"]').forEach(cb => {
      cb.addEventListener('change', () => {
        if (cb.checked) selected.add(cb.value); else selected.delete(cb.value);
        updateBtn();
        applyFilters();
      });
    });
    pop.querySelector('[data-act="all"]').addEventListener('click', () => {
      selected.clear();
      opts.forEach(o => selected.add(o));
      pop.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        if (cb.value !== SIB_SEMINAR_FLAG) cb.checked = true;
      });
      updateBtn(); applyFilters();
    });
    pop.querySelector('[data-act="none"]').addEventListener('click', () => {
      selected.clear();
      pop.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
      updateBtn(); applyFilters();
    });
    // "אישור" = סגירה עם השינויים שנשמרו
    pop.querySelector('[data-act="confirm"]').addEventListener('click', () => {
      pop.classList.remove('open');
    });
    // "×" = ביטול — שחזור למצב שלפני פתיחת החלונית
    pop.querySelector('[data-act="cancel"]').addEventListener('click', () => {
      selected.clear();
      snapshot.forEach(v => selected.add(v));
      updateBtn(); applyFilters();
      pop.classList.remove('open');
    });
    pop.querySelector('.search').addEventListener('input', (e) => {
      const q = e.target.value.trim().toLowerCase();
      pop.querySelectorAll('.opts label').forEach(l => {
        l.style.display = l.textContent.toLowerCase().includes(q) ? '' : 'none';
      });
    });
  };

  const updateBtn = () => {
    const n = FILTER_STATE[field].size;
    if (n === 0) {
      textEl.textContent = baseLabel;
      btn.querySelector('.count')?.remove();
    } else {
      const arr = [...FILTER_STATE[field]];
      textEl.textContent = arr.slice(0, 2).map(v => v || '(ריק)').join(', ') + (arr.length > 2 ? '...' : '');
      if (!btn.querySelector('.count')) {
        const s = document.createElement('span');
        s.className = 'count'; btn.appendChild(s);
      }
      btn.querySelector('.count').textContent = n;
    }
  };

  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    // סגור אחרים
    document.querySelectorAll('.popover.open').forEach(p => { if (p !== pop) p.classList.remove('open'); });
    render();
    if (pop.classList.contains('open')) { pop.classList.remove('open'); return; }
    pop.classList.add('open');
    clampPopoverToViewport(pop, btn);
  });

  wrap._updateBtn = updateBtn;
}

function setupAllFilters() {
  document.querySelectorAll('.ms-wrap').forEach(setupMultiSelect);
}

const UNPLACED_VALUES = ['', 'עדיין לא שובץ', 'מקדמת'];

function isUnplaced(r) {
  return !r.placement_seminar || UNPLACED_VALUES.includes(r.placement_seminar);
}

function updateStats() {
  const total = VIEW.length;
  const placed = VIEW.filter(r => !isUnplaced(r)).length;
  const pending = VIEW.filter(r => isUnplaced(r)).length;
  const isFiltered = VIEW.length !== ROWS.length;

  const f = COL_FILTERS.placement_seminar;
  const unplacedActive = f && f.size === UNPLACED_VALUES.length &&
    UNPLACED_VALUES.every(v => f.has(v));
  // placed filter: col filter on placement with ALL non-unplaced values from actual data
  const allPlaceableSeminars = [...new Set(ROWS.map(r => r.placement_seminar).filter(v => v && !UNPLACED_VALUES.includes(v)))];
  const placedActive = f && f.size > 0 && allPlaceableSeminars.length > 0 &&
    allPlaceableSeminars.every(v => f.has(v)) &&
    ![...f].some(v => UNPLACED_VALUES.includes(v));

  document.getElementById('stats').innerHTML = `
    <span class="stat clickable" onclick="resetAllFilters()" title="לחיצה לאיפוס סינון">${isFiltered ? 'מסונן' : 'סה"כ'}: <b>${total}</b>${isFiltered ? ` <span style="color:var(--muted);font-size:11px">מתוך ${ROWS.length}</span>` : ''}</span>
    <span class="stat clickable ${placedActive ? 'active' : ''}" onclick="filterPlaced()" title="לחיצה להצגת רק המשובצות">שובצו: <b>${placed}</b></span>
    <span class="stat clickable ${unplacedActive ? 'active' : ''}" onclick="filterUnplaced()" title="לחיצה להצגת רק הלא משובצות">לא שובצו: <b>${pending}</b></span>
  `;
}

function filterPlaced() {
  // כל הסמינרים שהם לא "לא־משובצות"
  const placed = [...new Set(ROWS.map(r => r.placement_seminar).filter(v => v && !UNPLACED_VALUES.includes(v)))];
  const f = COL_FILTERS.placement_seminar || new Set();
  const isActive = f.size === placed.length && placed.every(v => f.has(v)) &&
    ![...f].some(v => UNPLACED_VALUES.includes(v));
  if (!COL_FILTERS.placement_seminar) COL_FILTERS.placement_seminar = new Set();
  COL_FILTERS.placement_seminar.clear();
  if (!isActive) {
    placed.forEach(v => COL_FILTERS.placement_seminar.add(v));
  }
  renderHeader();
  applyFilters();
}

function filterUnplaced() {
  // אם כבר פעיל — בטל
  const f = COL_FILTERS.placement_seminar || new Set();
  const isActive = f.size === UNPLACED_VALUES.length && UNPLACED_VALUES.every(v => f.has(v));
  if (!COL_FILTERS.placement_seminar) COL_FILTERS.placement_seminar = new Set();
  COL_FILTERS.placement_seminar.clear();
  if (!isActive) {
    UNPLACED_VALUES.forEach(v => COL_FILTERS.placement_seminar.add(v));
  }
  renderHeader();
  applyFilters();
}

function resetAllFilters() {
  document.getElementById('q').value = '';
  Object.values(FILTER_STATE).forEach(s => s.clear());
  Object.keys(COL_FILTERS).forEach(k => COL_FILTERS[k].clear());
  document.querySelectorAll('.ms-wrap').forEach(w => w._updateBtn && w._updateBtn());
  renderHeader();
  applyFilters();
}

let _editing = null; // {td, col, nid, row, originalValue}

function startEdit(td, nid) {
  if (_editing) {
    _finishCurrent(true);
  }
  const key = td.dataset.key;
  const col = COLS.find(c => c.key === key);
  if (!col || !col.edit || col.edit.type === 'readonly') return;

  // בדיקת הרשאה לפי תפקיד
  if (!canEditField(col)) {
    toast('🔒 אין לך הרשאה לערוך שדה זה', 'warn');
    return;
  }

  const row = ROWS.find(r => r.national_id === nid);
  if (!row) return;

  // אזהרות
  if (col.edit.type === 'id') {
    if (!confirm(`⚠️ אתה עומד לשנות את תעודת הזהות של ${row.family_name} ${row.first_name}.\n\nזהו שדה זיהוי קריטי. טעות כאן יכולה לנתק את התלמידה מהרישומים והאחים שלה.\n\nלהמשיך?`)) return;
  } else if (col.edit.warn) {
    if (!confirm(`⚠️ עריכת "${col.label}" של ${row.family_name} ${row.first_name}.\n\nזהו פרט אישי/רגיש. לוודא שהשינוי נכון לפני שמירה.\n\nלהמשיך?`)) return;
  }

  const originalValue = row[key] ?? '';

  // יצירת ה־control
  let control;
  if (col.edit.type === 'enum') {
    control = document.createElement('select');
    const opts = ['<option value=""></option>']
      .concat(col.edit.values.map(v => `<option value="${v}" ${v===originalValue?'selected':''}>${v}</option>`));
    control.innerHTML = opts.join('');
  } else if (col.edit.type === 'seminar') {
    control = document.createElement('select');
    const names = DATA.seminars.map(s => s.name).sort((a,b)=>a.localeCompare(b,'he'));
    const opts = ['<option value=""></option>']
      .concat(names.map(n => `<option value="${n}" ${n===originalValue?'selected':''}>${n}</option>`));
    control.innerHTML = opts.join('');
  } else if (col.edit.type === 'source_school') {
    control = document.createElement('select');
    const names = DATA.source_schools.filter(s => s.gender === 'בנות').map(s => s.name).sort((a,b)=>a.localeCompare(b,'he'));
    const opts = ['<option value=""></option>']
      .concat(names.map(n => `<option value="${n}" ${n===originalValue?'selected':''}>${n}</option>`));
    control.innerHTML = opts.join('');
  } else {
    control = document.createElement('input');
    control.type = 'text';
    control.value = originalValue;
  }

  _editing = { td, col, nid, row, originalValue, control };

  td.classList.add('editing');
  td.innerHTML = '';
  td.appendChild(control);

  // focus אחרי שה־DOM יציב
  requestAnimationFrame(() => {
    try {
      control.focus();
      if (control.tagName === 'INPUT') control.select();
    } catch (e) { console.error('focus failed:', e); }
  });

  // אירועים
  control.addEventListener('blur', () => _finishCurrent(true));
  control.addEventListener('keydown', (e) => {
    if (e.key === 'Enter')  { e.preventDefault(); _finishCurrent(true); }
    if (e.key === 'Escape') { e.preventDefault(); _finishCurrent(false); }
  });
  if (control.tagName === 'SELECT') {
    control.addEventListener('change', () => _finishCurrent(true));
  }
}

async function _finishCurrent(commit) {
  if (!_editing) return;
  const { td, col, row, originalValue, control } = _editing;
  const newValue = commit ? (control.value || null) : null;
  _editing = null;
  td.classList.remove('editing');

  // ללא שינוי — פשוט חזרה לתצוגה
  if (!commit || String(newValue || '') === String(originalValue || '')) {
    td.innerHTML = renderCell(col, row);
    return;
  }

  // שומר
  td.innerHTML = `<span class="save-indicator saving">⏳</span>${renderCell(col, row)}`;
  try {
    await saveEdit(row, col, newValue);
    // audit log
    await auditLog(col.edit.table || 'girls', row.id, 'update',
      { [col.key]: originalValue }, { [col.key]: newValue });

    // undo/redo
    const girlId = row.id;
    const oldVal = originalValue;
    const newVal = newValue;
    pushUndo({
      description: `${col.label}: "${oldVal || ''}" → "${newVal || ''}"`,
      undo: async () => {
        const freshRow = ROWS.find(r => r.id === girlId);
        if (freshRow) {
          await saveEdit(freshRow, col, oldVal);
          await auditLog(col.edit.table || 'girls', girlId, 'undo',
            { [col.key]: newVal }, { [col.key]: oldVal });
        }
      },
      redo: async () => {
        const freshRow = ROWS.find(r => r.id === girlId);
        if (freshRow) {
          await saveEdit(freshRow, col, newVal);
          await auditLog(col.edit.table || 'girls', girlId, 'update',
            { [col.key]: oldVal }, { [col.key]: newVal });
        }
      },
    });

    await refreshRow(row.national_id);
    const updated = ROWS.find(r => r.national_id === row.national_id) || row;
    td.innerHTML = `<span class="save-indicator ok">✓</span>${renderCell(col, updated)}`;
    setTimeout(() => {
      if (td.parentElement) td.innerHTML = renderCell(col, updated);
    }, 1200);
    toast('נשמר ✓');
  } catch (e) {
    console.error('save failed:', e);
    toast('שגיאה בשמירה: ' + (e.message || e), 'warn');
    td.innerHTML = `<span class="save-indicator err">✗</span>${renderCell(col, row)}`;
    setTimeout(() => { td.innerHTML = renderCell(col, row); }, 2500);
  }
}

async function saveEdit(row, col, newValue) {
  const e = col.edit;
  // עריכת "יסודי" — לוקח שם מוסד ומחליף source_school_id
  if (e.type === 'source_school') {
    const school = DATA.source_schools.find(s => s.name === newValue);
    const school_id = school ? school.id : null;
    const { data, error } = await sb.from('girls').update({ source_school_id: school_id }).eq('id', row.id).select();
    if (error) throw error;
    if (!data || data.length === 0) throw new Error('הפעולה נכשלה — ייתכן שאין הרשאה');
    return;
  }
  if (e.table === 'girls') {
    const { data, error } = await sb.from('girls').update({ [e.dbField]: newValue }).eq('id', row.id).select();
    if (error) throw error;
    if (!data || data.length === 0) throw new Error('הפעולה נכשלה — ייתכן שאין הרשאה');
  } else if (e.table === 'registrations') {
    // מוצאים אם יש רישום קיים למפתח (girl_id, preference_order)
    const existing = row._regs.find(r => r.preference_order === e.preference_order);
    if (e.type === 'seminar') {
      const sem = DATA.seminars.find(s => s.name === newValue);
      const seminar_id = sem ? sem.id : null;
      if (existing) {
        const { error } = await sb.from('registrations').update({ seminar_id }).eq('id', existing.id);
        if (error) throw error;
      } else {
        const { error } = await sb.from('registrations').insert({
          girl_id: row.id, seminar_id, preference_order: e.preference_order,
          season_id: CURRENT_SEASON_ID,
        });
        if (error) throw error;
      }
    } else { // enum (response)
      if (existing) {
        const { error } = await sb.from('registrations').update({ [e.dbField]: newValue }).eq('id', existing.id);
        if (error) throw error;
      } else {
        const { error } = await sb.from('registrations').insert({
          girl_id: row.id, preference_order: e.preference_order, [e.dbField]: newValue,
          season_id: CURRENT_SEASON_ID,
        });
        if (error) throw error;
      }
    }
  } else if (e.table === 'placements') {
    const existing = row._plc && row._plc.id ? row._plc : null;
    if (e.type === 'seminar') {
      const sem = DATA.seminars.find(s => s.name === newValue);
      const seminar_id = sem ? sem.id : null;
      if (existing) {
        const { error } = await sb.from('placements').update({ seminar_id }).eq('id', existing.id);
        if (error) throw error;
      } else {
        const { error } = await sb.from('placements').insert({ girl_id: row.id, seminar_id, season_id: CURRENT_SEASON_ID });
        if (error) throw error;
      }
    } else { // enum / text
      if (existing) {
        const { error } = await sb.from('placements').update({ [e.dbField]: newValue }).eq('id', existing.id);
        if (error) throw error;
      } else {
        const { error } = await sb.from('placements').insert({ girl_id: row.id, [e.dbField]: newValue, season_id: CURRENT_SEASON_ID });
        if (error) throw error;
      }
    }
  }
}

async function refreshRow(nid) {
  // שליפה מחודשת של נתוני התלמידה (פשוט — שולף הכל מחדש את הרישומים והשיבוץ שלה)
  const row = ROWS.find(r => r.national_id === nid);
  if (!row) return;
  const [regsRes, plcsRes, girlRes] = await Promise.all([
    sb.from('registrations').select('*').eq('girl_id', row.id),
    sb.from('placements').select('*').eq('girl_id', row.id),
    sb.from('girls').select('*').eq('id', row.id).single(),
  ]);
  // עדכון ב־DATA
  DATA.registrations = DATA.registrations.filter(r => r.girl_id !== row.id).concat(regsRes.data || []);
  DATA.placements    = DATA.placements.filter(p => p.girl_id !== row.id).concat(plcsRes.data || []);
  const gi = DATA.girls.findIndex(g => g.id === row.id);
  if (gi >= 0 && girlRes.data) DATA.girls[gi] = girlRes.data;
  buildRows();
}

let CURRENT_MODAL = null; // { row, pending, isNew, editing }

// מצב פתיחה/סגירה של סקציות במודל — נשמר ב־localStorage
function loadSectionsState() {
  try { return JSON.parse(localStorage.getItem('modal_sections') || '{}'); }
  catch { return {}; }
}
function saveSectionsState(state) {
  localStorage.setItem('modal_sections', JSON.stringify(state));
}
let SECTIONS_STATE = loadSectionsState();

function toggleSection(key) {
  SECTIONS_STATE[key] = !SECTIONS_STATE[key];
  saveSectionsState(SECTIONS_STATE);
  // רענון של הסקציה הספציפית
  const el = document.querySelector(`.form-section[data-section="${key}"]`);
  if (el) {
    el.classList.toggle('collapsed', !!SECTIONS_STATE[key]);
    const ind = el.querySelector('.collapse-ind');
    if (ind) ind.textContent = SECTIONS_STATE[key] ? '+' : '−';
  }
}

function openModal(nid) {
  const r = ROWS.find(x => x.national_id === nid);
  if (!r) return;
  CURRENT_MODAL = { row: r, pending: {}, isNew: false, editing: false };
  renderModalBody();
  document.getElementById('modal').classList.add('open');

function openSidePanel(kind) {
  if (!CURRENT_MODAL || !CURRENT_MODAL.row) return;
  const r = CURRENT_MODAL.row;
  const panel = document.getElementById('side_panel');
  const title = document.getElementById('side_panel_title');
  const body = document.getElementById('side_panel_body');

    title.textContent = `👨‍👩‍👧 אחים/אחיות (${(r.siblings || []).length})`;

    body.innerHTML = '<div id="timeline_container" style="color:var(--muted); padding:8px;">טוען...</div>';
    loadTimelineForGirl(r);
  }
  panel.classList.add('open');
}

function closeSidePanel() {
  document.getElementById('side_panel').classList.remove('open');
}

// =============== Modal sections — siblings + timeline ===============
function _renderSiblingsSection(r) {
  const sibs = r.siblings || [];
  if (!sibs.length) return '<div style="color:var(--muted)">אין רשומות אחים</div>';
  // קישור מוסד → קטגוריה (לפי source_schools)
  const schoolByCode = {};
  const schoolByName = {};
  (DATA.source_schools || []).forEach(s => {
    if (s.institution_code) schoolByCode[s.institution_code] = s;
    if (s.name) schoolByName[s.name] = s;
  });

  // קיבוץ לפי קטגוריה (אם קיימת)
  const grouped = {};
  sibs.forEach(s => {
    const inst = (s.institution_code && schoolByCode[s.institution_code])
              || schoolByName[s.institution_name];
    const cat = (inst && inst.sector) || 'לא מסווג';
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push({ ...s, _gender: inst && inst.gender });
  });

  const cats = Object.keys(grouped).sort();
  return cats.map(cat => {
    const list = grouped[cat];
    return `
      <div style="margin-bottom:14px;">
        <div style="font-weight:600; color:var(--deep); margin-bottom:6px; padding:4px 8px; background:#e0f2fe; border-radius:5px; display:inline-block;">
          ${cat} <span style="color:var(--muted); font-weight:500;">(${list.length})</span>
        </div>
        <table style="width:100%; font-size:13px;">
          <thead><tr><th>שם</th><th>מוסד</th><th>סמל</th><th>כיתה</th><th>מין</th></tr></thead>
          <tbody>
            ${list.slice(0, 50).map(s => `<tr>
              <td>${s.sibling_name || s.raw_text || ''}</td>
              <td>${s.institution_name || ''}</td>
              <td style="color:var(--muted)">${s.institution_code || ''}</td>
              <td>${s.grade || ''}</td>
              <td>${s._gender ? (s._gender === 'בנים' ? '♂' : '♀') : ''}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    `;
  }).join('');
}

async function loadTimelineForGirl(girl) {
  const container = document.getElementById('timeline_container');
  if (!container) return;

  // נאסוף את ה־reg/plc IDs
  const regIds = (girl._regs || []).map(r => r.id).filter(Boolean);
  const plcIds = girl._plc && girl._plc.id ? [girl._plc.id] : [];

  const queries = [
    sb.from('audit_log').select('*').eq('table_name', 'girls').eq('record_id', girl.id),
  ];
  if (regIds.length) {
    queries.push(sb.from('audit_log').select('*').eq('table_name', 'registrations').in('record_id', regIds));
  }
  if (plcIds.length) {
    queries.push(sb.from('audit_log').select('*').eq('table_name', 'placements').in('record_id', plcIds));
  }

  const results = await Promise.all(queries);
  let entries = [];
  results.forEach(r => { if (r.data) entries = entries.concat(r.data); });
  entries.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  entries = entries.slice(0, 30);

  if (!entries.length) {
    container.innerHTML = '<div style="color:var(--muted); padding:8px;">אין שינויים מתועדים</div>';
    return;
  }

  // טעינת שמות משתמשים
  const userIds = [...new Set(entries.map(e => e.user_id).filter(Boolean))];
  const userByUid = {};
  if (userIds.length) {
    const { data: users } = await sb.from('user_profiles').select('id,full_name,email').in('id', userIds);
    (users || []).forEach(u => { userByUid[u.id] = u; });
  }

  const semByID = {};
  (DATA.seminars || []).forEach(s => { semByID[s.id] = s; });

  const dt = (s) => {
    const d = new Date(s);
    return d.toLocaleDateString('he-IL', { day: '2-digit', month: '2-digit', year: '2-digit' }) + ' ' +
           d.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
  };

  const FIELD_LABELS = {
    family_name: 'שם משפחה', first_name: 'שם פרטי', notes: 'הערה',
    sector: 'שיוך', community: 'קהילה',
    address_street: 'רחוב', address_number: 'בית',
    mother_name: 'שם אם', mother_phone: 'טלפון אם',
    father_name: 'שם אב', father_phone: 'טלפון אב', email: 'מייל',
    source_school_id: 'בי״ס מוצא',
    seminar_id: 'סמינר', response: 'תשובה', class_type: 'א-ו',
    preference_order: 'העדפה', status: 'סטטוס', is_final: 'סופי',
  };
  const PREF_LABELS = { pref_1: 'העדפה 1', pref_2: 'העדפה 2', advance: 'מקדמת' };

  const friendlyValue = (key, val) => {
    if (val == null || val === '') return '(ריק)';
    if (key === 'seminar_id') return (semByID[val] || {}).name || `#${val}`;
    if (key === 'source_school_id') {
      const s = (DATA.source_schools || []).find(x => x.id === val);
      return s ? s.name : `#${val}`;
    }
    if (key === 'preference_order') return PREF_LABELS[val] || val;
    if (typeof val === 'boolean') return val ? '✓ כן' : '— לא';
    return String(val);
  };

  container.innerHTML = entries.map(log => {
    const u = userByUid[log.user_id];
    const userName = u ? (u.full_name || u.email) : 'מערכת';
    const oldV = log.old_value || {};
    const newV = log.new_value || {};
    const all = { ...oldV, ...newV };
    const changes = Object.keys(all).filter(k => k !== 'id' && k !== 'season_id' && k !== 'girl_id'
      && JSON.stringify(oldV[k]) !== JSON.stringify(newV[k]));

    let what;
    if (log.action === 'insert') {
      if (log.table_name === 'girls') what = '<b>הוספה למערכת</b>';
      else if (log.table_name === 'registrations') {
        const sem = newV.seminar_id ? semByID[newV.seminar_id] : null;
        what = `<b>הוספת ${PREF_LABELS[newV.preference_order] || 'רישום'}</b>${sem ? ' → ' + sem.name : ''}`;
      } else if (log.table_name === 'placements') {
        const sem = newV.seminar_id ? semByID[newV.seminar_id] : null;
        what = `<b>שיבוץ נוצר</b>${sem ? ' → ' + sem.name : ''}`;
      }
    } else if (log.action === 'delete') {
      what = `<b>מחיקה</b> מ־${log.table_name}`;
    } else {
      const lines = changes.map(k => {
        const label = FIELD_LABELS[k] || k;
        return `<span style="color:#64748b">${label}:</span> ${friendlyValue(k, oldV[k])} → <b>${friendlyValue(k, newV[k])}</b>`;
      });
      what = lines.join(' · ') || '<i>שינוי טכני</i>';
    }

    return `
      <div style="display:grid; grid-template-columns:130px 110px 1fr; gap:10px; padding:8px 10px; border-bottom:1px solid #f1f5f9; font-size:12px; align-items:start;">
        <div style="color:var(--muted)">${dt(log.created_at)}</div>
        <div style="color:var(--deep); font-weight:600">${userName}</div>
        <div>${what}</div>
      </div>
    `;
  }).join('');
}

function openAddModal() {
  CURRENT_MODAL = {
    row: {
      id: null, national_id: '', first_name: '', family_name: '',
      source_school_id: null, sector: '', community: '',
      address_street: '', address_number: '',
      mother_name: '', mother_national_id: '', mother_phone: '',
      father_name: '', father_national_id: '', father_phone: '',
      email: '', notes: '',
      _regs: [], _plc: {}, siblings: [],
    },
    pending: {}, isNew: true, editing: true, // בתוספת — תמיד במצב עריכה
  };
  renderModalBody();
  document.getElementById('modal').classList.add('open');
}

function toggleModalEdit() {
  if (!CURRENT_MODAL) return;
  CURRENT_MODAL.editing = !CURRENT_MODAL.editing;
  renderModalBody();
}

function closeModal() {
  CURRENT_MODAL = null;
  document.getElementById('modal').classList.remove('open');
  closeSidePanel();
}

function _esc(v) { return String(v == null ? '' : v).replace(/"/g, '&quot;'); }

function renderModalBody() {
  if (!CURRENT_MODAL) return;
  const { row: r, isNew, editing } = CURRENT_MODAL;
  // Viewer לעולם לא עורך
  const isViewer = CURRENT_USER && CURRENT_USER.role === 'viewer';
  const editable = (editing || isNew) && !isViewer;
  const isSeminarOnly = CURRENT_USER && CURRENT_USER.role === 'seminar_editor';
  // שדות שמותרים ל־seminar_editor לערוך
  const SEM_FIELDS = new Set([
    'reg_pref_1_seminar', 'reg_pref_1_response', 'reg_pref_1_class',
    'reg_pref_2_seminar', 'reg_pref_2_response', 'reg_pref_2_class',
    'reg_advance_seminar',
    'plc_seminar', 'plc_status', 'plc_is_final',
    'notes',
  ]);

  // helper: שורה עם תווית + שדה
  const fld = (label, key, value, opts = {}) => {
    const { type = 'text', values = null } = opts;
    // seminar_editor — חסום שדות שאינם סמינריים
    const blockedForSeminar = isSeminarOnly && !SEM_FIELDS.has(key);
    const effectiveEditable = editable && !blockedForSeminar;
    if (!effectiveEditable) {
      // בתצוגה — source_school צריך להפוך id לשם
      let displayValue = value;
      if (type === 'source_school' && value) {
        const s = DATA.source_schools.find(x => x.id === value);
        displayValue = s ? `${s.name}${s.institution_code ? ' ('+s.institution_code+')' : ''}` : '—';
      }
      const isEmpty = displayValue == null || displayValue === '' || displayValue === false;
      const display = isEmpty ? '—' :
        (type === 'checkbox' ? (displayValue ? '✓ כן' : '—') : displayValue);
      return `<label>${label}</label><div class="readonly${isEmpty ? ' empty' : ''}">${display}</div>`;
    }
    if (type === 'enum') {
      return `<label>${label}</label>
        <select data-field="${key}">
          <option value=""></option>
          ${values.map(v => `<option value="${_esc(v)}" ${v === value ? 'selected' : ''}>${v}</option>`).join('')}
        </select>`;
    }
    if (type === 'seminar') {
      const names = DATA.seminars.map(s => s.name).sort((a,b)=>a.localeCompare(b,'he'));
      return `<label>${label}</label>
        <select data-field="${key}">
          <option value=""></option>
          ${names.map(n => `<option value="${_esc(n)}" ${n === value ? 'selected' : ''}>${n}</option>`).join('')}
        </select>`;
    }
    if (type === 'source_school') {
      const schools = DATA.source_schools.filter(s => s.gender === 'בנות').sort((a,b)=>a.name.localeCompare(b.name,'he'));
      return `<label>${label}</label>
        <select data-field="${key}">
          <option value=""></option>
          ${schools.map(s => `<option value="${s.id}" ${s.id === value ? 'selected' : ''}>${s.name}${s.institution_code?' ('+s.institution_code+')':''}</option>`).join('')}
        </select>`;
    }
    if (type === 'textarea') {
      return `<label>${label}</label><textarea data-field="${key}" rows="2">${value || ''}</textarea>`;
    }
    if (type === 'checkbox') {
      return `<label>${label}</label>
        <div><input type="checkbox" data-field="${key}" ${value ? 'checked' : ''}></div>`;
    }
    return `<label>${label}</label><input type="text" data-field="${key}" value="${_esc(value)}">`;
  };

  const title = isNew ? '+ תלמידה חדשה' : `${r.family_name || ''} ${r.first_name || ''}`;
  const subtitle = isNew ? 'מלא את הפרטים ולחץ "הוסף"' : `ת.ז ${r.national_id} · ${r.sector_bucket || ''}`;

  // רישומים — 3 סוגים
  const regFor = (order) => (r._regs || []).find(x => x.preference_order === order) || {};
  const p1 = regFor('pref_1'), p2 = regFor('pref_2'), pa = regFor('advance');
  const semNameFromId = (id) => (DATA.seminars.find(s => s.id === id) || {}).name || '';

  // שיבוץ
  const plc = (r._plc && r._plc.girl_id) ? r._plc : {};

  // viewer לא רואה את ה־toggle בכלל
  const editSwitch = (isNew || isViewer) ? '' : `
    <label class="edit-switch ${editing ? 'on' : ''}">
      <input type="checkbox" ${editing ? 'checked' : ''} onchange="toggleModalEdit()">
      ✎ ערוך
    </label>`;

  // helper: יוצר section עם כותרת ניתנת לקיפול
  const section = (key, title, innerHtml) => {
    const collapsed = !!SECTIONS_STATE[key];
    const sign = collapsed ? '+' : '−';
    return `<div class="form-section ${collapsed ? 'collapsed' : ''}" data-section="${key}">
      <h3 onclick="toggleSection('${key}')">
        <span>${title}</span>
        <span class="collapse-ind">${sign}</span>
      </h3>
      <div class="section-body">${innerHtml}</div>
    </div>`;
  };

  // כפתורים ל"אחים" ו"ציר זמן" — פותחים פאנל צידי
  const sideBtns = !isNew ? `
    <div class="modal-side-actions">
      <button class="side-btn" onclick="openSidePanel('siblings')">👨‍👩‍👧 אחים (${(r.siblings || []).length})</button>
      <button class="side-btn" onclick="openSidePanel('timeline')">📅 ציר זמן</button>
    </div>
  ` : '';

  const body = `
    <div class="modal-header">
      <div style="flex:1">
        <h2>${title}</h2>
        <div class="subtitle">${subtitle}</div>
      </div>
      ${sideBtns}
      ${editSwitch}
      <button class="close" onclick="closeModal()" title="סגור">×</button>
    </div>
    <div class="modal-body">
    ${section('personal', 'פרטים אישיים', `
      <div class="form-grid compact">
        ${fld('משפחה', 'family_name', r.family_name)}
        ${fld('שם', 'first_name', r.first_name)}
        ${fld('ת.ז', 'national_id', r.national_id)}
        ${fld('יסודי', 'source_school_id', r.source_school_id, { type: 'source_school' })}
        <label>קבוצה</label><div class="readonly${!r.sector_bucket ? ' empty' : ''}">${r.sector_bucket || '—'}</div>
        ${fld('שיוך', 'sector', r.sector, { type: 'enum', values: ENUM_AFFILIATION })}
        ${fld('קהילה', 'community', r.community)}
        ${fld('רחוב', 'address_street', r.address_street)}
        ${fld('מס\' בית', 'address_number', r.address_number)}
        ${fld('שם אם', 'mother_name', r.mother_name)}
        ${fld('ת.ז אם', 'mother_national_id', r.mother_national_id)}
        ${fld('טלפון אם', 'mother_phone', r.mother_phone)}
        ${fld('שם אב', 'father_name', r.father_name)}
        ${fld('ת.ז אב', 'father_national_id', r.father_national_id)}
        ${fld('טלפון אב', 'father_phone', r.father_phone)}
        ${fld('מייל', 'email', r.email)}
      </div>
    `)}

    ${section('reg_plc', 'רישום ושיבוץ', `
      <div class="form-grid compact">
        ${fld('העדפה 1', 'reg_pref_1_seminar',  semNameFromId(p1.seminar_id), { type: 'seminar' })}
        ${fld('תשובה 1', 'reg_pref_1_response', p1.response,                 { type: 'enum', values: ENUM_RESPONSE })}
        ${fld('א-ו 1',   'reg_pref_1_class',    p1.class_type,               { type: 'enum', values: ENUM_CLASS })}
        ${fld('העדפה 2', 'reg_pref_2_seminar',  semNameFromId(p2.seminar_id), { type: 'seminar' })}
        ${fld('תשובה 2', 'reg_pref_2_response', p2.response,                 { type: 'enum', values: ENUM_RESPONSE })}
        ${fld('א-ו 2',   'reg_pref_2_class',    p2.class_type,               { type: 'enum', values: ENUM_CLASS })}
        ${fld('שיבוץ',   'plc_seminar',  semNameFromId(plc.seminar_id), { type: 'seminar' })}
        ${fld('סטטוס',   'plc_status',   plc.status,                    { type: 'enum', values: ENUM_STATUS })}
        ${fld('סופי',    'plc_is_final', plc.is_final,                  { type: 'checkbox' })}
        ${fld('מקדמת',   'reg_advance_seminar', semNameFromId(pa.seminar_id), { type: 'seminar' })}
      </div>
      <div style="margin-top: 12px;" class="form-grid compact">
        <label>הערה</label>
        ${editable
          ? `<textarea data-field="notes" rows="2" style="grid-column: 2 / -1; width:100%; padding:5px 9px; border:1px solid var(--border); border-radius:6px; font-family:inherit; font-size:13px; background:white; resize:vertical;">${r.notes || ''}</textarea>`
          : `<div class="readonly${!r.notes ? ' empty' : ''}" style="grid-column: 2 / -1; white-space:pre-wrap;">${r.notes || '—'}</div>`}
      </div>
    `)}

    ${editable ? `
      <div class="form-actions">
        ${!isNew && canDeleteGirls() ? '<button class="delete-btn" onclick="confirmDeleteGirl()">🗑 מחק תלמידה</button>' : ''}
        <button class="cancel-btn" onclick="closeModal()">ביטול</button>
        <button class="save-btn" onclick="saveModal()">${isNew ? '+ הוסף תלמידה' : 'שמור שינויים'}</button>
      </div>
    ` : ''}
    </div>
  `;

  document.getElementById('modal_body').innerHTML = body;

  // האזן לשינויים
  document.getElementById('modal_body').querySelectorAll('[data-field]').forEach(el => {
    const onChange = () => {
      const key = el.dataset.field;
      const val = el.type === 'checkbox' ? el.checked
        : (el.value === '' ? null : el.value);
      CURRENT_MODAL.pending[key] = val;
    };
    el.addEventListener('input', onChange);
    el.addEventListener('change', onChange);
  });
}

async function saveModal() {
  if (!CURRENT_MODAL) return;
  const { row: r, pending, isNew } = CURRENT_MODAL;

  if (Object.keys(pending).length === 0 && !isNew) {
    toast('אין שינויים לשמור');
    closeModal();
    return;
  }

  // אימות ת.ז — אם השתנתה (או חדשה), בודקים תקינות. רק אזהרה, לא חסימה
  const idsToCheck = [
    { key: 'national_id', label: 'ת.ז התלמידה' },
    { key: 'mother_national_id', label: 'ת.ז האם' },
    { key: 'father_national_id', label: 'ת.ז האב' },
  ];
  for (const f of idsToCheck) {
    if (pending[f.key] !== undefined && pending[f.key]) {
      if (!isValidIsraeliId(pending[f.key])) {
        if (!confirm(`⚠️ ${f.label} "${pending[f.key]}" אינה תקינה לפי ספרת הביקורת.\n\nלשמור בכל זאת? (למשל אם זה תושב חוץ)`)) return;
        break;  // נשאל פעם אחת בלבד
      }
    }
  }

  try {
    if (isNew) {
      await _createNewGirl(pending);
    } else {
      await _applyModalChanges(r, pending);
    }
    toast(isNew ? 'תלמידה נוספה ✓' : 'נשמר ✓');
    // רענון מלא (הכי פשוט)
    await reloadData();
    closeModal();
  } catch (e) {
    console.error(e);
    toast('שגיאה: ' + (e.message || e), 'warn');
  }
}

async function _createNewGirl(pending) {
  if (!pending.national_id || !pending.first_name || !pending.family_name) {
    throw new Error('חובה למלא: ת.ז, שם, משפחה');
  }
  // girls insert
  const girlFields = ['national_id','first_name','family_name','source_school_id','sector','community','address_street','address_number','mother_name','mother_national_id','mother_phone','father_name','father_national_id','father_phone','email','notes'];
  const girlRow = {};
  girlFields.forEach(k => {
    if (pending[k] !== undefined) girlRow[k] = pending[k];
  });
  girlRow.season_id = CURRENT_SEASON_ID;
  const { data: newGirl, error } = await sb.from('girls').insert(girlRow).select().single();
  if (error) throw error;
  // אם יש רישומים/שיבוצים ב־pending — נוסיף גם
  await _saveRegAndPlacement(newGirl.id, pending);
  await auditLog('girls', newGirl.id, 'insert', null, girlRow);
}

async function _applyModalChanges(row, pending) {
  // עדכוני girls
  const girlUpdate = {};
  ['national_id','first_name','family_name','source_school_id','sector','community','address_street','address_number','mother_name','mother_national_id','mother_phone','father_name','father_national_id','father_phone','email','notes'].forEach(k => {
    if (pending[k] !== undefined) girlUpdate[k] = pending[k];
  });
  const oldValues = {};
  Object.keys(girlUpdate).forEach(k => { oldValues[k] = row[k]; });

  if (Object.keys(girlUpdate).length > 0) {
    const { error } = await sb.from('girls').update(girlUpdate).eq('id', row.id);
    if (error) throw error;
    await auditLog('girls', row.id, 'update', oldValues, girlUpdate);
  }

  await _saveRegAndPlacement(row.id, pending, row);
}

async function _saveRegAndPlacement(girl_id, pending, oldRow = null) {
  const semIdByName = (n) => (DATA.seminars.find(s => s.name === n) || {}).id || null;

  // רישומים
  for (const order of ['pref_1', 'pref_2', 'advance']) {
    const semKey = `reg_${order}_seminar`;
    const respKey = `reg_${order}_response`;
    const classKey = `reg_${order}_class`;
    const touched = [semKey, respKey, classKey].some(k => pending[k] !== undefined);
    if (!touched) continue;

    const existing = oldRow ? (oldRow._regs || []).find(r => r.preference_order === order) : null;
    const payload = { girl_id, preference_order: order };
    if (pending[semKey] !== undefined) payload.seminar_id = semIdByName(pending[semKey]);
    if (pending[respKey] !== undefined) payload.response = pending[respKey];
    if (pending[classKey] !== undefined) payload.class_type = pending[classKey];

    if (existing) {
      const upd = {};
      if ('seminar_id' in payload) upd.seminar_id = payload.seminar_id;
      if ('response' in payload)   upd.response = payload.response;
      if ('class_type' in payload) upd.class_type = payload.class_type;
      const { error } = await sb.from('registrations').update(upd).eq('id', existing.id);
      if (error) throw error;
    } else {
      payload.season_id = CURRENT_SEASON_ID;
      const { error } = await sb.from('registrations').insert(payload);
      if (error) throw error;
    }
  }

  // שיבוץ
  const plcKeys = ['plc_seminar','plc_status','plc_is_final','plc_notes'];
  if (plcKeys.some(k => pending[k] !== undefined)) {
    const existing = oldRow && oldRow._plc && oldRow._plc.girl_id ? oldRow._plc : null;
    const payload = { girl_id };
    if (pending.plc_seminar !== undefined)  payload.seminar_id = semIdByName(pending.plc_seminar);
    if (pending.plc_status !== undefined)   payload.status = pending.plc_status;
    if (pending.plc_is_final !== undefined) payload.is_final = !!pending.plc_is_final;
    if (pending.plc_notes !== undefined)    payload.notes = pending.plc_notes;

    if (existing) {
      const upd = { ...payload };
      delete upd.girl_id;
      const { error } = await sb.from('placements').update(upd).eq('id', existing.id);
      if (error) throw error;
    } else {
      payload.season_id = CURRENT_SEASON_ID;
      const { error } = await sb.from('placements').insert(payload);

// =============== Presence — מי מחובר כעת ===============
let _presenceChannel = null;
let _onlineUsers = {};  // user_id → { email, full_name, online_at }

function subscribePresence() {
  if (!CURRENT_USER) return;
  _presenceChannel = sb.channel('online-users', {
    config: { presence: { key: CURRENT_USER.id || CURRENT_USER.email } }
  });

  _presenceChannel
    .on('presence', { event: 'sync' }, () => {
      const state = _presenceChannel.presenceState();
      _onlineUsers = {};
      Object.entries(state).forEach(([key, presences]) => {
        if (presences && presences.length) {
          _onlineUsers[key] = presences[presences.length - 1];
        }
      });
      // עדכון UI אם פתוח (מסך משתמשים)
      const onlineBox = document.getElementById('online_users_box');
      if (onlineBox) renderOnlineUsersBox(onlineBox);
      // עדכון ה־badge בכותרת
      updateOnlineCountPill();
    })
    .subscribe(async (status) => {
      if (status === 'SUBSCRIBED') {
        await _presenceChannel.track({
          user_id: CURRENT_USER.id,
          email: CURRENT_USER.email,
          full_name: CURRENT_USER.full_name,
          role: CURRENT_USER.role,
          online_at: new Date().toISOString(),
        });
      }
    });
}

function updateOnlineCountPill() {
  const pill = document.getElementById('online_count_pill');
  if (!pill) return;
  if (!isAdmin()) { pill.style.display = 'none'; return; }
  const count = Object.keys(_onlineUsers).length;
  pill.style.display = count > 0 ? '' : 'none';
  pill.querySelector('.online-count-num').textContent = count;
  // tooltip — שמות
  const names = Object.values(_onlineUsers).map(u => u.full_name || u.email).join('\n');
  pill.title = `מחוברים כעת:\n${names}`;
  // לחיצה → פותחת מסך הרשאות
  pill.onclick = () => openManageUsers();
}

function renderOnlineUsersBox(container) {
  const list = Object.values(_onlineUsers);
  if (!list.length) {
    container.innerHTML = '<span style="color:var(--muted); font-size:12px;">טוען...</span>';
    return;
  }
  container.innerHTML = list.map(u => {
    const initial = (u.full_name || u.email || '?').trim().charAt(0).toUpperCase();
    return `
      <span class="online-user-pill" title="${u.email}">
        <span class="online-dot"></span>
        <span class="online-initial">${initial}</span>
        <span class="online-name">${u.full_name || u.email}</span>
      </span>
    `;
  }).join('');
}

// הרשמה ל־Realtime: כל שינוי בטבלאות מרענן את הנתונים
function subscribeRealtime() {
  let reloadTimer = null;
  const schedule = () => {
    clearTimeout(reloadTimer);
    reloadTimer = setTimeout(() => reloadData(), 800);  // debounce
  };
  sb.channel('data-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'girls' }, schedule)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'registrations' }, schedule)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'placements' }, schedule)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'siblings' }, schedule)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'saved_views' }, () => {
      loadSavedViewsFromDB();  // עדכון cache ברגע ששינויי עברו
    })
    .subscribe();
}

async function auditLog(table_name, record_id, action, old_value, new_value) {
  try {
    await sb.from('audit_log').insert({
      table_name, record_id, action,
      old_value: old_value ? JSON.parse(JSON.stringify(old_value)) : null,
      new_value: new_value ? JSON.parse(JSON.stringify(new_value)) : null,
      user_id: CURRENT_USER && CURRENT_USER.id ? CURRENT_USER.id : null,
      season_id: CURRENT_SEASON_ID,
    });
  } catch (e) {

}

// ============================================================
// Undo / Redo (session-only)
// ============================================================
const UNDO_STACK = [];
const REDO_STACK = [];

function pushUndo(op) {
  UNDO_STACK.push(op);
  REDO_STACK.length = 0;
  updateUndoButtons();
}

function updateUndoButtons() {
  const u = !UNDO_STACK.length, r = !REDO_STACK.length;
  document.getElementById('btn_undo').disabled = u;
  document.getElementById('btn_redo').disabled = r;
  const mbU = document.getElementById('mb_undo');
  const mbR = document.getElementById('mb_redo');
  if (mbU) mbU.disabled = u;
  if (mbR) mbR.disabled = r;
}

async function doUndo() {
  if (!UNDO_STACK.length) return;
  const op = UNDO_STACK.pop();
  try {
    await op.undo();
    REDO_STACK.push(op);
    toast('בוטל: ' + op.description);
    await reloadData();
  } catch (e) {
    console.error(e);
    toast('ביטול נכשל: ' + (e.message || e), 'warn');
    UNDO_STACK.push(op); // החזר
  }
  updateUndoButtons();
}

// ביטול רשומת audit_log ספציפית — שיחזור הערכים הישנים
async function undoAuditEntry(logId) {
  const { data: log, error } = await sb.from('audit_log').select('*').eq('id', logId).single();
  if (error || !log) { toast('שגיאה בטעינת הרשומה', 'warn'); return; }
  if (log.action !== 'update' || !log.old_value || !log.new_value) {
    toast('לא ניתן לבטל סוג פעולה זה', 'warn'); return;
  }
  // מציג למשתמש מה הולך לקרות
  const fields = Object.keys(log.old_value).filter(k => JSON.stringify(log.old_value[k]) !== JSON.stringify(log.new_value[k]));
  const summary = fields.map(k => `  ${k}: ${log.new_value[k]} → ${log.old_value[k]}`).join('\n');
  if (!confirm(`לבטל את הפעולה?\n\nישוחזרו הערכים הישנים:\n${summary}`)) return;

  try {
    // בנה payload להחזרה
    const restore = {};
    fields.forEach(k => { restore[k] = log.old_value[k]; });
    const { error: upErr } = await sb.from(log.table_name).update(restore).eq('id', log.record_id);
    if (upErr) throw upErr;
    // רישום audit להחזרה
    await auditLog(log.table_name, log.record_id, 'undo', log.new_value, log.old_value);
    toast('הפעולה בוטלה ✓');
    await reloadData();
    showHistory();  // רענון הפיד
  } catch (e) {
    console.error(e);
    toast('ביטול נכשל: ' + (e.message || e), 'warn');
  }
}

async function doRedo() {
  if (!REDO_STACK.length) return;
  const op = REDO_STACK.pop();
  try {
    await op.redo();
    UNDO_STACK.push(op);
    toast('בוצע שוב: ' + op.description);
    await reloadData();
  } catch (e) {
    console.error(e);
    toast('ביצוע נכשל: ' + (e.message || e), 'warn');
    REDO_STACK.push(op);
  }
  updateUndoButtons();
}

async function _bulkApply(girls, fn) {

  for (const r of girls) {

      await fn(r.id);

      console.error(e);
      fail++;
    }

  BULK_SELECTED.clear();
  await reloadData();
  updateBulkBar();
  if (fail) toast(`✓ ${ok} עודכנו, ${fail} נכשלו`, 'warn');

// פופאפ קטן לבחירת ערך — תומך גם בערך ריק
function _bulkChoosePopup(title, options, allowEmpty) {
  return new Promise((resolve) => {
    const existing = document.getElementById('bulk_choose_pop');
    if (existing) { existing.remove(); document.getElementById('bulk_choose_scrim')?.remove(); }
    const scrim = document.createElement('div');
    scrim.id = 'bulk_choose_scrim';
    scrim.style.cssText = 'position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:2100;';
    const pop = document.createElement('div');
    pop.id = 'bulk_choose_pop';
    pop.style.cssText = 'position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; border-radius:12px; padding:18px; box-shadow:0 12px 32px rgba(0,0,0,0.25); z-index:2101; min-width:320px; max-width:90vw; max-height:80vh; overflow-y:auto;';
    pop.innerHTML = `
      <div style="font-weight:700; color:var(--deep); margin-bottom:12px; font-size:15px;">${title}</div>
      <select id="bulk_choose_select" style="width:100%; padding:10px; border:1px solid var(--border); border-radius:6px; font-family:inherit; font-size:14px;">
        ${allowEmpty ? '<option value="">(ריק)</option>' : ''}
        ${options.map(o => `<option value="${_esc(o)}">${o}</option>`).join('')}
      </select>
      <div style="display:flex; gap:8px; margin-top:14px;">
        <button class="apply-big" id="bulk_choose_ok" style="flex:1;">אישור</button>
        <button class="cancel-btn" id="bulk_choose_cancel" style="flex:0 0 auto; padding:10px 16px;">ביטול</button>
      </div>
    `;
    scrim.onclick = () => { pop.remove(); scrim.remove(); resolve(null); };
    document.body.appendChild(scrim);
    document.body.appendChild(pop);
    pop.querySelector('#bulk_choose_ok').onclick = () => {
      const v = pop.querySelector('#bulk_choose_select').value;
      pop.remove(); scrim.remove();
      resolve(v);
    };
    pop.querySelector('#bulk_choose_cancel').onclick = () => {
      pop.remove(); scrim.remove();
      resolve(null);
    };
  });
}

// =============== Kanban ===============
const KANBAN_NO_STATUS = '__nostatus__';

function renderKanban() {
  const statuses = ENUM_STATUS.slice();
  // ארגון: בנות לפי placement_status
  const byStatus = {};
  statuses.forEach(s => byStatus[s] = []);
  byStatus[KANBAN_NO_STATUS] = [];
  VIEW.forEach(r => {
    const s = r.placement_status;
    if (s && byStatus[s]) byStatus[s].push(r);
    else byStatus[KANBAN_NO_STATUS].push(r);
  });

  const orderedCols = [KANBAN_NO_STATUS, ...statuses];
  const colLabels = { [KANBAN_NO_STATUS]: 'ללא סטטוס' };

  const board = document.getElementById('kanban_board');
  board.innerHTML = orderedCols.map(s => {
    const items = byStatus[s] || [];
    const label = colLabels[s] || s;
    return `
      <div class="kanban-col" data-status="${_esc(s)}">
        <h3><span>${label}</span><span class="count">${items.length}</span></h3>
        <div class="cards">
          ${items.map(r => `
            <div class="kanban-card" draggable="true" data-nid="${r.national_id}">
              <div class="name">${[r.family_name, r.first_name].filter(Boolean).join(' ')}</div>
              <div class="meta">${r.sector_bucket || ''} · ${r.source_school_name || ''}</div>
              ${r.placement_seminar ? `<div class="placement">📍 ${r.placement_seminar}</div>` : ''}
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');

  // עדכון מידע
  document.getElementById('kanban_info').textContent = `${VIEW.length} תלמידות מוצגות`;

  // Drag & drop
  let draggedNid = null;
  board.querySelectorAll('.kanban-card').forEach(card => {
    card.addEventListener('dragstart', (e) => {
      draggedNid = card.dataset.nid;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => card.classList.remove('dragging'));
    // לחיצה — פתח מודל
    card.addEventListener('click', () => {
      const row = ROWS.find(r => r.national_id === card.dataset.nid);
      if (row) openEditModal(row);
    });
  });
  board.querySelectorAll('.kanban-col').forEach(col => {
    col.addEventListener('dragover', (e) => { e.preventDefault(); col.classList.add('drag-over'); });
    col.addEventListener('dragleave', () => col.classList.remove('drag-over'));
    col.addEventListener('drop', async (e) => {
      e.preventDefault();
      col.classList.remove('drag-over');
      if (!draggedNid) return;
      const newStatus = col.dataset.status === KANBAN_NO_STATUS ? null : col.dataset.status;
      const row = ROWS.find(r => r.national_id === draggedNid);
      const nid = draggedNid;
      draggedNid = null;
      if (!row) return;
      const oldStatus = row.placement_status || null;
      if (oldStatus === newStatus) return;
      // אישור
      const girlName = [row.family_name, row.first_name].filter(Boolean).join(' ');
      const fromLabel = oldStatus || 'ללא סטטוס';
      const toLabel = newStatus || 'ללא סטטוס';
      if (!confirm(`לשנות את הסטטוס של ${girlName}\n\nמ־"${fromLabel}" ל־"${toLabel}"?`)) {
        return;
      }
      try {
        await updateGirlPlacementStatus(row, newStatus);
        // push undo
        const girlId = row.id;
        pushUndo({
          description: `סטטוס של ${girlName}: "${fromLabel}" → "${toLabel}"`,
          undo: async () => {
            const fresh = ROWS.find(r => r.id === girlId);
            if (fresh) await updateGirlPlacementStatus(fresh, oldStatus);
          },
          redo: async () => {
            const fresh = ROWS.find(r => r.id === girlId);
            if (fresh) await updateGirlPlacementStatus(fresh, newStatus);
          },
        });
        toast('סטטוס עודכן ✓');
        await reloadData();
        renderKanban();
      } catch (err) {
        toast('שגיאה: ' + err.message, 'warn');
      }
    });
  });
}

async function updateGirlPlacementStatus(row, newStatus) {
  if (!canEditSeminarData()) throw new Error('אין לך הרשאה לערוך');
  const existing = row._plc && row._plc.id ? row._plc : null;
  if (existing) {
    const { error } = await sb.from('placements').update({ status: newStatus }).eq('id', existing.id);
    if (error) throw error;
    await auditLog('placements', existing.id, 'update', { status: existing.status }, { status: newStatus });
  } else {
    const { data, error } = await sb.from('placements').insert({
      girl_id: row.id, status: newStatus, season_id: CURRENT_SEASON_ID
    }).select().single();
    if (error) throw error;
    await auditLog('placements', data.id, 'insert', null, { girl_id: row.id, status: newStatus });
  }
}

if (window.ChartDataLabels) Chart.register(window.ChartDataLabels);

// פלאגין מותאם — מצייר קווים מהפלח לתווית
const calloutLinesPlugin = {
  id: 'calloutLines',
  afterDatasetDraw(chart, args) {
    if (chart.config.type !== 'doughnut' && chart.config.type !== 'pie') return;
    const { ctx } = chart;
    const dataset = chart.data.datasets[args.index];
    const meta = chart.getDatasetMeta(args.index);
    const total = dataset.data.reduce((a, b) => a + b, 0);
    if (!total) return;

    ctx.save();
    ctx.strokeStyle = '#94a3b8';
    ctx.lineWidth = 1;

    meta.data.forEach((arc, i) => {
      const value = dataset.data[i];
      if ((value / total) < 0.03) return;  // תואם לסף של התוויות
      const mid = (arc.startAngle + arc.endAngle) / 2;
      const outerR = arc.outerRadius;
      const cx = arc.x, cy = arc.y;
      const x1 = cx + Math.cos(mid) * outerR;
      const y1 = cy + Math.sin(mid) * outerR;
      const x2 = cx + Math.cos(mid) * (outerR + 8);
      const y2 = cy + Math.sin(mid) * (outerR + 8);
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    });
    ctx.restore();
  },
};

function renderPlacementChart() {
  const canvas = document.getElementById('chart_placements');
  if (DASH.chart) { DASH.chart.destroy(); DASH.chart = null; }

  const placed = DASH.data.filter(r => r.placement_seminar && !['עדיין לא שובץ','מקדמת',''].includes(r.placement_seminar));
  const total = placed.length;

  if (!DASH.sectorBreakdown) {
    // ===== עוגה: שיבוצים לפי סמינר =====
    const grouped = {};
    placed.forEach(r => { grouped[r.placement_seminar] = (grouped[r.placement_seminar] || 0) + 1; });
    const entries = Object.entries(grouped).sort((a, b) => b[1] - a[1]);
    const labels = entries.map(e => e[0]);
    const counts = entries.map(e => e[1]);
    const colors = labels.map((_, i) => DASH_COLORS[i % DASH_COLORS.length]);

    const isMobile = window.innerWidth <= 500;

    DASH.chart = new Chart(canvas, {
      type: 'doughnut',
      data: {
        labels,
        datasets: [{ data: counts, backgroundColor: colors, borderWidth: 2, borderColor: 'white' }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        layout: isMobile
          ? { padding: { top: 6, bottom: 6, left: 6, right: 6 } }
          : { padding: { top: 6, bottom: 45, left: 40, right: 40 } },
        plugins: {
          legend: {
            position: isMobile ? 'bottom' : 'left',
            labels: { font: { family: 'Heebo', size: isMobile ? 10 : 11 }, boxWidth: 10, padding: 4 },
          },
          tooltip: {
            callbacks: {
              label: (ctx) => `${ctx.label}: ${ctx.parsed} (${Math.round(100 * ctx.parsed / total)}%)`,
            },
            bodyFont: { family: 'Heebo' }, titleFont: { family: 'Heebo' },
          },
          datalabels: {
            // במובייל — מסתיר תוויות חיצוניות לגמרי (יותר מדי חפיפות)
            display: isMobile
              ? false
              : (ctx) => (ctx.dataset.data[ctx.dataIndex] / total) >= 0.03,
            clip: false,
            anchor: 'end',
            align: 'end',
            offset: 10,
            color: '#1a3655',
            font: { family: 'Heebo', size: 10, weight: 600 },
            textAlign: 'center',
            formatter: (value, ctx) => `${ctx.chart.data.labels[ctx.dataIndex]}\n${value}`,
          },
        },
        onClick: (evt, els) => {
          if (els.length) {
            DASH.selectedSeminar = labels[els[0].index];
            renderDetailsPanel();
          }
        },
      },
      plugins: [calloutLinesPlugin],
    });
  } else {
    // ===== חלוקה למגזר — עמודות אופקיות מוערמות =====
    // כולל fallback "אחר" לסקטור ריק/אחר כדי לא להחמיץ סמינרים
    const AFFIL_CHART = ['חסידי', 'ליטאי', 'ספרדי', 'אחר'];
    const grouped = {};
    placed.forEach(r => {
      const sem = r.placement_seminar;
      const affil = AFFIL_3.includes(r.sector) ? r.sector : 'אחר';
      if (!grouped[sem]) grouped[sem] = {};
      grouped[sem][affil] = (grouped[sem][affil] || 0) + 1;
    });
    const seminarsSorted = Object.keys(grouped).sort((a, b) => {
      const sumA = Object.values(grouped[a]).reduce((x,y)=>x+y,0);
      const sumB = Object.values(grouped[b]).reduce((x,y)=>x+y,0);
      return sumB - sumA;
    });
    const datasets = AFFIL_CHART.map(aff => ({
      label: aff,
      backgroundColor: sectorColor(aff),
      data: seminarsSorted.map(sem => grouped[sem][aff] || 0),
    }));

    DASH.chart = new Chart(canvas, {
      type: 'bar',
      data: { labels: seminarsSorted, datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        indexAxis: 'y',
        interaction: { mode: 'index', axis: 'y' },  // ריחוף = כל השורה יחד
        scales: {
          x: { stacked: true, ticks: { font: { family: 'Heebo' } } },
          y: { stacked: true, ticks: { font: { family: 'Heebo', size: 11 }, autoSkip: false } },
        },
        plugins: {

          tooltip: {
            callbacks: {
              label: (ctx) => {
                const total = ctx.chart.data.datasets.reduce((s, d) => s + (d.data[ctx.dataIndex] || 0), 0);
                const pct = total ? Math.round(100 * ctx.parsed.x / total) : 0;
                return `${ctx.dataset.label}: ${ctx.parsed.x} (${pct}%)`;
              },
            },
            bodyFont: { family: 'Heebo' }, titleFont: { family: 'Heebo' },

// קליק על שורה בפאנל הדשבורד → חוזר לטבלה עם פילטר חדש (מחליף את כל הקיימים)
function dashDrillDown(metric) {
  const allSemNames = (DATA.seminars || []).map(s => s.name).filter(Boolean);
  const fs = FILTER_STATE;
  // מנקה את כל הפילטרים הקיימים — הסינון החדש מחליף הכל
  Object.values(fs).forEach(set => set.clear());
  Object.keys(COL_FILTERS).forEach(k => COL_FILTERS[k].clear());
  document.getElementById('q').value = '';
  // אם בחרת בעוגה סמינר ספציפי — שומרים את ההקשר הזה
  const selectedSem = DASH.selectedSeminar;

  switch (metric) {
    case 'registered':
      // בנות שיש להן רישום בכלשהי מההעדפות → any_seminar = הכל (לא ריק)
      if (selectedSem) {
        fs.any_seminar.add(selectedSem);
      } else {
        allSemNames.forEach(n => fs.any_seminar.add(n));
      }
      break;
    case 'pref1':
      if (selectedSem) {
        fs.any_seminar.add(selectedSem);
      } else {
        allSemNames.forEach(n => fs.any_seminar.add(n));
      }
      break;
    case 'positive':
      fs.any_response.add('חיובי');
      if (selectedSem) fs.placement_seminar.add(selectedSem);
      break;
    case 'placed':
      if (selectedSem) {
        fs.placement_seminar.add(selectedSem);
      } else {
        allSemNames.forEach(n => fs.placement_seminar.add(n));
      }
      break;
    case 'muni':
      ENUM_STATUS.filter(s => s !== 'חיובי' && s !== 'תושב חוץ')
        .forEach(s => fs.placement_status.add(s));
      if (selectedSem) fs.placement_seminar.add(selectedSem);
      break;
    case 'sisters':
      fs.sibling_categories.add('__אחיות_בסמינר__');
      if (selectedSem) fs.placement_seminar.add(selectedSem);
      break;
  }
  // עדכון תגיות הפילטרים החזותיות
  document.querySelectorAll('.ms-wrap').forEach(w => w._updateBtn && w._updateBtn());
  // מעבר לטבלה
  switchView('table');
  applyFilters();
  toast('פילטר הוחל ✓');
}

function renderDetailsPanel() {
  const title = document.getElementById('details_title');
  const body = document.getElementById('details_body');
  const resetBtn = document.getElementById('btn_reset_details');

  const data = DASH.data;
  const sem = DASH.selectedSeminar;
  title.textContent = sem ? sem : 'סה"כ כל הסמינרים';
  resetBtn.style.display = sem ? '' : 'none';

  let metrics;
  if (!sem) {
    // סיכום כללי: כל הסמינרים יחד
    metrics = computeAggregateMetrics(data);
  } else {
    metrics = computeSeminarMetrics(data, sem);
  }

  // פורמט תצוגה
  const renderBars = (dict, total) => {
    const entries = Object.entries(dict).sort((a,b)=>b[1]-a[1]);
    if (!entries.length) return '<div style="font-size:12px; color:var(--muted);">אין נתונים</div>';
    return entries.map(([s, c]) => {
      const pct = total ? Math.round(100 * c / total) : 0;
      return `<div class="bar-row">
        <span class="b-label" style="color:${sectorColor(s)};" title="${s}">${displayName(s)}</span>
        <span class="b-track"><span class="b-fill" style="width:${pct}%; background:${sectorColor(s)};"></span></span>
        <span class="b-val">${c} · ${pct}%</span>
      </div>`;
    }).join('');
  };

  body.innerHTML = `
    <div class="item clickable" data-print-key="stat_registered" onclick="dashDrillDown('registered')"><span>נרשמות</span><b>${metrics.registered.toLocaleString('he-IL')}</b></div>
    <div class="item clickable" data-print-key="stat_pref1" onclick="dashDrillDown('pref1')"><span>בחרו בהעדפה 1</span><b>${metrics.pref1.toLocaleString('he-IL')}</b></div>
    <div class="item clickable" data-print-key="stat_positive" onclick="dashDrillDown('positive')"><span>תשובה חיובי</span><b>${metrics.positive.toLocaleString('he-IL')}</b></div>
    <div class="item clickable" data-print-key="stat_placed" onclick="dashDrillDown('placed')"><span>משובצות</span><b>${metrics.placed.toLocaleString('he-IL')}</b></div>
    <div class="item clickable" data-print-key="stat_muni" onclick="dashDrillDown('muni')"><span>משיבוץ עיריה</span><b>${metrics.muni.toLocaleString('he-IL')}</b></div>
    <div class="item clickable" data-print-key="stat_sisters" onclick="dashDrillDown('sisters')"><span>אחיות באותו מוסד</span><b>${metrics.sisters.toLocaleString('he-IL')}</b></div>

    <div class="splits-row" data-print-key="splits_row">
      <div class="sector-split" data-print-key="split_sectors">
        <div class="title">חלוקה לקבוצות</div>
        ${renderBars(metrics.sectors, metrics.placed)}
      </div>
      <div class="sector-split" data-print-key="split_affiliations" style="background:#fdf4ff;">
        <div class="title" style="color:#7c2d92;">חלוקה למגזר</div>
        ${renderBars(metrics.affiliations, metrics.placed)}
      </div>
    </div>
  `;
}

// helper: קודי סמינר של בת — לפי כל ההעדפות + שיבוץ
function _girlSeminarNames(r) {
  return [r.pref_1, r.pref_2, r.advance_seminar, r.placement_seminar].filter(Boolean);
}
function _girlSeminarCodes(r) {
  const codes = new Set();
  _girlSeminarNames(r).forEach(name => {
    const sem = (DATA.seminars || []).find(s => s.name === name);
    if (sem && sem.institution_code) codes.add(sem.institution_code);
  });
  return codes;
}
// מחזיר את הסט של שמות סמינרים שהוגדרו בפילטרים הקיימים (אם בכלל)
function _activeSeminarFilterNames() {
  const names = new Set([
    ...(FILTER_STATE.any_seminar || []),
    ...(FILTER_STATE.placement_seminar || []),
    ...((COL_FILTERS.placement_seminar || new Set())),
    ...((COL_FILTERS.pref_1 || new Set())),
    ...((COL_FILTERS.pref_2 || new Set())),
    ...((COL_FILTERS.advance_seminar || new Set())),
  ]);
  return names;
}
// בודק האם לבת יש אח/אחות באותו קוד מוסד של אחד מהסמינרים שלה
// — כשיש פילטר סמינרים: רק הסמינרים של הבת שגם בפילטר
function _hasSiblingInGirlSeminar(r) {
  const filtered = _activeSeminarFilterNames();
  let relevantNames = _girlSeminarNames(r);
  if (filtered.size) {
    relevantNames = relevantNames.filter(n => filtered.has(n));
  }
  if (!relevantNames.length) return false;
  const codes = new Set();
  relevantNames.forEach(name => {
    const sem = (DATA.seminars || []).find(s => s.name === name);
    if (sem && sem.institution_code) codes.add(sem.institution_code);
  });
  if (!codes.size) return false;
  return (r.siblings || []).some(s => s.institution_code && codes.has(s.institution_code));
}

// סיכום כללי: כל הסמינרים
function computeAggregateMetrics(data) {
  const registered = data.filter(r => (r._regs || []).length > 0).length;
  const pref1 = data.filter(r => r.pref_1).length;
  // חיובי — תלמידות שיש להן לפחות תשובה חיובית
  const positive = data.filter(r => (r._regs || []).some(x => x.response === 'חיובי')).length;
  const placed = data.filter(r => r.placement_seminar && !['עדיין לא שובץ','מקדמת',''].includes(r.placement_seminar)).length;
  // "משיבוץ עיריה" = כל סטטוס שאינו ריק / חיובי / תושב חוץ
  const MUNI_EXCLUDE = new Set(['חיובי', 'תושב חוץ']);
  const muni = data.filter(r => r.placement_status && !MUNI_EXCLUDE.has(r.placement_status)).length;
  // אחיות באותו מוסד — רק בנות שמשובצות לסמינר ויש להן אחות באותו סמינר
  const semByName = {};
  (DATA.seminars || []).forEach(s => { semByName[s.name] = s; });
  const sisters = data.filter(r => {
    if (!r.placement_seminar) return false;
    const sem = semByName[r.placement_seminar];
    if (!sem || !sem.institution_code) return false;
    return (r.siblings || []).some(s => s.institution_code === sem.institution_code);
  }).length;
  // חלוקה לקבוצות של משובצות
  const sectors = {};
  const affiliations = {};
  data.filter(r => r.placement_seminar && !['עדיין לא שובץ','מקדמת',''].includes(r.placement_seminar)).forEach(r => {
    const s = r.sector_bucket || 'לא הוגדר';
    sectors[s] = (sectors[s] || 0) + 1;
    const a = AFFIL_3.includes(r.sector) ? r.sector : 'אחר';
    affiliations[a] = (affiliations[a] || 0) + 1;
  });
  return { registered, pref1, positive, placed, muni, sisters, sectors, affiliations };
}

// סיכום לסמינר ספציפי
function computeSeminarMetrics(data, seminarName) {
  const sem = DATA.seminars.find(s => s.name === seminarName);
  const semCode = sem ? sem.institution_code : null;
  const registered = data.filter(r => (r._regs || []).some(x => {
    const name = (DATA.seminars.find(ss => ss.id === x.seminar_id) || {}).name;
    return name === seminarName;
  })).length;
  const pref1 = data.filter(r => r.pref_1 === seminarName).length;
  const positive = data.filter(r => (r._regs || []).some(x => {
    const name = (DATA.seminars.find(ss => ss.id === x.seminar_id) || {}).name;
    return name === seminarName && x.response === 'חיובי';
  })).length;
  const placedList = data.filter(r => r.placement_seminar === seminarName);
  const placed = placedList.length;
  const MUNI_EXCLUDE = new Set(['חיובי', 'תושב חוץ']);
  const muni = placedList.filter(r => r.placement_status && !MUNI_EXCLUDE.has(r.placement_status)).length;
  // אחיות באותו מוסד — רק בנות שמשובצות לסמינר הזה ויש להן אחות בו
  const sisters = semCode
    ? placedList.filter(r => (r.siblings || []).some(s => s.institution_code === semCode)).length
    : 0;
  const sectors = {};
  const affiliations = {};
  placedList.forEach(r => {
    const s = r.sector_bucket || 'לא הוגדר';
    sectors[s] = (sectors[s] || 0) + 1;
    const a = AFFIL_3.includes(r.sector) ? r.sector : 'אחר';
    affiliations[a] = (affiliations[a] || 0) + 1;
  });
  return { registered, pref1, positive, placed, muni, sisters, sectors, affiliations };
}
