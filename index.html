const LIST_EDIT_MODE = {}; // per table: boolean
const LIST_SORT = {};       // per table: { field: string, dir: 1 | -1 }

let _activeListTab = 0;

function toggleListSort(table, field) {
  const cur = LIST_SORT[table];
  if (cur && cur.field === field) {
    LIST_SORT[table] = { field, dir: cur.dir === 1 ? -1 : 1 };
  } else {
    LIST_SORT[table] = { field, dir: 1 };
  }
  renderManageLists();
}

async function openManageLists() {
  _activeListTab = 0;
  CURRENT_MODAL = null;
  await renderManageLists();
  document.getElementById('modal').classList.add('open');
}

function _getEnumByRef(ref) {
  if (ref === 'ENUM_INST_CAT') return ENUM_INST_CAT;
  if (ref === 'ENUM_SECTOR')   return ENUM_SECTOR;
  return [];
}

async function renderManageLists() {
  const tab = LIST_TABS[_activeListTab];
  const editing = !!LIST_EDIT_MODE[tab.table];

  // שליפה
  const sortField = tab.sortField || 'sort_order';
  const { data: itemsRaw, error } = await sb.from(tab.table).select('*').order(sortField);
  if (error) { toast('שגיאה: ' + error.message, 'warn'); return; }

  // סידור מקומי — מיון לפי כותרת שנלחצה (אם יש)
  let items = itemsRaw;
  const activeSort = LIST_SORT[tab.table];
  if (activeSort) {
    items = [...itemsRaw].sort((a, b) => {
      const va = a[activeSort.field], vb = b[activeSort.field];
      if (va == null && vb == null) return 0;
      if (va == null) return 1;
      if (vb == null) return -1;
      if (typeof va === 'number' && typeof vb === 'number') return (va - vb) * activeSort.dir;
      return String(va).localeCompare(String(vb), 'he') * activeSort.dir;
    });
  }

  const tabsHtml = LIST_TABS.map((t, i) =>
    `<button class="list-tab ${i === _activeListTab ? 'active' : ''}" onclick="setListTab(${i})">${t.label}</button>`
  ).join('');

  // כותרת טבלה דינמית לפי fields — עם מיון בלחיצה
  const hasOrderCol = !tab.isEntity;
  const headerCells = [];
  if (hasOrderCol) headerCells.push('<th style="width:80px">סדר</th>');
  tab.fields.forEach(f => {
    const isSorted = activeSort && activeSort.field === f.key;
    const arrow = isSorted ? (activeSort.dir === 1 ? ' ▲' : ' ▼') : '';
    headerCells.push(`<th style="cursor:pointer; user-select:none;" onclick="toggleListSort('${tab.table}','${f.key}')" title="לחץ למיון">${f.label}${arrow}</th>`);
  });
  if (!tab.isEntity) headerCells.push('<th style="width:100px">מצב</th>');
  headerCells.push('<th style="width:80px"></th>');  // מחיקה
  const tableHeader = '<tr>' + headerCells.join('') + '</tr>';

  // שורות
  const rowsHtml = items.map((item, idx) => {
    const cells = [];

    if (hasOrderCol) {
      cells.push(`<td class="order-cell">
        <button class="mini-btn" ${idx === 0 ? 'disabled' : ''} onclick="moveListItem('${tab.table}', ${item.id}, -1)">⬆</button>
        <button class="mini-btn" ${idx === items.length - 1 ? 'disabled' : ''} onclick="moveListItem('${tab.table}', ${item.id}, 1)">⬇</button>
      </td>`);
    }

    tab.fields.forEach(f => {
      // שדות מיוחדים (לא בעמודה רגילה)
      if (f.type === 'extra_contacts') {
        const arr = Array.isArray(item.extra_contacts) ? item.extra_contacts : [];
        const cnt = arr.length;
        const badge = cnt
          ? `<span style="background:#0ea5e9; color:white; padding:2px 8px; border-radius:999px; font-size:12px; font-weight:600;">${cnt}</span>`
          : `<span style="color:var(--muted)">—</span>`;
        const btn = editing
          ? `<button class="mini-btn" onclick="openExtraContacts('${tab.table}', ${item.id})" title="נהל אנשי קשר נוספים">✎</button>`
          : '';
        cells.push(`<td class="val-cell" style="text-align:center;">${badge} ${btn}</td>`);
        return;
      }
      if (f.type === 'template_file') {
        const has = !!item.file_path;
        const display = has
          ? `<span title="${_esc(item.file_name || '')}" style="color:var(--accent);">✓ ${item.file_name || 'הועלה'}</span>`
          : `<span style="color:var(--muted)">לא הועלה</span>`;
        const actions = editing
          ? `<button class="mini-btn" onclick="uploadTemplateFile(${item.id})" title="העלה/החלף קובץ">📤</button>` +
            (has ? ` <button class="mini-btn" onclick="downloadTemplateFile(${item.id})" title="הורד קובץ">📥</button>` : '')
          : (has ? `<button class="mini-btn" onclick="downloadTemplateFile(${item.id})" title="הורד קובץ">📥</button>` : '');
        cells.push(`<td class="val-cell" style="text-align:center;">${display} ${actions}</td>`);
        return;
      }
      if (f.type === 'bool') {
        const checked = !!item[f.key];
        if (editing && !f.readonly) {
          cells.push(`<td class="val-cell editing" style="text-align:center;">
            <input type="checkbox" ${checked ? 'checked' : ''}
              onchange="saveListField('${tab.table}', ${item.id}, '${f.key}', this.checked, ${!checked})"
              style="width:18px; height:18px; cursor:pointer;">
          </td>`);
        } else {
          cells.push(`<td class="val-cell" style="text-align:center;">${checked ? '✓' : '<span style="color:var(--muted)">—</span>'}</td>`);
        }
        return;
      }
      // שדות רגילים (text / enum)
      const val = item[f.key];
      if (!editing || f.readonly) {
        cells.push(`<td class="val-cell">${val == null || val === '' ? '<span style="color:var(--muted)">—</span>' : val}</td>`);
      } else {
        if (f.type === 'enum') {
          const values = f.values ? f.values : _getEnumByRef(f.valuesRef);
          cells.push(`<td class="val-cell editing">
            <select onchange="saveListField('${tab.table}', ${item.id}, '${f.key}', this.value, '${_esc(val || '')}')">
              <option value=""></option>
              ${values.map(v => `<option value="${_esc(v)}" ${v === val ? 'selected' : ''}>${v}</option>`).join('')}
            </select>
          </td>`);
        } else {
          cells.push(`<td class="val-cell editing">
            <input type="text" value="${_esc(val || '')}"
              onblur="saveListField('${tab.table}', ${item.id}, '${f.key}', this.value, '${_esc(val || '')}')"
              onkeydown="if(event.key==='Enter')this.blur();if(event.key==='Escape'){this.value='${_esc(val || '')}';this.blur();}">
          </td>`);
        }
      }
    });

    if (!tab.isEntity) {
      cells.push(`<td style="text-align:center;">
        <button class="mini-btn" onclick="toggleListItemActive('${tab.table}', ${item.id}, ${item.is_active})">${item.is_active ? 'השבת' : 'הפעל'}</button>
      </td>`);
    }

    cells.push(`<td style="text-align:center;">
      <button class="mini-btn danger" onclick="deleteListRow('${tab.table}', ${item.id})" title="מחק">×</button>
    </td>`);

    const rowClass = (!tab.isEntity && !item.is_active) ? 'inactive' : '';
    return `<tr data-id="${item.id}" class="${rowClass}">${cells.join('')}</tr>`;
  }).join('');

  const addLabel = tab.isEntity
    ? (tab.table === 'seminars' ? '+ הוסף סמינר' : '+ הוסף מוסד')
    : '+ הוסף ערך';

  const sortBtn = !tab.isEntity
    ? `<button class="cancel-btn" onclick="sortListAlpha('${tab.table}')">מיין א-ב</button>`
    : '';

  const importBtn = `<button class="cancel-btn" onclick="triggerImportList('${tab.table}')">📥 ייבוא מאקסל</button>`;
  const exportBtn = `<button class="cancel-btn" onclick="exportListToExcel('${tab.table}')">📤 יצוא לאקסל</button>`;

  const editBtnClass = editing ? 'save-btn' : 'cancel-btn';
  const editBtnLabel = editing ? '✓ סיים עריכה' : '✎ מצב עריכה';

  document.getElementById('modal_body').innerHTML = `
    <div class="modal-header">
      <div style="flex:1">
        <h2>📂 רשימות</h2>
        <div class="subtitle">הוספה, עריכה, סידור ומחיקה של ערכי הרשימות</div>
      </div>
      <button class="close" onclick="closeModal()" title="סגור">×</button>
    </div>
    <div class="modal-body">
      <div class="list-tabs">${tabsHtml}</div>

      <div class="form-section" style="padding: 12px 14px;">
        <div style="display:flex; gap:8px; margin-bottom:12px; align-items:center; flex-wrap:wrap;">
          <button class="${editBtnClass}" onclick="toggleListEditMode('${tab.table}')">${editBtnLabel}</button>
          <button class="save-btn" onclick="addListItem('${tab.table}')">${addLabel}</button>
          ${sortBtn}
          ${importBtn}
          ${exportBtn}
          <span style="margin-right:auto; color: var(--muted); font-size: 13px;">${items.length} פריטים${editing ? ' · מצב עריכה דלוק' : ''}</span>
        </div>
        <table style="width:100%; font-size:14px;" class="${editing ? 'list-editing' : ''}">
          <thead>${tableHeader}</thead>
          <tbody>${rowsHtml || `<tr><td colspan="${tab.fields.length + 3}" style="text-align:center;color:var(--muted);padding:20px">אין פריטים</td></tr>`}</tbody>
        </table>
      </div>
    </div>
  `;
}

function toggleListEditMode(table) {
  LIST_EDIT_MODE[table] = !LIST_EDIT_MODE[table];
  renderManageLists();
}

async function exportListToExcel(table) {
  const tab = LIST_TABS.find(t => t.table === table);
  if (!tab) return;
  const { data, error } = await sb.from(table).select('*');
  if (error) { toast('שגיאה ביצוא: ' + error.message, 'warn'); return; }
  if (!data || !data.length) { toast('אין נתונים ליצוא', 'warn'); return; }

  // רק שדות התצוגה (לא id/timestamps — כדי שיצוא→יבוא יעבוד נקי)
  const cols = tab.fields.map(f => ({ key: f.key, label: f.label }));
  const rows = data.map(item => {
    const r = {};
    cols.forEach(c => { r[c.label] = item[c.key] == null ? '' : item[c.key]; });
    return r;
  });

  const headers = cols.map(c => c.label);
  const ws = XLSX.utils.json_to_sheet(rows, { header: headers });

  // RTL — גם ברמת sheet וגם ברמת workbook
  ws['!views'] = [{ RTL: true }];

  // רוחב עמודות מותאם לתוכן
  ws['!cols'] = cols.map((c) => {
    let maxLen = c.label.length;
    rows.forEach(r => {
      const v = String(r[c.label] ?? '');
      if (v.length > maxLen) maxLen = v.length;
    });
    // הוספת הפרש קטן ל־RTL + שפה עברית (כי התווים רחבים יותר)
    return { wch: Math.min(Math.max(maxLen + 4, 10), 60) };
  });

  const wb = XLSX.utils.book_new();
  // RTL ברמת ה־workbook (SheetJS זקוק לזה לפעמים)
  wb.Workbook = { Views: [{ RTL: true }] };

  XLSX.utils.book_append_sheet(wb, ws, tab.label.slice(0, 30));
  const ts = new Date().toISOString().slice(0, 10);
  // cellStyles כדי לוודא שה־!cols נשמרים בפלט
  XLSX.writeFile(wb, `${tab.label}_${ts}.xlsx`, { bookType: 'xlsx', cellStyles: true });
  toast(`יוצאו ${rows.length} פריטים ✓`);
}

function triggerImportList(table) {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.xlsx,.xls,.csv';
  inp.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const arrayBuf = await file.arrayBuffer();
      const wb = XLSX.read(arrayBuf, { type: 'array' });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
      // rows[0] = headers, rows[1..] = data. גם אם אין header — נזהה שורה ראשונה רלוונטית.
      openImportDialog(table, rows, file.name);
    } catch (err) {
      toast('שגיאה בקריאת הקובץ: ' + err.message, 'warn');
    }
  };
  inp.click();
}

          התאם כל עמודה בקובץ לשדה ברשימה. "דלג" = התעלם מהעמודה. אפשר לסמן את שורת הכותרות לדילוג.

          <label><input type="radio" name="imp_mode" value="merge"> <b>הוסף ועדכן</b> — קיים יעודכן לפי הקובץ, חדש יתווסף</label>
          <label><input type="radio" name="imp_mode" value="replace"> <b>החלף הכל</b> — מחק את כל הקיים, הכנס את הקובץ בלבד ⚠️ (שימושי עם זהירות)</label>

}

async function executeImport(table, records, mode) {
  const tab = LIST_TABS.find(t => t.table === table);
  let added = 0, updated = 0, skipped = 0, removed = 0;

  try {
    if (mode === 'replace') {
      if (!confirm(`⚠️ החלפה תמחק את כל הרשומות הקיימות (${tab.label}) ותציב רק את הקובץ.\nזה עלול לפגוע ברשומות הקיימות שמשתמשות בערכים.\n\nלהמשיך?`)) return;
      // מחק את הקיים
      const { data: existing } = await sb.from(table).select('id');
      if (existing) {
        const ids = existing.map(x => x.id);
        if (ids.length) {
          const { error } = await sb.from(table).delete().in('id', ids);
          if (error) throw error;
          removed = ids.length;
        }
      }
    }

    // שלוף את מה שקיים עכשיו (לבדיקת כפילויות)
    const { data: currentItems } = await sb.from(table).select('*');
    const keyOf = tab.isEntity
      ? (r) => `${r.name || ''}||${r.institution_code || ''}`
      : (r) => r.value || '';
    const existingMap = {};
    (currentItems || []).forEach(it => { existingMap[keyOf(it)] = it; });

    for (const rec of records) {
      const key = keyOf(rec);
      const existing = existingMap[key];
      if (existing) {
        if (mode === 'merge') {
          // עדכן רק שדות שבקובץ (לא למחוק שדות קיימים)
          const upd = {};
          Object.keys(rec).forEach(k => { if (rec[k] != null) upd[k] = rec[k]; });
          if (Object.keys(upd).length) {
            await sb.from(table).update(upd).eq('id', existing.id);
            updated++;
          }
        } else {
          skipped++;
        }
      } else {
        // הוסף חדש (עם sort_order אוטומטי לרשימות)
        const ins = { ...rec };
        if (!tab.isEntity && ins.sort_order == null) {
          ins.sort_order = (Object.keys(existingMap).length + added + 1) * 10;
        }
        if (SEASONED_TABLES.has(table)) ins.season_id = CURRENT_SEASON_ID;
        const { error } = await sb.from(table).insert(ins);
        if (error) {
          console.error(error);
          skipped++;
        } else {
          added++;
        }
      }
    }

async function addListItem(table) {

  if (table === 'form_templates') {

// שמירת שדה בודד מעריכה inline ברשימה
async function saveListField(table, id, field, newValue, oldValue) {
  // טיפול ב־boolean (לא להמיר למחרוזת)
  const tabDefEarly = LIST_TABS.find(t => t.table === table);
  const fieldDef = tabDefEarly && tabDefEarly.fields.find(f => f.key === field);
  if (fieldDef && fieldDef.type === 'bool') {
    if (!!newValue === !!oldValue) return;
    const { error } = await sb.from(table).update({ [field]: !!newValue }).eq('id', id);
    if (error) { toast('שגיאה: ' + error.message, 'warn'); return; }
    toast('עודכן ✓');
    await loadLookupLists();
    await renderManageLists();
    return;
  }

  newValue = (newValue == null) ? '' : String(newValue);
  oldValue = (oldValue == null) ? '' : String(oldValue);
  if (newValue === oldValue) return;

  const tabDef = LIST_TABS.find(t => t.table === table);
  const isEntity = tabDef.isEntity;

  // בדיקת כפילות (רק אם זהו שדה עם ערך ייחודי — value ברשימות, או name+code בישויות)
  const newVal = newValue === '' ? null : newValue;
  if (!isEntity && field === 'value') {
    // בדיקת כפילות בטבלה הזו
    const { data: dup } = await sb.from(table).select('id').eq('value', newValue).neq('id', id);
    if (dup && dup.length) {
      const mergeConfirm = confirm(
        `ערך "${newValue}" כבר קיים ברשימה.\n\n` +
        `אם תאשר, המערכת תאחד — כל הרשומות שהשתמשו ב"${oldValue}" יועברו ל"${newValue}" ` +
        `והפריט הנוכחי יימחק.\n\nלאחד?`
      );
      if (!mergeConfirm) { renderManageLists(); return; }
      // Merge: move references, delete item
      if (tabDef.usedIn && oldValue) {
        await sb.from(tabDef.usedIn.table).update({ [tabDef.usedIn.field]: newValue }).eq(tabDef.usedIn.field, oldValue);
      }
      await sb.from(table).delete().eq('id', id);
      toast(`אוחד עם "${newValue}" ✓`);
      await loadLookupLists();
      await renderManageLists();
      await reloadData();
      return;
    }
  }

  // CASCADE: ערך שינוי ברשימה → עדכון הפניות בטבלה הראשית
  if (!isEntity && field === 'value' && tabDef.usedIn && oldValue) {
    const { count } = await sb.from(tabDef.usedIn.table).select('*', { count: 'exact', head: true })
      .eq(tabDef.usedIn.field, oldValue);
    if (count) {
      const { error: upErr } = await sb.from(tabDef.usedIn.table).update({ [tabDef.usedIn.field]: newValue })
        .eq(tabDef.usedIn.field, oldValue);
      if (upErr) { toast('שגיאה בעדכון הפניות: ' + upErr.message, 'warn'); return; }
    }
  }

  // CASCADE: שם מוסד השתנה ללא שינוי קוד → עדכון siblings.institution_name
  if (table === 'source_schools' && field === 'name') {
    const { data: item } = await sb.from(table).select('institution_code').eq('id', id).single();
    if (item && item.institution_code) {
      await sb.from('siblings').update({ institution_name: newValue }).eq('institution_code', item.institution_code);
    }
  }

  // עדכון הפריט עצמו
  const { error } = await sb.from(table).update({ [field]: newVal }).eq('id', id);
  if (error) { toast('שגיאה: ' + error.message, 'warn'); return; }

  toast('עודכן ✓');
  await loadLookupLists();
  await renderManageLists();
  await reloadData();
}

async function deleteListRow(table, id) {

    if (count && count > 0) {
      alert(`לא ניתן למחוק — תבנית זו שימשה ב־${count} שליחות מתועדות.\nאפשר להוריד מהבחירה ע"י ביטול "הצג".`);
      return;
    }
    if (!confirm('למחוק את התבנית לצמיתות? (הקובץ יימחק גם מהאחסון)')) return;
    const { data: tpl } = await sb.from('form_templates').select('file_path').eq('id', id).single();
    if (tpl && tpl.file_path) {
      await sb.storage.from('form_templates').remove([tpl.file_path]);
    }
    const { error } = await sb.from('form_templates').delete().eq('id', id);
    if (error) { toast('שגיאה: ' + error.message, 'warn'); return; }
    toast('נמחק');
    await renderManageLists();
    return;
  }

  if (tabDef.isEntity) {
    // בדיקת שימוש
    const fkField = table === 'seminars' ? 'seminar_id' : 'source_school_id';
    const fkTables = table === 'seminars' ? ['registrations', 'placements'] : ['girls'];
    let totalUse = 0;
    for (const ft of fkTables) {
      const { count } = await sb.from(ft).select('*', { count: 'exact', head: true }).eq(fkField, id);
      totalUse += count || 0;
    }
    if (totalUse > 0) {
      alert(`לא ניתן למחוק — הפריט בשימוש ב־${totalUse} רשומות.\nניתן לשנות שם/קוד במקום.`);
      return;
    }
    if (!confirm('למחוק את הפריט לצמיתות?')) return;
    const { error } = await sb.from(table).delete().eq('id', id);
    if (error) { toast('שגיאה: ' + error.message, 'warn'); return; }
    toast('נמחק');
    await loadLookupLists();
    await renderManageLists();
    return;
  }

  // רשימת ערכים — מחיקה עם אפשרות העברה
  const { data: item } = await sb.from(table).select('value').eq('id', id).single();
  if (!item) return;
  await deleteListItemWithMove(table, id, tabDef.usedIn, item.value);

async function editListItem(table, id) {
  const tabDef = LIST_TABS.find(t => t.table === table);
  const isEntity = tabDef.isEntity;

  if (isEntity) {
    const { data: item } = await sb.from(table).select('*').eq('id', id).single();
    if (!item) return;
    const oldName = item.name;
    const oldCode = item.institution_code || '';
    const newName = prompt('שם:', oldName);
    if (newName == null) return;
    const newCode = prompt('סמל מוסד:', oldCode);
    if (newCode == null) return;

    // בדיקת כפילות לפי שם (לא כולל עצמה)
    if (newName !== oldName) {
      const { data: dup } = await sb.from(table).select('id,name').eq('name', newName).neq('id', id);
      if (dup && dup.length) {
        if (!confirm(`שם זה כבר קיים (${dup.length} רשומות אחרות). לאשר בכל זאת?`)) return;
      }
    }

    const { error } = await sb.from(table).update({
      name: newName, institution_code: newCode || null
    }).eq('id', id);
    if (error) { toast('שגיאה: ' + error.message, 'warn'); return; }

    // CASCADE: אם שם המוסד השתנה בלי שינוי קוד — עדכן גם ב־siblings
    if (table === 'source_schools' && newName !== oldName && (newCode || null) === (oldCode || null)) {
      if (newCode) {
        const { count } = await sb.from('siblings').select('*', { count: 'exact', head: true })
          .eq('institution_code', newCode);
        if (count) {
          await sb.from('siblings').update({ institution_name: newName }).eq('institution_code', newCode);
          toast(`עודכן שם המוסד + ${count} רשומות אחים ✓`);
        } else {
          toast('עודכן ✓');
        }
      } else {
        toast('עודכן ✓');
      }
    } else {
      toast('עודכן ✓');
    }
    await loadLookupLists();
    await renderManageLists();
    await reloadData();
    return;
  }

  // רשימות ערכים (קבוצות/סטטוסים/תשובות/שיוך)
  const { data: item } = await sb.from(table).select('*').eq('id', id).single();
  if (!item) return;
  const oldValue = item.value;
  const newValue = prompt('ערך:', oldValue);
  if (newValue == null || newValue === oldValue) return;

  // בדיקת כפילות
  const { data: dup } = await sb.from(table).select('id').eq('value', newValue).neq('id', id);
  let merge = false;
  if (dup && dup.length) {
    const choice = confirm(
      `ערך "${newValue}" כבר קיים ברשימה.\n\n` +
      `אם תאשר, המערכת תאחד — כל הרשומות שהשתמשו ב"${oldValue}" יועברו ל"${newValue}" ` +
      `והפריט הנוכחי יימחק.\n\nלאחד?`
    );
    if (!choice) return;
    merge = true;
  }

  // CASCADE: עדכן את הרשומות בטבלה הראשית
  const usedIn = tabDef.usedIn;
  if (usedIn) {
    const { count } = await sb.from(usedIn.table).select('*', { count: 'exact', head: true })
      .eq(usedIn.field, oldValue);
    if (count) {
      const { error: upErr } = await sb.from(usedIn.table).update({ [usedIn.field]: newValue })
        .eq(usedIn.field, oldValue);
      if (upErr) { toast('שגיאה בעדכון רשומות: ' + upErr.message, 'warn'); return; }
    }
  }

  if (merge) {
    // מחק את הפריט הנוכחי (הרשומות כבר הועברו ל־newValue הקיים)
    await sb.from(table).delete().eq('id', id);
    toast(`אוחד עם "${newValue}" ✓`);
  } else {
    const { error } = await sb.from(table).update({ value: newValue }).eq('id', id);
    if (error) { toast('שגיאה: ' + error.message, 'warn'); return; }
    toast('עודכן ✓');
  }

  await loadLookupLists();
  await renderManageLists();
  await reloadData();
}

async function toggleListItemActive(table, id, wasActive) {

}

async function moveListItem(table, id, direction) {
  // מביא את הפריט ואת הפריט השכן, ומחליף sort_order
  const { data: all } = await sb.from(table).select('id, sort_order').order('sort_order');
  const idx = all.findIndex(x => x.id === id);
  const neighbor = all[idx + direction];
  if (!neighbor) return;
  const tmp = all[idx].sort_order;
  await sb.from(table).update({ sort_order: neighbor.sort_order }).eq('id', id);
  await sb.from(table).update({ sort_order: tmp }).eq('id', neighbor.id);
  await loadLookupLists();
  await renderManageLists();
}

async function sortListAlpha(table) {
  if (!confirm('למיין את הרשימה לפי א-ב? הסדר הידני יאבד.')) return;
  const { data: items } = await sb.from(table).select('id, value').order('value');
  for (let i = 0; i < items.length; i++) {
    await sb.from(table).update({ sort_order: (i + 1) * 10 }).eq('id', items[i].id);
  }
  await loadLookupLists();
  await renderManageLists();
  toast('מוין א-ב ✓');
}

async function deleteListItemWithMove(table, id, usedIn, value) {

  const { count } = await sb.from(usedIn.table).select('*', { count: 'exact', head: true })
    .eq(usedIn.field, value);
  if (!count) {
    if (!confirm(`למחוק "${value}"? לא בשימוש באף רשומה.`)) return;
    const { error } = await sb.from(table).delete().eq('id', id);
    if (error) { toast('שגיאה: ' + error.message, 'warn'); return; }
    toast('נמחק');
    await loadLookupLists();
    await renderManageLists();
    return;
  }

  // יש שימוש — מציג מודל בחירה
  const { data: others } = await sb.from(table).select('id, value').neq('id', id).eq('is_active', true);
  const otherOptions = (others || []).map(o => `<option value="${o.value}">${o.value}</option>`).join('');
  const choice = prompt(
    `"${value}" בשימוש ב־${count} רשומות.\n\n` +

    `  1. "השבת" (פשוט השבת בלחיצה על "השבת" למעלה)\n` +
    `  2. "העבר הכל לערך אחר ואז מחק" — הקלד את שם הערך החלופי מתוך:\n` +
    (others || []).map(o => `       ${o.value}`).join('\n') +
    `\n\nהקלד את הערך החלופי, או השאר ריק לביטול:`
  );
  if (!choice) return;
  const target = (others || []).find(o => o.value === choice);
  if (!target) {
    alert('ערך לא קיים. פעולה בוטלה.');
    return;
  }
  // העבר את כל הרשומות לערך החלופי
  const { error: upErr } = await sb.from(usedIn.table).update({ [usedIn.field]: choice }).eq(usedIn.field, value);
  if (upErr) { toast('שגיאה: ' + upErr.message, 'warn'); return; }
  // ואז מחק את הערך המקורי
  const { error: delErr } = await sb.from(table).delete().eq('id', id);
  if (delErr) { toast('שגיאה במחיקה: ' + delErr.message, 'warn'); return; }
  toast(`הועברו ${count} רשומות ל"${choice}" והערך נמחק ✓`);

  await renderManageLists();
  await reloadData();

      slug, name, description: desc || null, recipient_kind: kind, sort_order: nextOrder,

    if (error) { toast('שגיאה: ' + error.message, 'warn'); return; }
    toast('נוספה ✓');
    scrim.remove();
    await renderManageLists();
  };
}

// ============================================================
// העלאה/הורדה של קבצי תבנית (form_templates → Supabase Storage)
// ============================================================
async function uploadTemplateFile(templateId) {
  const { data: template, error } = await sb.from('form_templates').select('*').eq('id', templateId).single();
  if (error) { toast('שגיאה: ' + error.message, 'warn'); return; }

  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.docx,application/vnd.openxmlformats-officedocument.wordprocessingml.document';
  inp.onchange = async () => {
    const file = inp.files[0];
    if (!file) return;
    if (!file.name.toLowerCase().endsWith('.docx')) {
      toast('יש להעלות קובץ .docx בלבד', 'warn');
      return;
    }
    if (file.size > 5 * 1024 * 1024) {
      toast('קובץ גדול מדי (מקסימום 5MB)', 'warn');
      return;
    }
    toast('מעלה...', 'info');

    // נתיב ב־Storage: templates/<slug>.docx (דריסה בעדכון)
    const path = `${template.slug}.docx`;
    const { error: upErr } = await sb.storage.from('form_templates').upload(path, file, {
      upsert: true,
      contentType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
    });
    if (upErr) { toast('שגיאה בהעלאה: ' + upErr.message, 'warn'); return; }

    const { error: updErr } = await sb.from('form_templates').update({
      file_path: path,
      file_name: file.name,
      file_size: file.size,
      updated_at: new Date().toISOString(),
    }).eq('id', templateId);
    if (updErr) { toast('שגיאה בעדכון רשומה: ' + updErr.message, 'warn'); return; }

    toast(`הועלה: ${file.name} ✓`);
    await renderManageLists();
  };
  inp.click();
}

async function downloadTemplateFile(templateId) {
  const { data: template, error } = await sb.from('form_templates').select('*').eq('id', templateId).single();
  if (error || !template.file_path) { toast('לא הועלה קובץ', 'warn'); return; }

  const { data, error: dlErr } = await sb.storage.from('form_templates').download(template.file_path);
  if (dlErr) { toast('שגיאה בהורדה: ' + dlErr.message, 'warn'); return; }

  const url = URL.createObjectURL(data);
  const a = document.createElement('a');
  a.href = url;
  a.download = template.file_name || `${template.slug}.docx`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast('הורד ✓');
}

// ============================================================
// גישה: בונים את המכתב כ־HTML מוסתר עם הניירת כרקע, מרנדרים
// עם html2canvas (קבלת bidi עברי טבעי של הדפדפן), ועוטפים ב־jsPDF.

// תאריך עברי לועזי (ברירת מחדל לכותרת המכתב לסמינר)
function formatHebrewDate(d) {
  d = d || new Date();
  // לועזי (DD פברואר YYYY)
  const months = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  const lat = `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
  // עברי (יום ה' i סיוון תשפ"ו) — שימוש ב־Intl
  let heb;
  try {
    heb = new Intl.DateTimeFormat('he-u-ca-hebrew', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }).format(d);
  } catch (e) { heb = ''; }
  return { latin: lat, hebrew: heb };
}

// טעינת הניירת כ־data URL (פעם אחת, נשמר ב־cache)
let _letterheadCache = null;
async function loadLetterhead() {
  if (_letterheadCache) return _letterheadCache;
  const resp = await fetch('./letterhead.jpg');
  if (!resp.ok) throw new Error('שגיאה בטעינת הניירת');
  const blob = await resp.blob();
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => { _letterheadCache = r.result; res(_letterheadCache); };
    r.onerror = rej;
    r.readAsDataURL(blob);
  });
}

      <div style="text-align: center; font-weight: 700; font-size: 16px; margin-bottom: 18px;">רשימת תלמידות לשיבוץ — ${data.seminar_name || ''}</div>
      <table style="width: 100%; border-collapse: collapse; font-size: 13px;">

            <th style="border: 1px solid #333; padding: 6px;">מ.ס.</th>
            <th style="border: 1px solid #333; padding: 6px;">מספר זהות</th>
            <th style="border: 1px solid #333; padding: 6px;">שם משפחה</th>
            <th style="border: 1px solid #333; padding: 6px;">שם פרטי</th>

      </table>
    </div>`;
  }

  throw new Error(`תבנית לא מוכרת: ${template}`);
}

// יצירת PDF מהתבנית — מחזיר Blob של PDF
async function generateLetterPDF(template, data) {
  const letterhead = await loadLetterhead();
  const html = buildLetterHTML(template, data, letterhead);

  // צור div מוסתר ב־DOM (html2canvas צריך DOM אמיתי)
  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:fixed; left:-99999px; top:0; z-index:-1;';
  wrap.innerHTML = html;
  document.body.appendChild(wrap);

  try {
    const pages = wrap.children;  // כל בן זה דף A4
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

    for (let i = 0; i < pages.length; i++) {
      const page = pages[i];
      // המתן רגע לטעינת הרקע (cache כבר טעון אז זה מהיר)
      const canvas = await html2canvas(page, {
        scale: 2,                  // איכות גבוהה
        useCORS: true,
        backgroundColor: '#fff',
        windowWidth: 794,
        windowHeight: 1123,
      });
      const img = canvas.toDataURL('image/jpeg', 0.92);
      if (i > 0) pdf.addPage();
      pdf.addImage(img, 'JPEG', 0, 0, 210, 297, undefined, 'FAST');
    }
    return pdf.output('blob');
  } finally {
    wrap.remove();
  }
}

// הורד PDF — בעיקר לפיתוח/בדיקה
async function downloadLetterPDF(template, data, filename) {
  const blob = await generateLetterPDF(template, data);
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename || `מכתב-${template}.pdf`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

// טאב פעיל ב־History modal
let _historyTab = 'today';

async function showHistory(tab) {
  if (tab) _historyTab = tab;

  let cutoff = null;
  if (_historyTab === 'today') {
    const t = new Date(); t.setHours(0,0,0,0);
    cutoff = t.toISOString();
  } else if (_historyTab === 'week') {
    const t = new Date(); t.setDate(t.getDate() - 7); t.setHours(0,0,0,0);
    cutoff = t.toISOString();
  }

  let q = sb.from('audit_log').select('*').order('created_at', { ascending: false });
  if (cutoff) q = q.gte('created_at', cutoff);
  q = q.limit(_historyTab === 'all' ? 500 : 1000);
  const { data, error } = await q;
  if (error) { toast('שגיאה: ' + error.message, 'warn'); return; }

  const userIds = [...new Set((data || []).map(d => d.user_id).filter(Boolean))];
  const userByUid = {};
  if (userIds.length) {
    const { data: users } = await sb.from('user_profiles').select('id,full_name,email').in('id', userIds);
    (users || []).forEach(u => { userByUid[u.id] = u; });
  }

  const girlByID = {};
  (DATA.girls || []).forEach(g => { girlByID[g.id] = g; });
  const semByID = {};
  (DATA.seminars || []).forEach(s => { semByID[s.id] = s; });
  // מיפוי registrations.id → girl_id ו־placements.id → girl_id
  const regToGirl = {};
  (DATA.registrations || []).forEach(r => { regToGirl[r.id] = r.girl_id; });
  const plcToGirl = {};
  (DATA.placements || []).forEach(p => { plcToGirl[p.id] = p.girl_id; });

  const dt = (s) => {
    const d = new Date(s);
    const today = new Date(); today.setHours(0,0,0,0);
    const dDay = new Date(d); dDay.setHours(0,0,0,0);
    const yDay = new Date(today); yDay.setDate(yDay.getDate() - 1);
    let datePart;
    if (dDay.getTime() === today.getTime()) datePart = 'היום';
    else if (dDay.getTime() === yDay.getTime()) datePart = 'אתמול';
    else datePart = d.toLocaleDateString('he-IL', { day: '2-digit', month: '2-digit', year: '2-digit' });
    return datePart + ' ' + d.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
  };

  const FIELD_LABELS = {
    family_name: 'שם משפחה', first_name: 'שם פרטי', national_id: 'ת.ז',
    notes: 'הערה', sector: 'שיוך', community: 'קהילה',
    address_street: 'רחוב', address_number: 'בית',
    mother_name: 'שם אם', mother_phone: 'טלפון אם',
    father_name: 'שם אב', father_phone: 'טלפון אב', email: 'מייל',
    source_school_id: 'בי״ס מוצא',
    seminar_id: 'סמינר', response: 'תשובה', class_type: 'א-ו',
    preference_order: 'העדפה', status: 'סטטוס', is_final: 'סופי',
  };
  const PREF_LABELS = { pref_1: 'העדפה 1', pref_2: 'העדפה 2', advance: 'מקדמת' };

  const friendlyValue = (key, val) => {
    if (val == null || val === '') return '(ריק)';
    if (key === 'seminar_id') return (semByID[val] || {}).name || `סמינר ${val}`;
    if (key === 'source_school_id') {
      const s = (DATA.source_schools || []).find(x => x.id === val);
      return s ? s.name : `מוסד ${val}`;
    }
    if (key === 'preference_order') return PREF_LABELS[val] || val;
    if (typeof val === 'boolean') return val ? '✓ כן' : '— לא';
    return String(val);
  };

  const describe = (log) => {
    const tn = log.table_name;
    const oldV = log.old_value || {};
    const newV = log.new_value || {};
    const all = { ...oldV, ...newV };
    const changes = Object.keys(all).filter(k => k !== 'id' && k !== 'season_id' && k !== 'girl_id'
      && JSON.stringify(oldV[k]) !== JSON.stringify(newV[k]));

    let girlId = null;
    if (tn === 'girls') girlId = log.record_id;
    else if (tn === 'registrations') girlId = regToGirl[log.record_id] || newV.girl_id || oldV.girl_id;
    else if (tn === 'placements') girlId = plcToGirl[log.record_id] || newV.girl_id || oldV.girl_id;

    let girlContext = '';
    if (girlId && girlByID[girlId]) {
      const g = girlByID[girlId];
      girlContext = ` — <span style="color:var(--accent-alt); font-weight:600;">${g.family_name || ''} ${g.first_name || ''}</span>`;
    } else if (girlId) {
      girlContext = ` — <span style="color:var(--muted)">בת #${girlId}</span>`;
    }

    if (log.action === 'insert') {
      if (tn === 'girls') return `<b>הוספת תלמידה${girlContext}</b>`;
      if (tn === 'registrations') {
        const order = newV.preference_order;
        const sem = newV.seminar_id ? semByID[newV.seminar_id] : null;
        return `<b>הוספת ${PREF_LABELS[order] || 'רישום'}${girlContext}</b>${sem ? ' → ' + sem.name : ''}`;
      }
      if (tn === 'placements') {
        const sem = newV.seminar_id ? semByID[newV.seminar_id] : null;
        return `<b>שיבוץ${girlContext}</b>${sem ? ' → ' + sem.name : ''}`;
      }
      return `<b>הוספה ב־${tn}</b>`;
    }
    if (log.action === 'delete') {
      return `<b>מחיקה${girlContext}</b> מ־${tn}`;
    }
    if (changes.length === 0) return `<i>שינוי טכני ב־${tn}${girlContext}</i>`;
    const lines = changes.slice(0, 4).map(k => {
      const label = FIELD_LABELS[k] || k;
      const before = friendlyValue(k, oldV[k]);
      const after = friendlyValue(k, newV[k]);
      return `<span style="color:#64748b">${label}:</span> ${before} → <b>${after}</b>`;
    });
    if (changes.length > 4) lines.push(`<span style="color:var(--muted)">…ועוד ${changes.length - 4}</span>`);
    return `<b>שינוי${girlContext}</b><br><span style="font-size:12px">${lines.join(' · ')}</span>`;
  };

  const tabBtn = (id, label) => `
    <button class="hist-tab ${_historyTab === id ? 'active' : ''}" onclick="showHistory('${id}')">${label}</button>
  `;

  // ============ סיכום פעילות ============
  function buildSummary(entries) {
    if (!entries.length) return '';
    const counts = {
      girls_added: 0, girls_deleted: 0,
      regs_added: { pref_1: 0, pref_2: 0, advance: 0 },
      regs_updated_seminar: 0, regs_updated_response: 0, regs_updated_class: 0,
      regs_deleted: 0,
      plc_added: 0, plc_updated_seminar: 0, plc_updated_status: 0, plc_updated_final: 0,
      plc_deleted: 0,
      notes_updated: 0,
      personal_updated: 0,  // שאר שדות אישיים
    };
    const topPlacements = {};  // seminar_id → count
    const topStatuses = {};    // status → count

    entries.forEach(log => {
      const oldV = log.old_value || {};
      const newV = log.new_value || {};
      if (log.table_name === 'girls') {
        if (log.action === 'insert') counts.girls_added++;
        else if (log.action === 'delete') counts.girls_deleted++;
        else if (log.action === 'update') {
          if ('notes' in newV) counts.notes_updated++;
          else counts.personal_updated++;
        }
      } else if (log.table_name === 'registrations') {
        if (log.action === 'insert') {
          const order = newV.preference_order || 'pref_1';
          counts.regs_added[order] = (counts.regs_added[order] || 0) + 1;
        } else if (log.action === 'delete') counts.regs_deleted++;
        else if (log.action === 'update') {
          if ('seminar_id' in newV) counts.regs_updated_seminar++;
          if ('response' in newV) counts.regs_updated_response++;
          if ('class_type' in newV) counts.regs_updated_class++;
        }
      } else if (log.table_name === 'placements') {
        if (log.action === 'insert') {
          counts.plc_added++;
          if (newV.seminar_id) topPlacements[newV.seminar_id] = (topPlacements[newV.seminar_id] || 0) + 1;
          if (newV.status) topStatuses[newV.status] = (topStatuses[newV.status] || 0) + 1;
        } else if (log.action === 'delete') counts.plc_deleted++;
        else if (log.action === 'update') {
          if ('seminar_id' in newV) {
            counts.plc_updated_seminar++;
            if (newV.seminar_id) topPlacements[newV.seminar_id] = (topPlacements[newV.seminar_id] || 0) + 1;
          }
          if ('status' in newV) {
            counts.plc_updated_status++;
            if (newV.status) topStatuses[newV.status] = (topStatuses[newV.status] || 0) + 1;
          }
          if ('is_final' in newV) counts.plc_updated_final++;
        }
      }
    });

    const lines = [];
    const totalRegsAdded = counts.regs_added.pref_1 + counts.regs_added.pref_2 + counts.regs_added.advance;
    if (totalRegsAdded) lines.push(`<b>${totalRegsAdded}</b> רישומי העדפות חדשים`);
    if (counts.regs_updated_seminar) lines.push(`<b>${counts.regs_updated_seminar}</b> שינויי סמינר בהעדפות`);
    if (counts.regs_updated_response) lines.push(`<b>${counts.regs_updated_response}</b> תשובות עודכנו`);
    if (counts.regs_updated_class) lines.push(`<b>${counts.regs_updated_class}</b> ערכי "א-ו" עודכנו`);
    if (counts.plc_added) lines.push(`<b>${counts.plc_added}</b> שיבוצים חדשים`);
    if (counts.plc_updated_seminar) lines.push(`<b>${counts.plc_updated_seminar}</b> שינויי סמינר שיבוץ`);
    if (counts.plc_updated_status) lines.push(`<b>${counts.plc_updated_status}</b> שינויי סטטוס`);
    if (counts.plc_updated_final) lines.push(`<b>${counts.plc_updated_final}</b> שינויי "סופי"`);
    if (counts.notes_updated) lines.push(`<b>${counts.notes_updated}</b> הערות עודכנו`);
    if (counts.personal_updated) lines.push(`<b>${counts.personal_updated}</b> שינויי פרטים אישיים`);

    // מצב נוכחי — נספר מ־ROWS
    let currentLine = '';
    const rows = ROWS || [];
    if (rows.length) {
      // בנות עם רישום העדפה אבל בלי תשובה
      const noResponse = rows.filter(r => {
        const regs = r._regs || [];
        return regs.some(reg => reg.seminar_id && !reg.response);
      }).length;
      // בנות שמחכות לשיבוץ — אין שיבוץ או שיש סטטוס שאינו "סופי" וגם לא חיובי
      const POSITIVE = new Set(['חיובי', 'שיבוץ בהסכמה']);
      const waitingPlacement = rows.filter(r => {
        const plc = r._plc;
        if (!plc || !plc.seminar_id) return true;  // אין שיבוץ
        return !POSITIVE.has(plc.status);  // יש שיבוץ אבל לא חיובי
      }).length;
      const parts = [];
      if (noResponse) parts.push(`<b>${noResponse}</b> בנות ללא תשובה`);
      if (waitingPlacement) parts.push(`<b>${waitingPlacement}</b> בנות מחכות לשיבוץ`);
      if (parts.length) {
        currentLine = `<div style="margin-top:10px; padding-top:8px; border-top:1px dashed #cbd5e1; color:var(--text); font-size:13px;">⏳ נכון לעכשיו: ${parts.join(' · ')}</div>`;
      }
    }

    if (!lines.length && !currentLine) return '';
    return `
      <div style="background:linear-gradient(to left, #f0f9ff, #e0f2fe); padding:14px 18px; border-radius:10px; border:1px solid #bae6fd; margin:12px 14px;">
        ${lines.length ? `
          <div style="font-weight:700; color:var(--deep); font-size:14px; margin-bottom:8px;">📊 סיכום פעילות (${entries.length} פעולות)</div>
          <div style="display:flex; flex-wrap:wrap; gap:6px 16px; font-size:13px; color:var(--text);">
            ${lines.map(l => `<span>• ${l}</span>`).join('')}
          </div>
        ` : ''}
        ${currentLine}
      </div>
    `;
  }

  const summary = buildSummary(data || []);

  const canUndo = (log) => {
    // מאפשר ביטול רק על update פשוט (פחות סיכון cascade)
    if (log.action !== 'update') return false;
    if (!log.old_value || !log.new_value) return false;
    return ['girls', 'registrations', 'placements'].includes(log.table_name);
  };

  const feed = (data || []).map(log => {
    const u = userByUid[log.user_id];
    const userName = u ? (u.full_name || u.email) : 'מערכת';
    const undoBtn = canUndo(log)
      ? `<button class="mini-btn" style="margin-top:4px;" onclick="undoAuditEntry(${log.id})">↶ בטל פעולה זו</button>`
      : '';
    return `
      <div class="feed-item" id="feed_item_${log.id}">
        <div class="feed-when">${dt(log.created_at)}</div>
        <div class="feed-who">${userName}</div>
        <div class="feed-what">${describe(log)}${undoBtn}</div>
      </div>
    `;
  }).join('');

  document.getElementById('modal_body').innerHTML = `
    <div class="modal-header">
      <div style="flex:1">
        <h2>📋 היסטוריית שינויים</h2>
        <div class="subtitle">${data.length} פעולות${cutoff ? '' : ''}</div>
      </div>
      <button class="close" onclick="closeModal()" title="סגור">×</button>
    </div>
    <div class="modal-body">
      <div class="hist-tabs">
        ${tabBtn('today', '📅 היום')}
        ${tabBtn('week', '📆 השבוע')}
        ${tabBtn('all', '🗂 הכל (500 אחרונים)')}
      </div>
      ${summary}
      <div class="form-section" style="padding:0;">
        ${data.length === 0
          ? '<div style="text-align:center; padding:40px; color:var(--muted);">אין פעילות בטווח שבחרת</div>'
          : `<div class="feed-list">${feed}</div>`}
      </div>
    </div>
  `;
  CURRENT_MODAL = null;
  document.getElementById('modal').classList.add('open');
}

function triggerRestore() {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.json';
  inp.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const backup = JSON.parse(text);
      if (!backup.backup_version || !backup.tables) {
        alert('הקובץ לא תקין — חסרים שדות backup_version או tables');
        return;
      }
      const totalRecords = Object.values(backup.tables)
        .filter(t => Array.isArray(t))
        .reduce((s, t) => s + t.length, 0);
      const date = (backup.created_at || '').substring(0, 16).replace('T', ' ');
      const by = backup.created_by || '?';

      if (!confirm(
        `📁 גיבוי מתאריך ${date}\n` +
        `👤 נוצר על ידי ${by}\n` +
        `📊 ${totalRecords.toLocaleString('he-IL')} רשומות\n\n` +
        `⚠️ שחזור ימחק את כל הנתונים הנוכחיים (תלמידות, רישומים, שיבוצים, אחים, סמינרים, מוסדות, רשימות) ויחליף אותם בגיבוי.\n\n` +
        `המשתמשים וההיסטוריה לא יושפעו.\n\n` +
        `להמשיך?`
      )) return;
      if (!confirm('⚠️ אזהרה אחרונה — אין אפשרות לבטל אחרי זה!\n\nבטוח לשחזר?')) return;

      await doRestore(backup);
    } catch (err) {
      console.error(err);
      alert('שגיאה בקריאת הקובץ: ' + err.message);
    }
  };
  inp.click();
}

async function doRestore(backup) {
  toast('מוחק נתונים נוכחיים...');
  const deleteOrder = [
    'siblings', 'placements', 'registrations', 'girls',
    'source_schools', 'seminars',
    'list_categories', 'list_statuses', 'list_responses',
    'list_affiliations', 'list_institution_categories',
    // seasons נשמרת — לא נוגעים
  ];
  const insertOrder = [
    'list_categories', 'list_statuses', 'list_responses',
    'list_affiliations', 'list_institution_categories',
    'source_schools', 'seminars',
    'girls', 'registrations', 'placements', 'siblings',
  ];

  try {
    for (const t of deleteOrder) {
      const { error } = await sb.from(t).delete().gte('id', 0);
      if (error) throw new Error(`מחיקת ${t}: ${error.message}`);
    }

    toast('טוען מהגיבוי...');
    let added = 0;
    for (const t of insertOrder) {
      const rows = backup.tables[t];
      if (!Array.isArray(rows) || rows.length === 0) continue;
      // תאימות לגיבויים ישנים — רשומות בלי season_id יקבלו את העונה הנוכחית
      if (SEASONED_TABLES.has(t) && CURRENT_SEASON_ID) {
        rows.forEach(r => { if (r.season_id == null) r.season_id = CURRENT_SEASON_ID; });
      }
      const chunkSize = 500;
      for (let i = 0; i < rows.length; i += chunkSize) {
        const chunk = rows.slice(i, i + chunkSize);
        const { error } = await sb.from(t).insert(chunk);
        if (error) throw new Error(`הוספת ${t}: ${error.message}`);
        added += chunk.length;
      }
    }

    toast('מאפס מזהים אוטומטיים...');
    await sb.rpc('reset_all_sequences');

    toast(`✓ שחזור הושלם: ${added.toLocaleString('he-IL')} רשומות. המסך יתרענן...`);
    setTimeout(() => location.reload(), 2000);
  } catch (e) {
    console.error(e);
    alert('❌ שגיאה בשחזור:\n' + e.message + '\n\nחלק מהנתונים אולי נמחקו. ייתכן שתצטרך לשחזר ידנית מהגיבוי. פנה לתמיכה אם נחוץ.');
  }
}

async function backupAllData() {
  if (!confirm('להוריד גיבוי מלא של כל הנתונים?\n\nהקובץ יכלול את כל הטבלאות כ־JSON, ניתן לשחזור עתידי. ניתן לשמור את הקובץ ב־Google Drive, Dropbox או כל מקום בטוח.')) return;

  toast('אוסף נתונים... זה לוקח כמה שניות');
  const tables = [
    'seasons',
    'girls', 'registrations', 'placements', 'siblings',
    'seminars', 'source_schools',
    'list_categories', 'list_statuses', 'list_responses',
    'list_affiliations', 'list_institution_categories',
    'user_profiles', 'audit_log',
  ];

  const backup = {
    backup_version: 1,
    app: 'seminar-registration',
    created_at: new Date().toISOString(),
    created_by: CURRENT_USER.email,
    tables: {},
  };

  let totalRows = 0;
  for (const t of tables) {
    try {
      let all = [];
      let from = 0;
      const pageSize = 1000;
      while (true) {
        const { data, error } = await sb.from(t).select('*').range(from, from + pageSize - 1);
        if (error) throw error;
        if (!data || !data.length) break;
        all = all.concat(data);
        if (data.length < pageSize) break;
        from += pageSize;
      }
      backup.tables[t] = all;
      totalRows += all.length;
    } catch (e) {
      console.error(`Backup ${t}:`, e);
      backup.tables[t] = { error: e.message };
    }
  }

  const json = JSON.stringify(backup, null, 2);
  const sizeMB = (json.length / 1024 / 1024).toFixed(2);

  const blob = new Blob([json], { type: 'application/json;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const now = new Date();
  const stamp = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}-${String(now.getMinutes()).padStart(2,'0')}`;
  a.download = `seminar-backup-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  toast(`✓ גיבוי הורד: ${totalRows.toLocaleString('he-IL')} רשומות, ${sizeMB}MB`);
}

async function editUserName(email, span) {
  const current = span.textContent.trim().replace(/—.*/, '').trim();
  const newName = prompt('שם המשתמש:', current);
  if (newName === null) return;
  const trimmed = newName.trim() || null;
  const { error } = await sb.from('user_profiles').update({ full_name: trimmed }).ilike('email', email);
  if (error) { toast('שגיאה: ' + error.message, 'warn'); return; }
  toast('עודכן ✓');
  openManageUsers();
}

async function approveRequest(reqId) {
  const role = document.getElementById(`role_${reqId}`).value;
  if (!confirm(`לאשר את הבקשה ולצור משתמש עם תפקיד: ${ASSIGNABLE_ROLES[role]}?`)) return;
  const { error } = await sb.rpc('approve_access_request', { req_id: reqId, assigned_role: role });
  if (error) { toast('שגיאה: ' + error.message, 'warn'); return; }
  toast('הבקשה אושרה ✓');
  openManageUsers();  // רענון
  refreshPendingBadge();
}

async function rejectRequest(reqId) {
  if (!confirm('לדחות את הבקשה?')) return;
  const { error } = await sb.rpc('reject_access_request', { req_id: reqId });
  if (error) { toast('שגיאה: ' + error.message, 'warn'); return; }
  toast('הבקשה נדחתה');
  openManageUsers();
  refreshPendingBadge();
}

async function refreshPendingBadge() {
  if (!isAdmin()) return;
  const { count } = await sb.from('access_requests').select('*', { count: 'exact', head: true }).eq('status', 'pending');
  const btn = document.getElementById('btn_manage_users');
  if (!btn) return;
  const existing = btn.querySelector('.pending-badge');
  if (existing) existing.remove();
  if (count && count > 0) {
    const badge = document.createElement('span');
    badge.className = 'pending-badge';
    badge.textContent = count;
    badge.style.cssText = 'background:#dc2626; color:white; font-size:11px; font-weight:700; border-radius:10px; padding:1px 6px; margin-right:4px;';
    btn.appendChild(badge);
  }
}

async function addNewUser() {
  const email = document.getElementById('new_user_email').value.trim().toLowerCase();
  const role = document.getElementById('new_user_role').value;
  if (!email || !email.includes('@')) { toast('מייל לא תקין', 'warn'); return; }

  if (error) { toast('שגיאה: ' + error.message, 'warn'); return; }
  toast(`${email} נוסף כ־${ROLE_LABELS[role]} ✓`);
  openManageUsers();

async function toggleUserActive(email, currentlyActive) {

function doDashboardPrint(selection) {
  const dashSection = document.getElementById('dashboard_section');
  if (!dashSection) return;
  const elements = dashSection.querySelectorAll('[data-print-key]');
  const originalDisplay = new Map();
  const detailsPanel = dashSection.querySelector('.details-panel');
  let detailsPanelOriginalDisplay = '';

  if (selection) {
    // הסתרת/הצגה לפי הבחירה
    elements.forEach(el => {
      originalDisplay.set(el, el.style.display);
      const key = el.dataset.printKey;
      if (key === 'splits_row') {
        const anyChild = selection.split_sectors || selection.split_affiliations;
        el.style.display = anyChild ? '' : 'none';
      } else if (selection[key] === false) {
        el.style.display = 'none';
      } else {
        el.style.display = '';
      }
    });

    // אם כל הסטטיסטיקות והחלוקות מוסתרות — מסתיר את כל פאנל הפרטים
    const anyStat = ['stat_registered','stat_pref1','stat_positive','stat_placed','stat_muni','stat_sisters']
      .some(k => selection[k]);
    const anySplit = selection.split_sectors || selection.split_affiliations;
    const detailsAnyContent = anyStat || anySplit;
    if (detailsPanel) {
      detailsPanelOriginalDisplay = detailsPanel.style.display;
      detailsPanel.style.display = detailsAnyContent ? '' : 'none';
    }

    // CSS layout classes — אם רק עוגה או רק פאנל, נותנים רוחב מלא
    const onlyChart = selection.chart && !detailsAnyContent;
    const noChart = !selection.chart && detailsAnyContent;
    document.body.classList.toggle('print-only-chart', onlyChart);
    document.body.classList.toggle('print-no-chart', noChart);
  }

  setTimeout(() => {
    window.print();
    if (selection) {
      elements.forEach(el => {
        const v = originalDisplay.get(el);
        el.style.display = v == null ? '' : v;
      });
      if (detailsPanel) detailsPanel.style.display = detailsPanelOriginalDisplay;
      document.body.classList.remove('print-only-chart', 'print-no-chart');
    }
  }, 200);
}

function buildPrintTitle() {
  const seminars = [...new Set(VIEW.map(r => r.placement_seminar).filter(Boolean))]
    .sort((a, b) => a.localeCompare(b, 'he'));
  const statuses = [...new Set(VIEW.map(r => r.placement_status).filter(Boolean))]
    .sort((a, b) => a.localeCompare(b, 'he'));
  const x = seminars.length ? seminars.join(', ') : '—';
  const y = statuses.length ? statuses.join(', ') : '—';
  const cell = document.getElementById('print_title_cell');
  if (cell) cell.textContent = `דוח שיבוץ (${x}) · סטטוס (${y})`;
}

function doPrint(mode) {
  const saved = COLS.map(c => c.visible);

  const run = () => {
    renderHeader();
    applyFilters();
    buildPrintTitle();
    setTimeout(() => {
      window.print();
      // החזרת המצב הקודם
      COLS.forEach((c, i) => c.visible = saved[i]);
      renderHeader();
      applyFilters();

    COLS.forEach(c => c.visible = true);

    openChoosePrintColumns(saved);

}

function applyProblemsFilter(statuses, includePlaced) {
  // איפוס סינוני עמודות + סטטוס
  Object.values(FILTER_STATE).forEach(s => s.clear());
  Object.keys(COL_FILTERS).forEach(k => COL_FILTERS[k].clear());

  // סטטוסים הנבחרים
  if (!COL_FILTERS.placement_status) COL_FILTERS.placement_status = new Set();
  statuses.forEach(s => COL_FILTERS.placement_status.add(s));

  // לא נבחר "כלול משובצות" → גם לסנן placement_seminar לערכים לא משובצים
  if (!includePlaced) {
    if (!COL_FILTERS.placement_seminar) COL_FILTERS.placement_seminar = new Set();
    UNPLACED_VALUES.forEach(v => COL_FILTERS.placement_seminar.add(v));
  }

  document.querySelectorAll('.ms-wrap').forEach(w => w._updateBtn && w._updateBtn());
  renderHeader();
  applyFilters();

  const btn = document.getElementById('btn_problems');
  btn.classList.add('active-filter');
  toast(`הוחל סינון "דרוש טיפול" (${statuses.length} סטטוסים${includePlaced ? ', כולל משובצות' : ', רק ממתינות'})`);
}

// "תצוגות שמורות" — Supabase (מסונכרן בין כל המכשירים)
// ===============================================
let _savedViewsCache = null;

async function loadSavedViewsFromDB() {
  const { data, error } = await sb.from('saved_views')
    .select('id, user_id, name, state, is_shared, created_at')
    .order('created_at', { ascending: true });
  if (error) { console.error(error); return []; }
  _savedViewsCache = data || [];
  return _savedViewsCache;
}

// תאימות לאחור — קוד ישן שעדיין קורא ל־getSavedViews
function getSavedViews() { return _savedViewsCache || []; }

function getCurrentFilterState() {
  const out = {
    q: document.getElementById('q').value,
    filters: {},
    colFilters: {},
    sortKey, sortDir,
  };
  Object.entries(FILTER_STATE).forEach(([k, v]) => { out.filters[k] = [...v]; });
  Object.entries(COL_FILTERS).forEach(([k, v]) => { out.colFilters[k] = [...(v || [])]; });
  return out;
}

function applyFilterState(state) {
  Object.values(FILTER_STATE).forEach(s => s.clear());
  Object.keys(COL_FILTERS).forEach(k => COL_FILTERS[k].clear());
  document.getElementById('q').value = state.q || '';
  Object.entries(state.filters || {}).forEach(([k, arr]) => {
    if (FILTER_STATE[k]) arr.forEach(v => FILTER_STATE[k].add(v));
  });
  Object.entries(state.colFilters || {}).forEach(([k, arr]) => {
    if (!COL_FILTERS[k]) COL_FILTERS[k] = new Set();
    arr.forEach(v => COL_FILTERS[k].add(v));
  });
  if (state.sortKey) sortKey = state.sortKey;
  if (state.sortDir) sortDir = state.sortDir;
  document.querySelectorAll('.ms-wrap').forEach(w => w._updateBtn && w._updateBtn());
  renderHeader();
  applyFilters();
}

async function openViewsPicker(btn, pop) {
  // טוען מהמסד פעם ראשונה אם לא נטען עדיין
  if (_savedViewsCache === null) await loadSavedViewsFromDB();
  const views = _savedViewsCache || [];
  // הפרדה: שלי / משותפות (לאחרים)
  const myViews = views.filter(v => v.user_id === CURRENT_USER.id);
  const sharedByOthers = views.filter(v => v.user_id !== CURRENT_USER.id);

  const renderRow = (v) => {
    const canDelete = v.user_id === CURRENT_USER.id || isAdmin();
    return `
      <div style="display:flex; align-items:center; gap:4px; padding:4px 6px; border-radius:5px;" class="view-row">
        <span style="flex:1; cursor:pointer; font-weight:500;" onclick="loadView(${v.id})">${v.name}</span>
        ${v.is_shared ? '<span style="font-size:10px; color:#0c4a6e; background:#e0f2fe; padding:1px 6px; border-radius:3px;">משותפת</span>' : ''}
        ${canDelete ? `<button class="mini-btn danger" onclick="deleteView(${v.id})" title="מחק">×</button>` : ''}
      </div>
    `;
  };

  pop.innerHTML = `
    <div class="actions">
      <button type="button" class="close-x" data-act="cancel" title="סגור">×</button>
    </div>
    <button type="button" class="apply-big" data-act="save" style="margin-top:0; margin-bottom:10px;">💾 שמור תצוגה נוכחית</button>
    ${myViews.length || sharedByOthers.length ? '' : '<div style="color:var(--muted); font-size:12px; padding:8px;">אין תצוגות שמורות עדיין</div>'}
    ${myViews.length ? `
      <div style="font-weight:600; color:var(--deep); margin:6px 0; font-size:13px;">שלי:</div>
      <div class="opts">${myViews.map(renderRow).join('')}</div>
    ` : ''}
    ${sharedByOthers.length ? `
      <div style="font-weight:600; color:var(--deep); margin:10px 0 6px; font-size:13px;">משותפות עי אחרים:</div>
      <div class="opts">${sharedByOthers.map(renderRow).join('')}</div>
    ` : ''}
  `;

  pop.style.minWidth = '280px';
  pop.classList.add('open');
  clampPopoverToViewport(pop, btn);

  pop.querySelector('[data-act="save"]').addEventListener('click', async () => {
    const name = prompt('שם התצוגה:');
    if (!name) return;
    const shareConfirm = confirm('לשתף את התצוגה עם שאר המשתמשים?\n\nאישור = משותפת לכל משתמשי המערכת.\nביטול = רק לך.');
    const { error } = await sb.from('saved_views').insert({
      user_id: CURRENT_USER.id,
      name,
      state: getCurrentFilterState(),
      is_shared: shareConfirm,
    });
    if (error) { toast('שגיאה: ' + error.message, 'warn'); return; }
    await loadSavedViewsFromDB();
    openViewsPicker(btn, pop);
    toast('נשמר ✓');
  });
  pop.querySelector('[data-act="cancel"]').addEventListener('click', () => pop.classList.remove('open'));
}

async function loadView(id) {
  const views = getSavedViews();
  const v = views.find(x => x.id === id);
  if (!v) return;
  applyFilterState(v.state);
  document.querySelectorAll('.popover.open').forEach(p => p.classList.remove('open'));
  toast(`נטענה תצוגה: ${v.name}`);
}

async function deleteView(id) {
  const views = getSavedViews();
  const v = views.find(x => x.id === id);

// מסתיר/מציג כפתורים לפי התפקיד
function applyRoleVisibility() {
  if (!CURRENT_USER) return;
  // admin — הכל
  // editor — כל עריכות, ניהול רשימות, אבל לא משתמשים
  // seminar_editor — עריכה inline (מוגבל בצד הלקוח), ללא ניהול רשימות
  // viewer — רק צפייה

  const r = CURRENT_USER.role;
  const hide = (id) => { const el = document.getElementById(id); if (el) el.style.display = 'none'; };

  if (r === 'viewer') {
    hide('btn_edit');
    hide('btn_undo');
    hide('btn_redo');
  }
  if (r === 'viewer' || r === 'seminar_editor') {
    hide('btn_add');
  }
  // admin ו־super_admin רואים רשימות, משתמשים, היסטוריה, גיבוי ושחזור
  if (!isAdmin()) {
    hide('btn_manage_lists');
    hide('btn_history');
    hide('btn_manage_users');
    hide('btn_backup');
    hide('btn_restore');
    hide('btn_load_source');
  }

  // לא־אדמין: מיזוג שורה תחתונה לתוך העליונה (הכל בשורה אחת)
  if (!isAdmin()) {
    const top = document.querySelector('.hdr-top');
    const bottom = document.querySelector('.hdr-bottom');
    if (top && bottom) {
      const userBadge = top.querySelector('.user-badge');
      const stats = top.querySelector('.stats');
      const editToggle = document.getElementById('btn_edit');

      // "מצב עריכה" עובר לימין הסטטיסטיקות (= לפני stats ב־flex flow של RTL)
      if (editToggle && editToggle.style.display !== 'none' && stats) {
        top.insertBefore(editToggle, stats);
      }

      [...bottom.children].forEach(el => {
        if (el.style.display === 'none') return;
        if (el === editToggle) return; // כבר הועבר
        if (el.classList.contains('hdr-sep') || el.classList.contains('hdr-gap')) return;
        if (userBadge) top.insertBefore(el, userBadge);
        else top.appendChild(el);
      });
      bottom.style.display = 'none';
    }
  }
}

function canEditField(col) {
  if (!CURRENT_USER) return false;
  if (!col || !col.edit || col.edit.type === 'readonly') return false;
  const r = CURRENT_USER.role;
  if (r === 'viewer') return false;
  if (r === 'super_admin' || r === 'admin' || r === 'editor') return true;

}

// ממקם popover מתחת לכפתור, אבל מוודא שהוא לא יוצא מגבולות המסך
function clampPopoverToViewport(pop, btn) {
  const r = btn.getBoundingClientRect();
  pop.style.position = 'fixed';
  pop.style.right = 'auto';
  pop.style.left = 'auto';
  pop.style.maxHeight = '';

  // מוודאים שהוא מוצג כדי למדוד
  const wasOpen = pop.classList.contains('open');
  if (!wasOpen) pop.classList.add('open');
  const popW = pop.offsetWidth;
  const popH = pop.offsetHeight;
  if (!wasOpen) pop.classList.remove('open');

  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const spaceBelow = vh - r.bottom - 10;
  const spaceAbove = r.top - 10;

  // אם בטלפון (≤500) ובפנל סינונים פתוח — נדבק לחלון, רוחב כמעט מלא
  const isMobileSheet = vw <= 500 && document.body.classList.contains('mobile-filters-open');
  if (isMobileSheet) {
    pop.style.left = '8px';
    pop.style.right = 'auto';
    pop.style.width = (vw - 16) + 'px';
    pop.style.maxWidth = (vw - 16) + 'px';
  } else {
    // RTL: ליישר את הקצה הימני של הפופ־אפ לקצה הימני של הכפתור
    const desiredLeft = r.right - popW;
    const clampedLeft = Math.max(10, Math.min(desiredLeft, vw - popW - 10));
    pop.style.left = clampedLeft + 'px';
    pop.style.width = '';
    pop.style.maxWidth = (vw - 20) + 'px';
  }

  // גובה: אם הפופ־אפ גבוה ולא נכנס למטה — מציבים אותו מעל הכפתור
  const fitsBelow = popH <= spaceBelow;
  const fitsAbove = popH <= spaceAbove;
  if (fitsBelow) {
    pop.style.top = (r.bottom + 4) + 'px';
    pop.style.bottom = 'auto';
    pop.style.maxHeight = Math.max(200, spaceBelow) + 'px';
  } else if (fitsAbove) {
    pop.style.top = 'auto';
    pop.style.bottom = (vh - r.top + 4) + 'px';
    pop.style.maxHeight = Math.max(200, spaceAbove) + 'px';
  } else {
    // אין מקום בכלל — בוחרים את הצד עם יותר מקום
    if (spaceBelow >= spaceAbove) {
      pop.style.top = (r.bottom + 4) + 'px';
      pop.style.bottom = 'auto';
      pop.style.maxHeight = Math.max(180, spaceBelow) + 'px';
    } else {
      pop.style.top = 'auto';
      pop.style.bottom = (vh - r.top + 4) + 'px';
      pop.style.maxHeight = Math.max(180, spaceAbove) + 'px';
    }
  }
}

// יצוא הטבלה הנוכחית לאקסל — לפי הסינון, הסדר, והעמודות הגלויות
function exportMainTableToExcel() {
  const visibleCols = COLS.filter(c => c.visible);
  if (!visibleCols.length || !VIEW.length) {
    toast('אין נתונים להציג', 'warn');
    return;
  }

  const headers = visibleCols.map(c => c.label);
  const data = VIEW.map(row => {
    const r = {};
    visibleCols.forEach(c => {
      let val = row[c.key];
      // עמודת "אחים" — רק התצוגה (לא רשימה)
      if (c.key === 'sibling_inst_display') val = row.sibling_inst_display;
      // עמודות מערך — חבר עם פסיק
      if (Array.isArray(val)) val = val.join(', ');
      // boolean
      if (typeof val === 'boolean') val = val ? 'כן' : '';
      r[c.label] = (val == null || val === '') ? '' : String(val);
    });
    return r;
  });

  const ws = XLSX.utils.json_to_sheet(data, { header: headers });
  ws['!views'] = [{ RTL: true }];
  ws['!cols'] = visibleCols.map(c => {
    let maxLen = c.label.length;
    data.forEach(row => {
      const v = String(row[c.label] ?? '');
      if (v.length > maxLen) maxLen = v.length;
    });
    return { wch: Math.min(Math.max(maxLen + 4, 10), 60) };
  });

  const wb = XLSX.utils.book_new();
  wb.Workbook = { Views: [{ RTL: true }] };
  const seasonName = (SEASONS.find(s => s.id === CURRENT_SEASON_ID) || {}).name || '';
  const ts = new Date().toISOString().slice(0, 10);
  XLSX.utils.book_append_sheet(wb, ws, 'תלמידות');
  XLSX.writeFile(wb, `רישום סמינרים ${seasonName} ${ts}.xlsx`);
  toast(`יוצאו ${data.length} תלמידות ✓`);
}

// מעביר את כפתורי "עמודות" ו"דרוש טיפול" לפי overflow אמיתי ב־.filters
function arrangeResponsiveHeader() {
  const btnCols = document.getElementById('btn_cols');
  const btnProbs = document.getElementById('btn_problems');
  const filters = document.querySelector('.filters');
  const hdrBottom = document.querySelector('.hdr-bottom');
  const colPicker = document.getElementById('col_picker');
  if (!btnCols || !btnProbs || !filters || !hdrBottom || !colPicker) return;

  // במובייל תמיד מעבירים — אין עצם דיון על זה
  const isMobile = window.innerWidth <= 640;

  // קודם מחזירים למקום הטבעי (.filters) כדי למדוד
  if (btnCols.parentElement !== filters) filters.insertBefore(btnCols, colPicker);
  if (btnProbs.parentElement !== filters) filters.insertBefore(btnProbs, colPicker);

  // בודק אם יש wrap — איזשהו פריט שיורד לשורה השנייה
  const items = Array.from(filters.children).filter(el => !el.classList.contains('popover'));
  if (items.length < 2) return;
  const firstTop = items[0].offsetTop;
  const wrapped = items.some(el => el.offsetTop > firstTop + 5);

  if (isMobile || wrapped) {
    hdrBottom.appendChild(btnCols);
    hdrBottom.appendChild(btnProbs);
  }
}

function triggerLoadStudents() {
  const modeEl = document.querySelector('input[name="students_mode"]:checked');
  const mode = modeEl ? modeEl.value : 'add';
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.xlsx,.xls';
  inp.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      await processLoadStudents(rows, file.name, mode);
    } catch (err) { toast('שגיאה: ' + err.message, 'warn'); console.error(err); }
  };
  inp.click();
}

// ---------- תלמידות ----------
// מוצא שורת כותרת (מזהה לפי "מספר זהות" בעמודה 1 או שדומה)
function _findStudentsHeaderRow(rows) {
  for (let i = 0; i < Math.min(5, rows.length); i++) {
    const r = rows[i] || [];
    const first = String(r[0] || '').trim();
    if (first.includes('זהות') || first.includes('ת.ז') || first.includes('תעודת')) return i;
  }
  return 0;
}

function _normDigits(v) {
  if (v == null) return null;
  const s = String(v).trim();
  const d = s.replace(/\D/g, '');
  return d || null;
}

function _normStr(v) {
  if (v == null) return null;
  const s = String(v).trim();
  return s || null;
}

async function processLoadStudents(rows, filename, mode, opts = {}) {
  const skipConfirm = !!opts.skipConfirm;
  const headerRow = _findStudentsHeaderRow(rows);
  const dataRows = rows.slice(headerRow + 1).filter(r => r.some(c => String(c).trim()));

  if (!dataRows.length) { toast('הקובץ ריק', 'warn'); return; }

  // מיפוי עמודות (לפי סדר הקובץ — ח לתשפז.xlsx)
  // 0:מספר זהות | 1:משפחה | 2:פרטי | 3:תא' לידה | 4:סמל מוסד | 5:שם מוסד |
  // 6:כיתה | 7:מקבילה | 8:ישוב מגורים | 9:רחוב | 10:בית | 11:דירה |
  // 12:זהות אב | 13:שם אב | 14:נייד אב | 15:זהות אם | 16:שם אם | 17:נייד אם
  const students = dataRows.map(r => ({
    national_id: _normDigits(r[0]),
    family_name: _normStr(r[1]),
    first_name: _normStr(r[2]),
    school_code: _normStr(r[4]),
    school_name: _normStr(r[5]),
    address_street: _normStr(r[9]),
    address_number: _normStr(r[10]),
    father_national_id: _normDigits(r[12]),
    father_name: _normStr(r[13]),
    father_phone: _normStr(r[14]),
    mother_national_id: _normDigits(r[15]),
    mother_name: _normStr(r[16]),
    mother_phone: _normStr(r[17]),
  })).filter(s => s.national_id && s.national_id.length >= 6);

  // מפתח מוסד — סמל מוסד בלבד. אם אין סמל, נופלים לשם.
  const schoolKey = (code, name) => code ? `code:${code}` : `name:${name || ''}`;
  const { data: existingSchools } = await sb.from('source_schools').select('id,name,institution_code').eq('season_id', CURRENT_SEASON_ID);
  const schoolMap = {};
  (existingSchools || []).forEach(s => { schoolMap[schoolKey(s.institution_code, s.name)] = s.id; });

  const newSchools = [];
  const newSchoolKeys = new Set();
  students.forEach(s => {
    if (!s.school_name && !s.school_code) return;
    const k = schoolKey(s.school_code, s.school_name);
    if (!schoolMap[k] && !newSchoolKeys.has(k)) {
      newSchoolKeys.add(k);
      newSchools.push({ name: s.school_name, institution_code: s.school_code, sector: 'חסר קטגוריה', gender: null, season_id: CURRENT_SEASON_ID });
    }
  });

  // אישור + מסלול לפי mode
  const { data: existingGirls } = await sb.from('girls').select('id,national_id').eq('season_id', CURRENT_SEASON_ID);
  const girlMap = {};
  (existingGirls || []).forEach(g => { girlMap[g.national_id] = g.id; });

  let msg;
  if (mode === 'replace') {
    msg = `📘 ${filename}\n\n` +
      `⚠️ מצב: החלפה מלאה ⚠️\n\n` +
      `ימחק לחלוטין:\n` +
      `  • ${existingGirls.length} תלמידות קיימות\n` +
      `  • כל הרישומים, השיבוצים, ההערות והאחים שלהן\n\n` +
      `ויטענו מהקובץ:\n` +
      `  • ${students.length} תלמידות חדשות\n` +
      `  • ${newSchools.length} מוסדות חדשים (עם "חסר קטגוריה", gender ריק)\n\n` +
      `⚠️ אין אפשרות לבטל. המשך?`;
  } else {
    const newGirls = students.filter(s => !girlMap[s.national_id]).length;
    const updGirls = students.length - newGirls;
    msg = `📘 ${filename}\n\n` +
      `📊 ${students.length} תלמידות בקובץ\n` +
      `  • ${newGirls} חדשות יתווספו\n` +
      `  • ${updGirls} קיימות יתעדכנו (פרטי בסיס בלבד)\n` +
      `  • ${newSchools.length} מוסדות חדשים (עם "חסר קטגוריה", gender ריק)\n\n` +
      `רישומים / שיבוצים / הערות — לא ייגעו. להמשיך?`;
  }
  if (!skipConfirm) {
    if (!confirm(msg)) return;
    if (mode === 'replace' && !confirm('⚠️ אזהרה אחרונה! כל הנתונים הקיימים יימחקו.\n\nבטוח?')) return;
  }

  toast('טוען... המתן');

  // אם מצב "החלפה" — מחיקה של נתוני העונה הנוכחית בלבד (לא שאר העונות!)
  if (mode === 'replace') {
    // סדר FK: siblings + placements + registrations → girls
    let err;
    ({ error: err } = await sb.from('siblings').delete().eq('season_id', CURRENT_SEASON_ID));
    if (err) { toast('שגיאה במחיקת אחים: ' + err.message, 'warn'); return; }
    ({ error: err } = await sb.from('placements').delete().eq('season_id', CURRENT_SEASON_ID));
    if (err) { toast('שגיאה במחיקת שיבוצים: ' + err.message, 'warn'); return; }
    ({ error: err } = await sb.from('registrations').delete().eq('season_id', CURRENT_SEASON_ID));
    if (err) { toast('שגיאה במחיקת רישומים: ' + err.message, 'warn'); return; }
    ({ error: err } = await sb.from('girls').delete().eq('season_id', CURRENT_SEASON_ID));
    if (err) { toast('שגיאה במחיקת תלמידות: ' + err.message, 'warn'); return; }
    // אחרי מחיקה — girlMap ריק
    Object.keys(girlMap).forEach(k => delete girlMap[k]);
  }

  // 1. מוסדות חדשים
  if (newSchools.length) {
    const { data: inserted, error } = await sb.from('source_schools').insert(newSchools).select();
    if (error) { toast('שגיאה בהוספת מוסדות: ' + error.message, 'warn'); return; }
    inserted.forEach(s => { schoolMap[schoolKey(s.institution_code, s.name)] = s.id; });
  }

  // 2. תלמידות — INSERT לחדשות, UPDATE רק שדות בקובץ לקיימות
  const toInsert = [], toUpdate = [];
  students.forEach(s => {
    const sid = schoolMap[schoolKey(s.school_code, s.school_name)] || null;
    const baseFields = {
      family_name: s.family_name || '—',
      first_name: s.first_name || '—',
      source_school_id: sid,
      address_street: s.address_street,
      address_number: s.address_number,
      father_national_id: s.father_national_id,
      father_name: s.father_name,
      father_phone: s.father_phone,
      mother_national_id: s.mother_national_id,
      mother_name: s.mother_name,
      mother_phone: s.mother_phone,
    };
    if (girlMap[s.national_id]) {
      toUpdate.push({ id: girlMap[s.national_id], ...baseFields });
    } else {
      toInsert.push({ national_id: s.national_id, ...baseFields, season_id: CURRENT_SEASON_ID });
    }
  });

  // INSERT בפעימות
  const BATCH = 200;
  for (let i = 0; i < toInsert.length; i += BATCH) {
    const batch = toInsert.slice(i, i + BATCH);
    const { error } = await sb.from('girls').insert(batch);
    if (error) { toast('שגיאה בהוספה: ' + error.message, 'warn'); console.error(error); return; }
  }

  // UPDATE בלולאה (פר רשומה — כל אחת ערכים שונים)
  for (let i = 0; i < toUpdate.length; i++) {
    const { id, ...fields } = toUpdate[i];
    const { error } = await sb.from('girls').update(fields).eq('id', id);
    if (error) { toast(`שגיאה בעדכון (רשומה ${i+1}): ` + error.message, 'warn'); console.error(error); return; }
  }

  toast(`✓ ${toInsert.length} נוספו, ${toUpdate.length} עודכנו, ${newSchools.length} מוסדות חדשים`);
  closeModal();
  setTimeout(() => location.reload(), 1500);
}

// ---------- אחים ----------
// פירוק טקסט "אחים/אחיות" — פורמט: ", 267922,אבא שאול בנימין-שערי תלמוד יב , ..."
function _parseSiblingsText(text) {
  if (!text) return [];
  const parts = text.split(/\s*,\s*(?=\d{4,6}\s*,)/);
  const out = [];
  for (let p of parts) {
    p = p.trim().replace(/^,+/, '').trim();
    if (!p) continue;
    // pattern: CODE,NAME-INST GRADE
    const m = p.match(/^(\d+)\s*,\s*(.+?)-([^-]+?)\s+([א-ת]{1,3})\s*$/);
    if (m) {
      out.push({
        institution_code: m[1],
        institution_name: m[3].trim(),
        sibling_name: m[2].trim(),
        grade: m[4].trim(),
      });
    } else {
      out.push({ institution_code: null, institution_name: null, sibling_name: null, grade: null, raw: p });
    }
  }
  return out;
}

async function processLoadSiblings(rows, filename) {
  // שורה 1 = כותרות. A=mzeut, O=Ahim (index 0 ו-14)
  const dataRows = rows.slice(1).filter(r => r.some(c => String(c).trim()));
  if (!dataRows.length) { toast('הקובץ ריק', 'warn'); return; }

  const map = new Map();  // national_id → text
  dataRows.forEach(r => {
    const nid = _normDigits(r[0]);
    const text = _normStr(r[14]);
    if (nid && text) map.set(nid, text);
  });

  // מצא את כל הבנות לפי ת.ז
  const nids = [...map.keys()];
  if (!nids.length) { toast('אין שורות תקינות', 'warn'); return; }

  const { data: girlsData } = await sb.from('girls').select('id,national_id').eq('season_id', CURRENT_SEASON_ID).in('national_id', nids);
  const girlByNid = {};
  (girlsData || []).forEach(g => { girlByNid[g.national_id] = g.id; });

  const matched = nids.filter(n => girlByNid[n]).length;
  const unmatched = nids.length - matched;

  // פירוק כל הטקסטים וחישוב מוסדות חדשים
  const allSiblings = [];  // {girl_id, institution_code, institution_name, sibling_name, grade}
  const sibInsts = new Map();  // code|name → {code, name}

  for (const [nid, text] of map.entries()) {
    const girlId = girlByNid[nid];
    if (!girlId) continue;
    const sibs = _parseSiblingsText(text);
    sibs.forEach(s => {
      allSiblings.push({
        girl_id: girlId,
        institution_code: s.institution_code,
        institution_name: s.institution_name,
        sibling_name: s.sibling_name,
        grade: s.grade,
        raw_text: s.raw || null,
      });
      if (s.institution_name) {
        const k = `${s.institution_code || ''}|${s.institution_name}`;
        if (!sibInsts.has(k)) sibInsts.set(k, { code: s.institution_code, name: s.institution_name });
      }
    });
  }

  // מוסדות שכבר קיימים בעונה הנוכחית — מפתח לפי סמל מוסד (אם אין, לפי שם)
  const { data: existingSchools } = await sb.from('source_schools').select('id,name,institution_code,sector').eq('season_id', CURRENT_SEASON_ID);
  const schoolKey = (code, name) => code ? `code:${code}` : `name:${name || ''}`;
  const schoolKeys = new Set();
  (existingSchools || []).forEach(s => schoolKeys.add(schoolKey(s.institution_code, s.name)));

  // בניית מפה מחדש של sibInsts לפי המפתח החדש (code בלבד כשיש, אחרת name)
  const newInsts = [];
  const newKeys = new Set();
  sibInsts.forEach(v => {
    const k = schoolKey(v.code, v.name);
    if (!schoolKeys.has(k) && !newKeys.has(k)) {
      newKeys.add(k);
      newInsts.push({ name: v.name, institution_code: v.code, sector: 'חסר קטגוריה', gender: null, season_id: CURRENT_SEASON_ID });
    }
  });

  const ok = confirm(
    `👨‍👩‍👧 ${filename}\n\n` +
    `📊 ${nids.length} שורות בקובץ\n` +
    `  • ${matched} מהן תואמות לתלמידות קיימות\n` +
    `  • ${unmatched} לא נמצאה התאמה (ידולגו)\n\n` +
    `🔁 ${allSiblings.length} אחים יוחלפו (ימחקו ויתווספו)\n` +
    `🏫 ${newInsts.length} מוסדות חדשים יתווספו עם "חסר קטגוריה"\n\n` +
    `להמשיך?`
  );
  if (!ok) return;

  toast('טוען... המתן');

  // 1. מוסדות חדשים
  if (newInsts.length) {
    const { error } = await sb.from('source_schools').insert(newInsts);
    if (error) { toast('שגיאה במוסדות: ' + error.message, 'warn'); return; }
  }

  // 2. מחיקת אחים קודמים של הבנות המתאימות
  const matchedGirlIds = [...new Set(allSiblings.map(s => s.girl_id))];
  if (matchedGirlIds.length) {
    const { error } = await sb.from('siblings').delete().in('girl_id', matchedGirlIds);
    if (error) { toast('שגיאה במחיקה: ' + error.message, 'warn'); return; }
  }

  // 3. הכנסת האחים החדשים בפעימות
  const BATCH = 300;
  for (let i = 0; i < allSiblings.length; i += BATCH) {
    const batch = allSiblings.slice(i, i + BATCH);
    const { error } = await sb.from('siblings').insert(batch);
    if (error) { toast('שגיאה בהכנסה: ' + error.message, 'warn'); console.error(error); return; }
  }

  toast(`✓ נטענו ${allSiblings.length} אחים + ${newInsts.length} מוסדות חדשים`);
  closeModal();
  setTimeout(() => location.reload(), 1500);
}
</script>
</body>
</html>
