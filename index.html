let SECTIONS_STATE = loadSectionsState();

function toggleSection(key) {
  SECTIONS_STATE[key] = !SECTIONS_STATE[key];
  saveSectionsState(SECTIONS_STATE);
  // רענון של הסקציה הספציפית
  const el = document.querySelector(`.form-section[data-section="${key}"]`);
  if (el) {
    el.classList.toggle('collapsed', !!SECTIONS_STATE[key]);
    const ind = el.querySelector('.collapse-ind');
    if (ind) ind.textContent = SECTIONS_STATE[key] ? '+' : '−';
  }
}

function openModal(nid) {
  const r = ROWS.find(x => x.national_id === nid);
  if (!r) return;
  CURRENT_MODAL = { row: r, pending: {}, isNew: false, editing: false };
  renderModalBody();
  document.getElementById('modal').classList.add('open');
}

function openAddModal() {
  CURRENT_MODAL = {
    row: {
      id: null, national_id: '', first_name: '', family_name: '',
      source_school_id: null, sector: '', community: '',
      address_street: '', address_number: '',
      mother_name: '', mother_national_id: '', mother_phone: '',
      father_name: '', father_national_id: '', father_phone: '',
      email: '', notes: '',
      _regs: [], _plc: {}, siblings: [],
    },
    pending: {}, isNew: true, editing: true, // בתוספת — תמיד במצב עריכה
  };
  renderModalBody();
  document.getElementById('modal').classList.add('open');
}

function toggleModalEdit() {
  if (!CURRENT_MODAL) return;
  CURRENT_MODAL.editing = !CURRENT_MODAL.editing;
  renderModalBody();
}

function closeModal() {
  CURRENT_MODAL = null;
  document.getElementById('modal').classList.remove('open');
}

function _esc(v) { return String(v == null ? '' : v).replace(/"/g, '&quot;'); }

function renderModalBody() {
  if (!CURRENT_MODAL) return;
  const { row: r, isNew, editing } = CURRENT_MODAL;
  // Viewer לעולם לא עורך
  const isViewer = CURRENT_USER && CURRENT_USER.role === 'viewer';
  const editable = (editing || isNew) && !isViewer;
  const isSeminarOnly = CURRENT_USER && CURRENT_USER.role === 'seminar_editor';
  // שדות שמותרים ל־seminar_editor לערוך
  const SEM_FIELDS = new Set([
    'reg_pref_1_seminar', 'reg_pref_1_response', 'reg_pref_1_class',
    'reg_pref_2_seminar', 'reg_pref_2_response', 'reg_pref_2_class',
    'reg_advance_seminar',
    'plc_seminar', 'plc_status', 'plc_is_final',
    'notes',
  ]);

  // helper: שורה עם תווית + שדה
  const fld = (label, key, value, opts = {}) => {
    const { type = 'text', values = null } = opts;
    // seminar_editor — חסום שדות שאינם סמינריים
    const blockedForSeminar = isSeminarOnly && !SEM_FIELDS.has(key);
    const effectiveEditable = editable && !blockedForSeminar;
    if (!effectiveEditable) {
      // בתצוגה — source_school צריך להפוך id לשם
      let displayValue = value;
      if (type === 'source_school' && value) {
        const s = DATA.source_schools.find(x => x.id === value);
        displayValue = s ? `${s.name}${s.institution_code ? ' ('+s.institution_code+')' : ''}` : '—';
      }
      const isEmpty = displayValue == null || displayValue === '' || displayValue === false;
      const display = isEmpty ? '—' :
        (type === 'checkbox' ? (displayValue ? '✓ כן' : '—') : displayValue);
      return `<label>${label}</label><div class="readonly${isEmpty ? ' empty' : ''}">${display}</div>`;
    }
    if (type === 'enum') {
      return `<label>${label}</label>
        <select data-field="${key}">
          <option value=""></option>
          ${values.map(v => `<option value="${_esc(v)}" ${v === value ? 'selected' : ''}>${v}</option>`).join('')}
        </select>`;
    }
    if (type === 'seminar') {
      const names = DATA.seminars.map(s => s.name).sort((a,b)=>a.localeCompare(b,'he'));
      return `<label>${label}</label>
        <select data-field="${key}">
          <option value=""></option>
          ${names.map(n => `<option value="${_esc(n)}" ${n === value ? 'selected' : ''}>${n}</option>`).join('')}
        </select>`;
    }
    if (type === 'source_school') {
      const schools = DATA.source_schools.filter(s => s.gender === 'בנות').sort((a,b)=>a.name.localeCompare(b.name,'he'));
      return `<label>${label}</label>
        <select data-field="${key}">
          <option value=""></option>
          ${schools.map(s => `<option value="${s.id}" ${s.id === value ? 'selected' : ''}>${s.name}${s.institution_code?' ('+s.institution_code+')':''}</option>`).join('')}
        </select>`;
    }
    if (type === 'textarea') {
      return `<label>${label}</label><textarea data-field="${key}" rows="2">${value || ''}</textarea>`;
    }
    if (type === 'checkbox') {
      return `<label>${label}</label>
        <div><input type="checkbox" data-field="${key}" ${value ? 'checked' : ''}></div>`;
    }
    return `<label>${label}</label><input type="text" data-field="${key}" value="${_esc(value)}">`;
  };

  const title = isNew ? '+ תלמידה חדשה' : `${r.family_name || ''} ${r.first_name || ''}`;
  const subtitle = isNew ? 'מלא את הפרטים ולחץ "הוסף"' : `ת.ז ${r.national_id} · ${r.sector_bucket || ''}`;

  // רישומים — 3 סוגים
  const regFor = (order) => (r._regs || []).find(x => x.preference_order === order) || {};
  const p1 = regFor('pref_1'), p2 = regFor('pref_2'), pa = regFor('advance');
  const semNameFromId = (id) => (DATA.seminars.find(s => s.id === id) || {}).name || '';

  // שיבוץ
  const plc = (r._plc && r._plc.girl_id) ? r._plc : {};

  // viewer לא רואה את ה־toggle בכלל
  const editSwitch = (isNew || isViewer) ? '' : `
    <label class="edit-switch ${editing ? 'on' : ''}">
      <input type="checkbox" ${editing ? 'checked' : ''} onchange="toggleModalEdit()">
      ✎ ערוך
    </label>`;

  // helper: יוצר section עם כותרת ניתנת לקיפול
  const section = (key, title, innerHtml) => {
    const collapsed = !!SECTIONS_STATE[key];
    const sign = collapsed ? '+' : '−';
    return `<div class="form-section ${collapsed ? 'collapsed' : ''}" data-section="${key}">
      <h3 onclick="toggleSection('${key}')">
        <span>${title}</span>
        <span class="collapse-ind">${sign}</span>
      </h3>
      <div class="section-body">${innerHtml}</div>
    </div>`;
  };

  const body = `
    <div class="modal-header">
      <div style="flex:1">
        <h2>${title}</h2>
        <div class="subtitle">${subtitle}</div>
      </div>
      ${editSwitch}
      <button class="close" onclick="closeModal()" title="סגור">×</button>
    </div>
    <div class="modal-body">
    ${section('personal', 'פרטים אישיים', `
      <div class="form-grid">
        ${fld('משפחה', 'family_name', r.family_name)}
        ${fld('שם', 'first_name', r.first_name)}
        ${fld('ת.ז', 'national_id', r.national_id)}
        ${fld('יסודי', 'source_school_id', r.source_school_id, { type: 'source_school' })}
        <label>קבוצה</label><div class="readonly${!r.sector_bucket ? ' empty' : ''}">${r.sector_bucket || '—'}</div>
        ${fld('שיוך', 'sector', r.sector, { type: 'enum', values: ENUM_AFFILIATION })}
        ${fld('קהילה', 'community', r.community)}
        ${fld('רחוב', 'address_street', r.address_street)}
        ${fld('מס\' בית', 'address_number', r.address_number)}
      </div>
    `)}

    ${section('parents', 'הורים', `
      <div class="form-grid">
        ${fld('שם אם', 'mother_name', r.mother_name)}
        ${fld('ת.ז אם', 'mother_national_id', r.mother_national_id)}
        ${fld('טלפון אם', 'mother_phone', r.mother_phone)}
        ${fld('שם אב', 'father_name', r.father_name)}
        ${fld('ת.ז אב', 'father_national_id', r.father_national_id)}
        ${fld('טלפון אב', 'father_phone', r.father_phone)}
        ${fld('מייל', 'email', r.email)}
      </div>
    `)}

    ${section('registration', 'רישום / העדפות', `
      <div class="form-grid">
        ${fld('העדפה 1', 'reg_pref_1_seminar',  semNameFromId(p1.seminar_id), { type: 'seminar' })}
        ${fld('תשובה 1', 'reg_pref_1_response', p1.response,                 { type: 'enum', values: ENUM_RESPONSE })}
        ${fld('א-ו 1',   'reg_pref_1_class',    p1.class_type,               { type: 'enum', values: ENUM_CLASS })}
        ${fld('העדפה 2', 'reg_pref_2_seminar',  semNameFromId(p2.seminar_id), { type: 'seminar' })}
        ${fld('תשובה 2', 'reg_pref_2_response', p2.response,                 { type: 'enum', values: ENUM_RESPONSE })}
        ${fld('א-ו 2',   'reg_pref_2_class',    p2.class_type,               { type: 'enum', values: ENUM_CLASS })}
        ${fld('מקדמת',   'reg_advance_seminar', semNameFromId(pa.seminar_id), { type: 'seminar' })}
      </div>
    `)}

    ${section('placement', 'שיבוץ', `
      <div class="form-grid">
        ${fld('סמינר',  'plc_seminar',  semNameFromId(plc.seminar_id), { type: 'seminar' })}
        ${fld('סטטוס',  'plc_status',   plc.status,                    { type: 'enum', values: ENUM_STATUS })}
        ${fld('סופי',   'plc_is_final', plc.is_final,                  { type: 'checkbox' })}
      </div>
    `)}

    ${section('note', 'הערה', `
      <div class="form-grid">
        ${fld('', 'notes', r.notes, { type: 'textarea' })}
      </div>
    `)}

    ${!isNew ? section('siblings', `אחים/אחיות (${(r.siblings || []).length})`, `
      ${(r.siblings || []).length ? `<table style="width:100%; font-size:13px;">
        <thead><tr><th>שם</th><th>מוסד</th><th>סמל</th><th>כיתה</th></tr></thead>
        <tbody>${(r.siblings).slice(0, 30).map(s => `<tr>
          <td>${s.sibling_name || s.raw_text || ''}</td>
          <td>${s.institution_name || ''}</td>
          <td>${s.institution_code || ''}</td>
          <td>${s.grade || ''}</td>
        </tr>`).join('')}</tbody>
      </table>` : '<div style="color:var(--muted)">אין רשומות אחים</div>'}
    `) : ''}

    ${editable ? `
      <div class="form-actions">
        ${!isNew && canDeleteGirls() ? '<button class="delete-btn" onclick="confirmDeleteGirl()">🗑 מחק תלמידה</button>' : ''}
        <button class="cancel-btn" onclick="closeModal()">ביטול</button>
        <button class="save-btn" onclick="saveModal()">${isNew ? '+ הוסף תלמידה' : 'שמור שינויים'}</button>
      </div>
    ` : ''}
    </div>
  `;

  document.getElementById('modal_body').innerHTML = body;

  // האזן לשינויים
  document.getElementById('modal_body').querySelectorAll('[data-field]').forEach(el => {
    const onChange = () => {
      const key = el.dataset.field;
      const val = el.type === 'checkbox' ? el.checked
        : (el.value === '' ? null : el.value);
      CURRENT_MODAL.pending[key] = val;
    };
    el.addEventListener('input', onChange);
    el.addEventListener('change', onChange);
  });
}

async function saveModal() {
  if (!CURRENT_MODAL) return;
  const { row: r, pending, isNew } = CURRENT_MODAL;

  if (Object.keys(pending).length === 0 && !isNew) {
    toast('אין שינויים לשמור');
    closeModal();
    return;
  }

  try {
    if (isNew) {
      await _createNewGirl(pending);
    } else {
      await _applyModalChanges(r, pending);
    }
    toast(isNew ? 'תלמידה נוספה ✓' : 'נשמר ✓');
    // רענון מלא (הכי פשוט)
    await reloadData();
    closeModal();
  } catch (e) {
    console.error(e);
    toast('שגיאה: ' + (e.message || e), 'warn');
  }
}

async function _createNewGirl(pending) {
  if (!pending.national_id || !pending.first_name || !pending.family_name) {
    throw new Error('חובה למלא: ת.ז, שם, משפחה');
  }
  // girls insert
  const girlFields = ['national_id','first_name','family_name','source_school_id','sector','community','address_street','address_number','mother_name','mother_national_id','mother_phone','father_name','father_national_id','father_phone','email','notes'];
  const girlRow = {};
  girlFields.forEach(k => {
    if (pending[k] !== undefined) girlRow[k] = pending[k];
  });
  girlRow.season_id = CURRENT_SEASON_ID;
  const { data: newGirl, error } = await sb.from('girls').insert(girlRow).select().single();
  if (error) throw error;
  // אם יש רישומים/שיבוצים ב־pending — נוסיף גם
  await _saveRegAndPlacement(newGirl.id, pending);
  await auditLog('girls', newGirl.id, 'insert', null, girlRow);
}

async function _applyModalChanges(row, pending) {
  // עדכוני girls
  const girlUpdate = {};
  ['national_id','first_name','family_name','source_school_id','sector','community','address_street','address_number','mother_name','mother_national_id','mother_phone','father_name','father_national_id','father_phone','email','notes'].forEach(k => {
    if (pending[k] !== undefined) girlUpdate[k] = pending[k];
  });
  const oldValues = {};
  Object.keys(girlUpdate).forEach(k => { oldValues[k] = row[k]; });

  if (Object.keys(girlUpdate).length > 0) {
    const { error } = await sb.from('girls').update(girlUpdate).eq('id', row.id);
    if (error) throw error;
    await auditLog('girls', row.id, 'update', oldValues, girlUpdate);
  }

  await _saveRegAndPlacement(row.id, pending, row);
}

async function _saveRegAndPlacement(girl_id, pending, oldRow = null) {
  const semIdByName = (n) => (DATA.seminars.find(s => s.name === n) || {}).id || null;

  // רישומים
  for (const order of ['pref_1', 'pref_2', 'advance']) {
    const semKey = `reg_${order}_seminar`;
    const respKey = `reg_${order}_response`;
    const classKey = `reg_${order}_class`;
    const touched = [semKey, respKey, classKey].some(k => pending[k] !== undefined);
    if (!touched) continue;

    const existing = oldRow ? (oldRow._regs || []).find(r => r.preference_order === order) : null;
    const payload = { girl_id, preference_order: order };
    if (pending[semKey] !== undefined) payload.seminar_id = semIdByName(pending[semKey]);
    if (pending[respKey] !== undefined) payload.response = pending[respKey];
    if (pending[classKey] !== undefined) payload.class_type = pending[classKey];

    if (existing) {
      const upd = {};
      if ('seminar_id' in payload) upd.seminar_id = payload.seminar_id;
      if ('response' in payload)   upd.response = payload.response;
      if ('class_type' in payload) upd.class_type = payload.class_type;
      const { error } = await sb.from('registrations').update(upd).eq('id', existing.id);
      if (error) throw error;
    } else {
      payload.season_id = CURRENT_SEASON_ID;
      const { error } = await sb.from('registrations').insert(payload);
      if (error) throw error;
    }
  }

  // שיבוץ
  const plcKeys = ['plc_seminar','plc_status','plc_is_final','plc_notes'];
  if (plcKeys.some(k => pending[k] !== undefined)) {
    const existing = oldRow && oldRow._plc && oldRow._plc.girl_id ? oldRow._plc : null;
    const payload = { girl_id };
    if (pending.plc_seminar !== undefined)  payload.seminar_id = semIdByName(pending.plc_seminar);
    if (pending.plc_status !== undefined)   payload.status = pending.plc_status;
    if (pending.plc_is_final !== undefined) payload.is_final = !!pending.plc_is_final;
    if (pending.plc_notes !== undefined)    payload.notes = pending.plc_notes;

    if (existing) {
      const upd = { ...payload };
      delete upd.girl_id;
      const { error } = await sb.from('placements').update(upd).eq('id', existing.id);
      if (error) throw error;
    } else {
      payload.season_id = CURRENT_SEASON_ID;
      const { error } = await sb.from('placements').insert(payload);
      if (error) throw error;
    }
  }
}

async function confirmDeleteGirl() {
  if (!CURRENT_MODAL) return;
  const r = CURRENT_MODAL.row;
  if (!r.id) return;
  if (!confirm(`⚠️ אתה עומד למחוק את ${r.family_name} ${r.first_name} לצמיתות.\nכל הרישומים, השיבוצים והאחים שלה יימחקו גם כן.\n\nהאם אתה בטוח?`)) return;
  try {
    const oldData = { ...r };
    const { error } = await sb.from('girls').delete().eq('id', r.id);
    if (error) throw error;
    await auditLog('girls', r.id, 'delete', oldData, null);
    toast(`${r.family_name} ${r.first_name} נמחקה`);
    await reloadData();
    closeModal();
  } catch (e) {
    toast('שגיאה במחיקה: ' + (e.message || e), 'warn');
  }
}

async function reloadData() {
  const [girls, regs, plcs, sibs, sems, schools] = await Promise.all([
    loadAll('girls'), loadAll('registrations'), loadAll('placements'),
    loadAll('siblings'), loadAll('seminars'), loadAll('source_schools'),
  ]);
  DATA = { girls, registrations: regs, placements: plcs, siblings: sibs, seminars: sems, source_schools: schools };
  buildRows();
  updateStats();
  applyFilters();
  // אם הדשבורד פתוח — רענן אותו
  if (document.body.classList.contains('view-dashboard')) {
    DASH.data = VIEW.slice();
    renderDashboard();
  }
}

// הרשמה ל־Realtime: כל שינוי בטבלאות מרענן את הנתונים
function subscribeRealtime() {
  let reloadTimer = null;
  const schedule = () => {
    clearTimeout(reloadTimer);
    reloadTimer = setTimeout(() => reloadData(), 800);  // debounce
  };
  sb.channel('data-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'girls' }, schedule)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'registrations' }, schedule)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'placements' }, schedule)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'siblings' }, schedule)
    .subscribe();
}

async function auditLog(table_name, record_id, action, old_value, new_value) {
  try {
    await sb.from('audit_log').insert({
      table_name, record_id, action,
      old_value: old_value ? JSON.parse(JSON.stringify(old_value)) : null,
      new_value: new_value ? JSON.parse(JSON.stringify(new_value)) : null,
      season_id: CURRENT_SEASON_ID,
    });
  } catch (e) {
    console.error('audit log failed:', e);
  }
}

// ============================================================
// Undo / Redo (session-only)
// ============================================================
const UNDO_STACK = [];
const REDO_STACK = [];

function pushUndo(op) {
  UNDO_STACK.push(op);
  REDO_STACK.length = 0;
  updateUndoButtons();
}

function updateUndoButtons() {
  document.getElementById('btn_undo').disabled = !UNDO_STACK.length;
  document.getElementById('btn_redo').disabled = !REDO_STACK.length;
}

async function doUndo() {
  if (!UNDO_STACK.length) return;
  const op = UNDO_STACK.pop();
  try {
    await op.undo();
    REDO_STACK.push(op);
    toast('בוטל: ' + op.description);
    await reloadData();
  } catch (e) {
    console.error(e);
    toast('ביטול נכשל: ' + (e.message || e), 'warn');
    UNDO_STACK.push(op); // החזר
  }
  updateUndoButtons();
}

async function doRedo() {
  if (!REDO_STACK.length) return;
  const op = REDO_STACK.pop();
  try {
    await op.redo();
    UNDO_STACK.push(op);
    toast('בוצע שוב: ' + op.description);
    await reloadData();
  } catch (e) {
    console.error(e);
    toast('ביצוע נכשל: ' + (e.message || e), 'warn');
    REDO_STACK.push(op);
  }
  updateUndoButtons();
}

  data: null,          // snapshot של הנתונים (VIEW בזמן פתיחה)
  chart: null,         // מופע Chart.js
  sectorBreakdown: false,
  selectedSeminar: null,

function switchView(view) {
  document.body.classList.toggle('view-dashboard', view === 'dashboard');
  document.getElementById('btn_view_table').classList.toggle('active', view === 'table');
  document.getElementById('btn_view_dashboard').classList.toggle('active', view === 'dashboard');
  if (view === 'dashboard') {
    // צילום של VIEW הנוכחית לשימוש פנימי
    DASH.data = VIEW.slice();
    DASH.selectedSeminar = null;
    renderDashboard();
  }
}

function renderDashboard() {
  renderKPIs();
  renderPlacementChart();
  renderDetailsPanel();
  // הודעת סינון + כפתור "הצג הכל"
  const info = document.getElementById('dash_filter_info');
  const btnShowAll = document.getElementById('btn_dash_show_all');
  const isFiltered = DASH.data.length !== ROWS.length;
  info.textContent = isFiltered
    ? `· מסונן: ${DASH.data.length} מתוך ${ROWS.length}`
    : `· ${ROWS.length} תלמידות`;

}

function dashShowAll() {
  DASH.data = ROWS.slice();
  DASH.selectedSeminar = null;
  renderDashboard();
}

function renderKPIs() {
  const rows = DASH.data;
  const total = rows.length;
  const placed = rows.filter(r => r.placement_seminar && !['עדיין לא שובץ','מקדמת',''].includes(r.placement_seminar)).length;
  const pending = total - placed;
  const committee = rows.filter(r => ['ועדת רבנים','לבירור'].includes(r.placement_status)).length;

  document.getElementById('kpi_row').innerHTML = `
    <div class="kpi-card">
      <span class="label">סה"כ תלמידות</span>
      <span class="value">${total.toLocaleString('he-IL')}</span>
    </div>
    <div class="kpi-card good">
      <span class="label">שובצו</span>
      <span class="value">${placed.toLocaleString('he-IL')} <span class="pct">${total ? Math.round(100 * placed / total) : 0}%</span></span>
    </div>
    <div class="kpi-card warn">
      <span class="label">ממתינות</span>
      <span class="value">${pending.toLocaleString('he-IL')} <span class="pct">${total ? Math.round(100 * pending / total) : 0}%</span></span>
    </div>
    <div class="kpi-card bad">
      <span class="label">ועדת רבנים / לבירור</span>
      <span class="value">${committee.toLocaleString('he-IL')}</span>
    </div>
  `;
}

// פלטת צבעים לגרפים
const DASH_COLORS = [
  '#0284c7', '#16a34a', '#d97706', '#dc2626', '#9333ea', '#0891b2',
  '#65a30d', '#c2410c', '#be185d', '#4f46e5', '#7c2d12', '#0369a1',
  '#059669', '#b45309', '#991b1b', '#6b21a8', '#155e75', '#3f6212',
  '#9a3412', '#9d174d', '#3730a3', '#44403c', '#075985', '#047857',
  '#92400e', '#7f1d1d', '#581c87', '#164e63', '#365314', '#7c2d12',
];
const SECTOR_COLORS = {
  'חסידי': '#9333ea',
  'ליטאי': '#0284c7',
  'ספרדי': '#d97706',
  'ירושלמי': '#16a34a',
  'ח. עצמאי': '#0891b2',
  'ח.עצמאי_משמרת_מאיר': '#0891b2',
  'חפץ חיים': '#be185d',

  'אחר': '#64748b',
};
function sectorColor(s) { return SECTOR_COLORS[s] || '#94a3b8'; }

const AFFIL_3 = ['חסידי', 'ליטאי', 'ספרדי'];

  'חפץ_חיים': 'חפץ חיים',
};

// רישום הפלאגין של תוויות
if (window.ChartDataLabels) Chart.register(window.ChartDataLabels);

// פלאגין מותאם — מצייר קווים מהפלח לתווית
const calloutLinesPlugin = {
  id: 'calloutLines',
  afterDatasetDraw(chart, args) {
    if (chart.config.type !== 'doughnut' && chart.config.type !== 'pie') return;
    const { ctx } = chart;
    const dataset = chart.data.datasets[args.index];
    const meta = chart.getDatasetMeta(args.index);
    const total = dataset.data.reduce((a, b) => a + b, 0);
    if (!total) return;

    ctx.save();
    ctx.strokeStyle = '#94a3b8';
    ctx.lineWidth = 1;

    meta.data.forEach((arc, i) => {
      const value = dataset.data[i];
      if ((value / total) < 0.03) return;  // תואם לסף של התוויות
      const mid = (arc.startAngle + arc.endAngle) / 2;
      const outerR = arc.outerRadius;
      const cx = arc.x, cy = arc.y;
      const x1 = cx + Math.cos(mid) * outerR;
      const y1 = cy + Math.sin(mid) * outerR;
      const x2 = cx + Math.cos(mid) * (outerR + 8);
      const y2 = cy + Math.sin(mid) * (outerR + 8);
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    });
    ctx.restore();
  },
};

function renderPlacementChart() {
  const canvas = document.getElementById('chart_placements');
  if (DASH.chart) { DASH.chart.destroy(); DASH.chart = null; }

  const placed = DASH.data.filter(r => r.placement_seminar && !['עדיין לא שובץ','מקדמת',''].includes(r.placement_seminar));
  const total = placed.length;

  if (!DASH.sectorBreakdown) {
    // ===== עוגה: שיבוצים לפי סמינר =====
    const grouped = {};
    placed.forEach(r => { grouped[r.placement_seminar] = (grouped[r.placement_seminar] || 0) + 1; });
    const entries = Object.entries(grouped).sort((a, b) => b[1] - a[1]);
    const labels = entries.map(e => e[0]);
    const counts = entries.map(e => e[1]);
    const colors = labels.map((_, i) => DASH_COLORS[i % DASH_COLORS.length]);

    DASH.chart = new Chart(canvas, {
      type: 'doughnut',
      data: {
        labels,
        datasets: [{ data: counts, backgroundColor: colors, borderWidth: 2, borderColor: 'white' }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        layout: { padding: { top: 6, bottom: 45, left: 40, right: 40 } },
        plugins: {
          legend: {
            position: 'left',
            labels: { font: { family: 'Heebo', size: 11 }, boxWidth: 12, padding: 6 },
          },
          tooltip: {
            callbacks: {
              label: (ctx) => `${ctx.label}: ${ctx.parsed} (${Math.round(100 * ctx.parsed / total)}%)`,
            },
            bodyFont: { family: 'Heebo' }, titleFont: { family: 'Heebo' },
          },
          datalabels: {
            clip: false,
            // סף 3% אמיתי
            display: (ctx) => (ctx.dataset.data[ctx.dataIndex] / total) >= 0.03,
            anchor: 'end',
            align: 'end',
            offset: 10,
            color: '#1a3655',
            font: { family: 'Heebo', size: 10, weight: 600 },
            textAlign: 'center',
            formatter: (value, ctx) => `${ctx.chart.data.labels[ctx.dataIndex]}\n${value}`,
          },
        },
        onClick: (evt, els) => {
          if (els.length) {
            DASH.selectedSeminar = labels[els[0].index];
            renderDetailsPanel();
          }
        },
      },
      plugins: [calloutLinesPlugin],
    });
  } else {
    // ===== חלוקה למגזר — עמודות אופקיות מוערמות =====
    // כולל fallback "אחר" לסקטור ריק/אחר כדי לא להחמיץ סמינרים
    const AFFIL_CHART = ['חסידי', 'ליטאי', 'ספרדי', 'אחר'];
    const grouped = {};
    placed.forEach(r => {
      const sem = r.placement_seminar;
      const affil = AFFIL_3.includes(r.sector) ? r.sector : 'אחר';
      if (!grouped[sem]) grouped[sem] = {};
      grouped[sem][affil] = (grouped[sem][affil] || 0) + 1;
    });
    const seminarsSorted = Object.keys(grouped).sort((a, b) => {
      const sumA = Object.values(grouped[a]).reduce((x,y)=>x+y,0);
      const sumB = Object.values(grouped[b]).reduce((x,y)=>x+y,0);
      return sumB - sumA;
    });
    const datasets = AFFIL_CHART.map(aff => ({
      label: aff,
      backgroundColor: sectorColor(aff),
      data: seminarsSorted.map(sem => grouped[sem][aff] || 0),
    }));

    DASH.chart = new Chart(canvas, {
      type: 'bar',
      data: { labels: seminarsSorted, datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        indexAxis: 'y',
        interaction: { mode: 'index', axis: 'y' },  // ריחוף = כל השורה יחד
        scales: {
          x: { stacked: true, ticks: { font: { family: 'Heebo' } } },
          y: { stacked: true, ticks: { font: { family: 'Heebo', size: 11 }, autoSkip: false } },
        },
        plugins: {
          legend: { position: 'top', labels: { font: { family: 'Heebo' } } },
          tooltip: {
            callbacks: {
              label: (ctx) => {
                const total = ctx.chart.data.datasets.reduce((s, d) => s + (d.data[ctx.dataIndex] || 0), 0);
                const pct = total ? Math.round(100 * ctx.parsed.x / total) : 0;
                return `${ctx.dataset.label}: ${ctx.parsed.x} (${pct}%)`;
              },
            },
            bodyFont: { family: 'Heebo' }, titleFont: { family: 'Heebo' },
          },
          datalabels: {
            display: (ctx) => ctx.dataset.data[ctx.dataIndex] > 0,
            color: 'white',
            font: { family: 'Heebo', weight: 700, size: 11 },
            formatter: (value) => value || '',
          },
        },
        onClick: (evt, els) => {
          if (els.length) {
            DASH.selectedSeminar = seminarsSorted[els[0].index];
            renderDetailsPanel();
          }
        },
      },
    });
  }
}

function renderDetailsPanel() {
  const title = document.getElementById('details_title');
  const body = document.getElementById('details_body');
  const resetBtn = document.getElementById('btn_reset_details');

  const data = DASH.data;
  const sem = DASH.selectedSeminar;
  title.textContent = sem ? sem : 'סה"כ כל הסמינרים';
  resetBtn.style.display = sem ? '' : 'none';

  let metrics;
  if (!sem) {
    // סיכום כללי: כל הסמינרים יחד
    metrics = computeAggregateMetrics(data);
  } else {
    metrics = computeSeminarMetrics(data, sem);
  }

  // פורמט תצוגה
  const renderBars = (dict, total) => {
    const entries = Object.entries(dict).sort((a,b)=>b[1]-a[1]);
    if (!entries.length) return '<div style="font-size:12px; color:var(--muted);">אין נתונים</div>';
    return entries.map(([s, c]) => {
      const pct = total ? Math.round(100 * c / total) : 0;
      return `<div class="bar-row">
        <span class="b-label" style="color:${sectorColor(s)};" title="${s}">${displayName(s)}</span>
        <span class="b-track"><span class="b-fill" style="width:${pct}%; background:${sectorColor(s)};"></span></span>
        <span class="b-val">${c} · ${pct}%</span>
      </div>`;
    }).join('');
  };

  body.innerHTML = `
    <div class="item"><span>נרשמות</span><b>${metrics.registered.toLocaleString('he-IL')}</b></div>
    <div class="item"><span>בחרו בהעדפה 1</span><b>${metrics.pref1.toLocaleString('he-IL')}</b></div>
    <div class="item"><span>תשובה חיובי</span><b>${metrics.positive.toLocaleString('he-IL')}</b></div>
    <div class="item"><span>משובצות</span><b>${metrics.placed.toLocaleString('he-IL')}</b></div>
    <div class="item"><span>משיבוץ עיריה</span><b>${metrics.muni.toLocaleString('he-IL')}</b></div>
    <div class="item"><span>אחיות באותו מוסד</span><b>${metrics.sisters.toLocaleString('he-IL')}</b></div>

    <div class="splits-row">
      <div class="sector-split">
        <div class="title">חלוקה לקבוצות</div>
        ${renderBars(metrics.sectors, metrics.placed)}
      </div>
      <div class="sector-split" style="background:#fdf4ff;">
        <div class="title" style="color:#7c2d92;">חלוקה למגזר</div>
        ${renderBars(metrics.affiliations, metrics.placed)}
      </div>
    </div>
  `;
}

// סיכום כללי: כל הסמינרים
function computeAggregateMetrics(data) {
  const seminarCodes = new Set(DATA.seminars.map(s => s.institution_code).filter(Boolean));
  const registered = data.filter(r => (r._regs || []).length > 0).length;
  const pref1 = data.filter(r => r.pref_1).length;
  // חיובי — תלמידות שיש להן לפחות תשובה חיובית
  const positive = data.filter(r => (r._regs || []).some(x => x.response === 'חיובי')).length;
  const placed = data.filter(r => r.placement_seminar && !['עדיין לא שובץ','מקדמת',''].includes(r.placement_seminar)).length;
  const muni = data.filter(r => r.placement_status === 'שיבוץ עיריה').length;
  const sisters = data.filter(r => (r.siblings || []).some(s => s.institution_code && seminarCodes.has(s.institution_code))).length;
  // חלוקה לקבוצות של משובצות
  const sectors = {};
  const affiliations = {};
  data.filter(r => r.placement_seminar && !['עדיין לא שובץ','מקדמת',''].includes(r.placement_seminar)).forEach(r => {
    const s = r.sector_bucket || 'לא הוגדר';
    sectors[s] = (sectors[s] || 0) + 1;
    const a = AFFIL_3.includes(r.sector) ? r.sector : 'אחר';
    affiliations[a] = (affiliations[a] || 0) + 1;
  });
  return { registered, pref1, positive, placed, muni, sisters, sectors, affiliations };
}

// סיכום לסמינר ספציפי
function computeSeminarMetrics(data, seminarName) {
  const sem = DATA.seminars.find(s => s.name === seminarName);
  const semCode = sem ? sem.institution_code : null;
  const registered = data.filter(r => (r._regs || []).some(x => {
    const name = (DATA.seminars.find(ss => ss.id === x.seminar_id) || {}).name;
    return name === seminarName;
  })).length;
  const pref1 = data.filter(r => r.pref_1 === seminarName).length;
  const positive = data.filter(r => (r._regs || []).some(x => {
    const name = (DATA.seminars.find(ss => ss.id === x.seminar_id) || {}).name;
    return name === seminarName && x.response === 'חיובי';
  })).length;
  const placedList = data.filter(r => r.placement_seminar === seminarName);
  const placed = placedList.length;
  const muni = placedList.filter(r => r.placement_status === 'שיבוץ עיריה').length;
  const sisters = semCode
    ? data.filter(r => (r.siblings || []).some(s => s.institution_code === semCode)).length
    : 0;
  const sectors = {};
  const affiliations = {};
  placedList.forEach(r => {
    const s = r.sector_bucket || 'לא הוגדר';
    sectors[s] = (sectors[s] || 0) + 1;
    const a = AFFIL_3.includes(r.sector) ? r.sector : 'אחר';
    affiliations[a] = (affiliations[a] || 0) + 1;
  });
  return { registered, pref1, positive, placed, muni, sisters, sectors, affiliations };
}

    ] },
];

const LIST_EDIT_MODE = {}; // per table: boolean
const LIST_SORT = {};       // per table: { field: string, dir: 1 | -1 }

let _activeListTab = 0;

function toggleListSort(table, field) {
  const cur = LIST_SORT[table];
  if (cur && cur.field === field) {
    LIST_SORT[table] = { field, dir: cur.dir === 1 ? -1 : 1 };
  } else {
    LIST_SORT[table] = { field, dir: 1 };
  }
  renderManageLists();
}

async function openManageLists() {
  _activeListTab = 0;
  CURRENT_MODAL = null;
  await renderManageLists();
  document.getElementById('modal').classList.add('open');
}

function _getEnumByRef(ref) {
  if (ref === 'ENUM_INST_CAT') return ENUM_INST_CAT;
  if (ref === 'ENUM_SECTOR')   return ENUM_SECTOR;
  return [];
}

async function renderManageLists() {
  const tab = LIST_TABS[_activeListTab];
  const editing = !!LIST_EDIT_MODE[tab.table];

  // שליפה
  const sortField = tab.sortField || 'sort_order';
  const { data: itemsRaw, error } = await sb.from(tab.table).select('*').order(sortField);
  if (error) { toast('שגיאה: ' + error.message, 'warn'); return; }

  // סידור מקומי — מיון לפי כותרת שנלחצה (אם יש)
  let items = itemsRaw;
  const activeSort = LIST_SORT[tab.table];
  if (activeSort) {
    items = [...itemsRaw].sort((a, b) => {
      const va = a[activeSort.field], vb = b[activeSort.field];
      if (va == null && vb == null) return 0;
      if (va == null) return 1;
      if (vb == null) return -1;
      if (typeof va === 'number' && typeof vb === 'number') return (va - vb) * activeSort.dir;
      return String(va).localeCompare(String(vb), 'he') * activeSort.dir;
    });
  }

  const tabsHtml = LIST_TABS.map((t, i) =>
    `<button class="list-tab ${i === _activeListTab ? 'active' : ''}" onclick="setListTab(${i})">${t.label}</button>`
  ).join('');

  // כותרת טבלה דינמית לפי fields — עם מיון בלחיצה
  const hasOrderCol = !tab.isEntity;
  const headerCells = [];
  if (hasOrderCol) headerCells.push('<th style="width:80px">סדר</th>');
  tab.fields.forEach(f => {
    const isSorted = activeSort && activeSort.field === f.key;
    const arrow = isSorted ? (activeSort.dir === 1 ? ' ▲' : ' ▼') : '';
    headerCells.push(`<th style="cursor:pointer; user-select:none;" onclick="toggleListSort('${tab.table}','${f.key}')" title="לחץ למיון">${f.label}${arrow}</th>`);
  });
  if (!tab.isEntity) headerCells.push('<th style="width:100px">מצב</th>');
  headerCells.push('<th style="width:80px"></th>');  // מחיקה
  const tableHeader = '<tr>' + headerCells.join('') + '</tr>';

  // שורות
  const rowsHtml = items.map((item, idx) => {
    const cells = [];

    if (hasOrderCol) {
      cells.push(`<td class="order-cell">
        <button class="mini-btn" ${idx === 0 ? 'disabled' : ''} onclick="moveListItem('${tab.table}', ${item.id}, -1)">⬆</button>
        <button class="mini-btn" ${idx === items.length - 1 ? 'disabled' : ''} onclick="moveListItem('${tab.table}', ${item.id}, 1)">⬇</button>
      </td>`);
    }

    tab.fields.forEach(f => {
      const val = item[f.key];
      if (!editing) {
        cells.push(`<td class="val-cell">${val == null || val === '' ? '<span style="color:var(--muted)">—</span>' : val}</td>`);
      } else {
        if (f.type === 'enum') {
          const values = f.values ? f.values : _getEnumByRef(f.valuesRef);
          cells.push(`<td class="val-cell editing">
            <select onchange="saveListField('${tab.table}', ${item.id}, '${f.key}', this.value, '${_esc(val || '')}')">
              <option value=""></option>
              ${values.map(v => `<option value="${_esc(v)}" ${v === val ? 'selected' : ''}>${v}</option>`).join('')}
            </select>
          </td>`);
        } else {
          cells.push(`<td class="val-cell editing">
            <input type="text" value="${_esc(val || '')}"
              onblur="saveListField('${tab.table}', ${item.id}, '${f.key}', this.value, '${_esc(val || '')}')"
              onkeydown="if(event.key==='Enter')this.blur();if(event.key==='Escape'){this.value='${_esc(val || '')}';this.blur();}">
          </td>`);
        }
      }
    });

    if (!tab.isEntity) {
      cells.push(`<td style="text-align:center;">
        <button class="mini-btn" onclick="toggleListItemActive('${tab.table}', ${item.id}, ${item.is_active})">${item.is_active ? 'השבת' : 'הפעל'}</button>
      </td>`);
    }

    cells.push(`<td style="text-align:center;">
      <button class="mini-btn danger" onclick="deleteListRow('${tab.table}', ${item.id})" title="מחק">×</button>
    </td>`);

    const rowClass = (!tab.isEntity && !item.is_active) ? 'inactive' : '';
    return `<tr data-id="${item.id}" class="${rowClass}">${cells.join('')}</tr>`;
  }).join('');

  const addLabel = tab.isEntity
    ? (tab.table === 'seminars' ? '+ הוסף סמינר' : '+ הוסף מוסד')
    : '+ הוסף ערך';

  const sortBtn = !tab.isEntity
    ? `<button class="cancel-btn" onclick="sortListAlpha('${tab.table}')">מיין א-ב</button>`
    : '';

  const importBtn = `<button class="cancel-btn" onclick="triggerImportList('${tab.table}')">📥 ייבוא מאקסל</button>`;
  const exportBtn = `<button class="cancel-btn" onclick="exportListToExcel('${tab.table}')">📤 יצוא לאקסל</button>`;

  const editBtnClass = editing ? 'save-btn' : 'cancel-btn';
  const editBtnLabel = editing ? '✓ סיים עריכה' : '✎ מצב עריכה';

  document.getElementById('modal_body').innerHTML = `
    <div class="modal-header">
      <div style="flex:1">
        <h2>⚙ ניהול רשימות</h2>
        <div class="subtitle">הוספה, עריכה, סידור ומחיקה של ערכי הרשימות</div>
      </div>
      <button class="close" onclick="closeModal()" title="סגור">×</button>
    </div>
    <div class="modal-body">

// יצוא לאקסל מרשימות

async function exportListToExcel(table) {
  const tab = LIST_TABS.find(t => t.table === table);
  if (!tab) return;
  const { data, error } = await sb.from(table).select('*');
  if (error) { toast('שגיאה ביצוא: ' + error.message, 'warn'); return; }
  if (!data || !data.length) { toast('אין נתונים ליצוא', 'warn'); return; }

  // רק שדות התצוגה (לא id/timestamps — כדי שיצוא→יבוא יעבוד נקי)
  const cols = tab.fields.map(f => ({ key: f.key, label: f.label }));
  const rows = data.map(item => {
    const r = {};
    cols.forEach(c => { r[c.label] = item[c.key] == null ? '' : item[c.key]; });
    return r;
  });

  const headers = cols.map(c => c.label);
  const ws = XLSX.utils.json_to_sheet(rows, { header: headers });

  // RTL — גם ברמת sheet וגם ברמת workbook
  ws['!views'] = [{ RTL: true }];

  // רוחב עמודות מותאם לתוכן
  ws['!cols'] = cols.map((c) => {
    let maxLen = c.label.length;
    rows.forEach(r => {
      const v = String(r[c.label] ?? '');
      if (v.length > maxLen) maxLen = v.length;
    });
    // הוספת הפרש קטן ל־RTL + שפה עברית (כי התווים רחבים יותר)
    return { wch: Math.min(Math.max(maxLen + 4, 10), 60) };
  });

  const wb = XLSX.utils.book_new();
  // RTL ברמת ה־workbook (SheetJS זקוק לזה לפעמים)
  wb.Workbook = { Views: [{ RTL: true }] };

  XLSX.utils.book_append_sheet(wb, ws, tab.label.slice(0, 30));
  const ts = new Date().toISOString().slice(0, 10);
  // cellStyles כדי לוודא שה־!cols נשמרים בפלט
  XLSX.writeFile(wb, `${tab.label}_${ts}.xlsx`, { bookType: 'xlsx', cellStyles: true });
  toast(`יוצאו ${rows.length} פריטים ✓`);
}

function triggerImportList(table) {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.xlsx,.xls,.csv';
  inp.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const arrayBuf = await file.arrayBuffer();
      const wb = XLSX.read(arrayBuf, { type: 'array' });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
      // rows[0] = headers, rows[1..] = data. גם אם אין header — נזהה שורה ראשונה רלוונטית.
      openImportDialog(table, rows, file.name);
    } catch (err) {
      toast('שגיאה בקריאת הקובץ: ' + err.message, 'warn');
    }
  };
  inp.click();
}

  const previewHtml = previewRows.map((r, ri) => {

  document.getElementById('modal_body').innerHTML = `

      <div class="form-section">

          התאם כל עמודה בקובץ לשדה ברשימה. "דלג" = התעלם מהעמודה. אפשר לסמן את שורת הכותרות לדילוג.
        </div>
        <label style="display: flex; align-items: center; gap: 6px; margin-bottom: 8px;">

        </label>
        <table style="width:100%; font-size: 13px;" id="imp_preview">
          <thead><tr>${mappingRow}</tr></thead>
          <tbody>${previewHtml}</tbody>
        </table>
      </div>

      <div class="form-section">
        <h3>אופן ההוספה</h3>
        <div style="display: flex; gap: 10px; flex-direction: column;">
          <label><input type="radio" name="imp_mode" value="add" checked> <b>הוסף בלבד</b> — דלג על כפילויות (לפי ${!tab.isEntity ? 'ערך' : 'שם+סמל'})</label>
          <label><input type="radio" name="imp_mode" value="merge"> <b>הוסף ועדכן</b> — קיים יעודכן לפי הקובץ, חדש יתווסף</label>
          <label><input type="radio" name="imp_mode" value="replace"> <b>החלף הכל</b> — מחק את כל הקיים, הכנס את הקובץ בלבד ⚠️ (שימושי עם זהירות)</label>
        </div>
      </div>

      <div class="form-actions">
        <button class="cancel-btn" onclick="renderManageLists()">ביטול</button>

      const field = sel.value;
      if (field) mapping[col] = field;
    });

    if (Object.keys(mapping).length === 0) {
      toast('בחר לפחות עמודה אחת למיפוי', 'warn');

    const records = dataRows.map(row => {

      Object.entries(mapping).forEach(([col, field]) => {

        rec[field] = (v == null || v === '') ? null : String(v).trim();
      });

    }).filter(r => {

async function executeImport(table, records, mode) {
  const tab = LIST_TABS.find(t => t.table === table);
  let added = 0, updated = 0, skipped = 0, removed = 0;

  try {
    if (mode === 'replace') {
      if (!confirm(`⚠️ החלפה תמחק את כל הרשומות הקיימות (${tab.label}) ותציב רק את הקובץ.\nזה עלול לפגוע ברשומות הקיימות שמשתמשות בערכים.\n\nלהמשיך?`)) return;
      // מחק את הקיים
      const { data: existing } = await sb.from(table).select('id');
      if (existing) {
        const ids = existing.map(x => x.id);
        if (ids.length) {
          const { error } = await sb.from(table).delete().in('id', ids);
          if (error) throw error;
          removed = ids.length;
        }
      }
    }

    // שלוף את מה שקיים עכשיו (לבדיקת כפילויות)
    const { data: currentItems } = await sb.from(table).select('*');
    const keyOf = tab.isEntity
      ? (r) => `${r.name || ''}||${r.institution_code || ''}`
      : (r) => r.value || '';
    const existingMap = {};
    (currentItems || []).forEach(it => { existingMap[keyOf(it)] = it; });

    for (const rec of records) {
      const key = keyOf(rec);
      const existing = existingMap[key];
      if (existing) {
        if (mode === 'merge') {
          // עדכן רק שדות שבקובץ (לא למחוק שדות קיימים)
          const upd = {};
          Object.keys(rec).forEach(k => { if (rec[k] != null) upd[k] = rec[k]; });
          if (Object.keys(upd).length) {
            await sb.from(table).update(upd).eq('id', existing.id);
            updated++;
          }
        } else {
          skipped++;
        }
      } else {
        // הוסף חדש (עם sort_order אוטומטי לרשימות)
        const ins = { ...rec };
        if (!tab.isEntity && ins.sort_order == null) {
          ins.sort_order = (Object.keys(existingMap).length + added + 1) * 10;
        }
        if (SEASONED_TABLES.has(table)) ins.season_id = CURRENT_SEASON_ID;
        const { error } = await sb.from(table).insert(ins);
        if (error) {
          console.error(error);
          skipped++;
        } else {
          added++;
        }
      }
    }

    toast(`יובאו: +${added} נוסף · ${updated} עודכן · ${skipped} דולג${removed ? ' · ' + removed + ' נמחק' : ''}`);
    await loadLookupLists();
    await renderManageLists();
    await reloadData();
  } catch (e) {
    console.error(e);
    toast('שגיאה בייבוא: ' + (e.message || e), 'warn');
  }
}

function setListTab(i) { _activeListTab = i; renderManageLists(); }

async function addListItem(table) {
  const isEntity = LIST_TABS.find(t => t.table === table).isEntity;
  if (isEntity) {
    const name = prompt('שם המוסד/סמינר:');
    if (!name) return;
    const code = prompt('סמל מוסד (אופציונלי):') || null;
    const payload = { name, institution_code: code };
    if (SEASONED_TABLES.has(table)) payload.season_id = CURRENT_SEASON_ID;
    const { error } = await sb.from(table).insert(payload);
    if (error) { toast('שגיאה: ' + error.message, 'warn'); return; }
  } else {
    const value = prompt('ערך חדש:');
    if (!value) return;
    // מציאת ה־sort_order הגבוה ביותר + 10
    const { data } = await sb.from(table).select('sort_order').order('sort_order', { ascending: false }).limit(1);
    const nextOrder = data && data[0] ? (data[0].sort_order || 0) + 10 : 10;
    const { error } = await sb.from(table).insert({ value, sort_order: nextOrder });
    if (error) { toast('שגיאה: ' + error.message, 'warn'); return; }
  }
  await loadLookupLists();
  await renderManageLists();
  toast('נוסף ✓');
}

// שמירת שדה בודד מעריכה inline ברשימה
async function saveListField(table, id, field, newValue, oldValue) {
  newValue = (newValue == null) ? '' : String(newValue);
  oldValue = (oldValue == null) ? '' : String(oldValue);
  if (newValue === oldValue) return;

  const tabDef = LIST_TABS.find(t => t.table === table);
  const isEntity = tabDef.isEntity;

  // בדיקת כפילות (רק אם זהו שדה עם ערך ייחודי — value ברשימות, או name+code בישויות)
  const newVal = newValue === '' ? null : newValue;
  if (!isEntity && field === 'value') {
    // בדיקת כפילות בטבלה הזו
    const { data: dup } = await sb.from(table).select('id').eq('value', newValue).neq('id', id);
    if (dup && dup.length) {
      const mergeConfirm = confirm(
        `ערך "${newValue}" כבר קיים ברשימה.\n\n` +
        `אם תאשר, המערכת תאחד — כל הרשומות שהשתמשו ב"${oldValue}" יועברו ל"${newValue}" ` +
        `והפריט הנוכחי יימחק.\n\nלאחד?`
      );
      if (!mergeConfirm) { renderManageLists(); return; }
      // Merge: move references, delete item
      if (tabDef.usedIn && oldValue) {
        await sb.from(tabDef.usedIn.table).update({ [tabDef.usedIn.field]: newValue }).eq(tabDef.usedIn.field, oldValue);
      }
      await sb.from(table).delete().eq('id', id);
      toast(`אוחד עם "${newValue}" ✓`);
      await loadLookupLists();
      await renderManageLists();
      await reloadData();
      return;
    }
  }

  // CASCADE: ערך שינוי ברשימה → עדכון הפניות בטבלה הראשית
  if (!isEntity && field === 'value' && tabDef.usedIn && oldValue) {
    const { count } = await sb.from(tabDef.usedIn.table).select('*', { count: 'exact', head: true })
      .eq(tabDef.usedIn.field, oldValue);
    if (count) {
      const { error: upErr } = await sb.from(tabDef.usedIn.table).update({ [tabDef.usedIn.field]: newValue })
        .eq(tabDef.usedIn.field, oldValue);
      if (upErr) { toast('שגיאה בעדכון הפניות: ' + upErr.message, 'warn'); return; }
    }
  }

  // CASCADE: שם מוסד השתנה ללא שינוי קוד → עדכון siblings.institution_name
  if (table === 'source_schools' && field === 'name') {
    const { data: item } = await sb.from(table).select('institution_code').eq('id', id).single();
    if (item && item.institution_code) {
      await sb.from('siblings').update({ institution_name: newValue }).eq('institution_code', item.institution_code);
    }
  }

  // עדכון הפריט עצמו
  const { error } = await sb.from(table).update({ [field]: newVal }).eq('id', id);
  if (error) { toast('שגיאה: ' + error.message, 'warn'); return; }

  toast('עודכן ✓');
  await loadLookupLists();
  await renderManageLists();
  await reloadData();
}

async function deleteListRow(table, id) {
  const tabDef = LIST_TABS.find(t => t.table === table);
  if (tabDef.isEntity) {
    // בדיקת שימוש
    const fkField = table === 'seminars' ? 'seminar_id' : 'source_school_id';
    const fkTables = table === 'seminars' ? ['registrations', 'placements'] : ['girls'];
    let totalUse = 0;
    for (const ft of fkTables) {
      const { count } = await sb.from(ft).select('*', { count: 'exact', head: true }).eq(fkField, id);
      totalUse += count || 0;
    }
    if (totalUse > 0) {
      alert(`לא ניתן למחוק — הפריט בשימוש ב־${totalUse} רשומות.\nניתן לשנות שם/קוד במקום.`);
      return;
    }
    if (!confirm('למחוק את הפריט לצמיתות?')) return;
    const { error } = await sb.from(table).delete().eq('id', id);
    if (error) { toast('שגיאה: ' + error.message, 'warn'); return; }
    toast('נמחק');
    await loadLookupLists();
    await renderManageLists();
    return;
  }

  // רשימת ערכים — מחיקה עם אפשרות העברה
  const { data: item } = await sb.from(table).select('value').eq('id', id).single();
  if (!item) return;
  await deleteListItemWithMove(table, id, tabDef.usedIn, item.value);
}

async function editListItem(table, id) {
  const tabDef = LIST_TABS.find(t => t.table === table);
  const isEntity = tabDef.isEntity;

  if (isEntity) {
    const { data: item } = await sb.from(table).select('*').eq('id', id).single();
    if (!item) return;
    const oldName = item.name;
    const oldCode = item.institution_code || '';
    const newName = prompt('שם:', oldName);
    if (newName == null) return;
    const newCode = prompt('סמל מוסד:', oldCode);
    if (newCode == null) return;

    // בדיקת כפילות לפי שם (לא כולל עצמה)
    if (newName !== oldName) {
      const { data: dup } = await sb.from(table).select('id,name').eq('name', newName).neq('id', id);
      if (dup && dup.length) {
        if (!confirm(`שם זה כבר קיים (${dup.length} רשומות אחרות). לאשר בכל זאת?`)) return;
      }
    }

    const { error } = await sb.from(table).update({
      name: newName, institution_code: newCode || null
    }).eq('id', id);
    if (error) { toast('שגיאה: ' + error.message, 'warn'); return; }

    // CASCADE: אם שם המוסד השתנה בלי שינוי קוד — עדכן גם ב־siblings
    if (table === 'source_schools' && newName !== oldName && (newCode || null) === (oldCode || null)) {
      if (newCode) {
        const { count } = await sb.from('siblings').select('*', { count: 'exact', head: true })
          .eq('institution_code', newCode);
        if (count) {
          await sb.from('siblings').update({ institution_name: newName }).eq('institution_code', newCode);
          toast(`עודכן שם המוסד + ${count} רשומות אחים ✓`);
        } else {
          toast('עודכן ✓');
        }
      } else {
        toast('עודכן ✓');
      }
    } else {
      toast('עודכן ✓');
    }
    await loadLookupLists();
    await renderManageLists();
    await reloadData();
    return;
  }

  // רשימות ערכים (קבוצות/סטטוסים/תשובות/שיוך)
  const { data: item } = await sb.from(table).select('*').eq('id', id).single();
  if (!item) return;
  const oldValue = item.value;
  const newValue = prompt('ערך:', oldValue);
  if (newValue == null || newValue === oldValue) return;

  // בדיקת כפילות
  const { data: dup } = await sb.from(table).select('id').eq('value', newValue).neq('id', id);
  let merge = false;
  if (dup && dup.length) {
    const choice = confirm(
      `ערך "${newValue}" כבר קיים ברשימה.\n\n` +
      `אם תאשר, המערכת תאחד — כל הרשומות שהשתמשו ב"${oldValue}" יועברו ל"${newValue}" ` +
      `והפריט הנוכחי יימחק.\n\nלאחד?`
    );
    if (!choice) return;
    merge = true;
  }

  // CASCADE: עדכן את הרשומות בטבלה הראשית
  const usedIn = tabDef.usedIn;
  if (usedIn) {
    const { count } = await sb.from(usedIn.table).select('*', { count: 'exact', head: true })
      .eq(usedIn.field, oldValue);
    if (count) {
      const { error: upErr } = await sb.from(usedIn.table).update({ [usedIn.field]: newValue })
        .eq(usedIn.field, oldValue);
      if (upErr) { toast('שגיאה בעדכון רשומות: ' + upErr.message, 'warn'); return; }
    }
  }

  if (merge) {
    // מחק את הפריט הנוכחי (הרשומות כבר הועברו ל־newValue הקיים)
    await sb.from(table).delete().eq('id', id);
    toast(`אוחד עם "${newValue}" ✓`);
  } else {
    const { error } = await sb.from(table).update({ value: newValue }).eq('id', id);
    if (error) { toast('שגיאה: ' + error.message, 'warn'); return; }
    toast('עודכן ✓');
  }

  await loadLookupLists();
  await renderManageLists();
  await reloadData();
}

async function toggleListItemActive(table, id, wasActive) {

  if (error) { toast('שגיאה: ' + error.message, 'warn'); return; }
  await loadLookupLists();

  toast(wasActive ? 'הושבת' : 'הופעל');
}

async function moveListItem(table, id, direction) {
  // מביא את הפריט ואת הפריט השכן, ומחליף sort_order
  const { data: all } = await sb.from(table).select('id, sort_order').order('sort_order');
  const idx = all.findIndex(x => x.id === id);
  const neighbor = all[idx + direction];
  if (!neighbor) return;
  const tmp = all[idx].sort_order;
  await sb.from(table).update({ sort_order: neighbor.sort_order }).eq('id', id);
  await sb.from(table).update({ sort_order: tmp }).eq('id', neighbor.id);
  await loadLookupLists();
  await renderManageLists();
}

async function sortListAlpha(table) {
  if (!confirm('למיין את הרשימה לפי א-ב? הסדר הידני יאבד.')) return;
  const { data: items } = await sb.from(table).select('id, value').order('value');
  for (let i = 0; i < items.length; i++) {
    await sb.from(table).update({ sort_order: (i + 1) * 10 }).eq('id', items[i].id);
  }
  await loadLookupLists();
  await renderManageLists();
  toast('מוין א-ב ✓');
}

async function deleteListItem(table, id) {
  // עבור sem/school — בדוק אם יש הפניות ל־id הזה ואסור למחוק
  const isEntity = LIST_TABS.find(t => t.table === table).isEntity;
  if (isEntity) {
    const fkField = table === 'seminars' ? 'seminar_id' : 'source_school_id';
    const fkTable = table === 'seminars' ? ['registrations', 'placements'] : ['girls'];
    let totalUse = 0;
    for (const ft of fkTable) {
      const { count } = await sb.from(ft).select('*', { count: 'exact', head: true }).eq(fkField, id);
      totalUse += count || 0;
    }
    if (totalUse > 0) {
      alert(`לא ניתן למחוק — הפריט בשימוש ב־${totalUse} רשומות.\nהשתמש ב"השבת" כדי להסתיר מההצגה.`);
      return;
    }
    if (!confirm('למחוק את הפריט?')) return;
    const { error } = await sb.from(table).delete().eq('id', id);
    if (error) { toast('שגיאה: ' + error.message, 'warn'); return; }
    toast('נמחק');
    await loadLookupLists();
    await renderManageLists();
  }
}

async function deleteListItemWithMove(table, id, usedIn, value) {
  // ספור שימוש
  const { count } = await sb.from(usedIn.table).select('*', { count: 'exact', head: true })
    .eq(usedIn.field, value);
  if (!count) {
    if (!confirm(`למחוק "${value}"? לא בשימוש באף רשומה.`)) return;
    const { error } = await sb.from(table).delete().eq('id', id);
    if (error) { toast('שגיאה: ' + error.message, 'warn'); return; }
    toast('נמחק');
    await loadLookupLists();
    await renderManageLists();
    return;
  }

  // יש שימוש — מציג מודל בחירה
  const { data: others } = await sb.from(table).select('id, value').neq('id', id).eq('is_active', true);
  const otherOptions = (others || []).map(o => `<option value="${o.value}">${o.value}</option>`).join('');
  const choice = prompt(
    `"${value}" בשימוש ב־${count} רשומות.\n\n` +
    `אפשרויות:\n` +
    `  1. "השבת" (פשוט השבת בלחיצה על "השבת" למעלה)\n` +
    `  2. "העבר הכל לערך אחר ואז מחק" — הקלד את שם הערך החלופי מתוך:\n` +
    (others || []).map(o => `       ${o.value}`).join('\n') +
    `\n\nהקלד את הערך החלופי, או השאר ריק לביטול:`
  );
  if (!choice) return;
  const target = (others || []).find(o => o.value === choice);
  if (!target) {
    alert('ערך לא קיים. פעולה בוטלה.');
    return;
  }
  // העבר את כל הרשומות לערך החלופי
  const { error: upErr } = await sb.from(usedIn.table).update({ [usedIn.field]: choice }).eq(usedIn.field, value);
  if (upErr) { toast('שגיאה: ' + upErr.message, 'warn'); return; }
  // ואז מחק את הערך המקורי
  const { error: delErr } = await sb.from(table).delete().eq('id', id);
  if (delErr) { toast('שגיאה במחיקה: ' + delErr.message, 'warn'); return; }
  toast(`הועברו ${count} רשומות ל"${choice}" והערך נמחק ✓`);
  await loadLookupLists();
  await renderManageLists();
  await reloadData();
}

function triggerRestore() {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.json';
  inp.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const backup = JSON.parse(text);
      if (!backup.backup_version || !backup.tables) {
        alert('הקובץ לא תקין — חסרים שדות backup_version או tables');
        return;
      }
      const totalRecords = Object.values(backup.tables)
        .filter(t => Array.isArray(t))
        .reduce((s, t) => s + t.length, 0);
      const date = (backup.created_at || '').substring(0, 16).replace('T', ' ');
      const by = backup.created_by || '?';

      if (!confirm(
        `📁 גיבוי מתאריך ${date}\n` +
        `👤 נוצר על ידי ${by}\n` +
        `📊 ${totalRecords.toLocaleString('he-IL')} רשומות\n\n` +
        `⚠️ שחזור ימחק את כל הנתונים הנוכחיים (תלמידות, רישומים, שיבוצים, אחים, סמינרים, מוסדות, רשימות) ויחליף אותם בגיבוי.\n\n` +
        `המשתמשים וההיסטוריה לא יושפעו.\n\n` +
        `להמשיך?`
      )) return;
      if (!confirm('⚠️ אזהרה אחרונה — אין אפשרות לבטל אחרי זה!\n\nבטוח לשחזר?')) return;

      await doRestore(backup);
    } catch (err) {
      console.error(err);
      alert('שגיאה בקריאת הקובץ: ' + err.message);
    }
  };
  inp.click();
}

async function doRestore(backup) {
  toast('מוחק נתונים נוכחיים...');
  const deleteOrder = [
    'siblings', 'placements', 'registrations', 'girls',
    'source_schools', 'seminars',
    'list_categories', 'list_statuses', 'list_responses',
    'list_affiliations', 'list_institution_categories',
    // seasons נשמרת — לא נוגעים
  ];
  const insertOrder = [
    'list_categories', 'list_statuses', 'list_responses',
    'list_affiliations', 'list_institution_categories',
    'source_schools', 'seminars',
    'girls', 'registrations', 'placements', 'siblings',
  ];

  try {
    for (const t of deleteOrder) {
      const { error } = await sb.from(t).delete().gte('id', 0);
      if (error) throw new Error(`מחיקת ${t}: ${error.message}`);
    }

    toast('טוען מהגיבוי...');
    let added = 0;
    for (const t of insertOrder) {
      const rows = backup.tables[t];
      if (!Array.isArray(rows) || rows.length === 0) continue;
      // תאימות לגיבויים ישנים — רשומות בלי season_id יקבלו את העונה הנוכחית
      if (SEASONED_TABLES.has(t) && CURRENT_SEASON_ID) {
        rows.forEach(r => { if (r.season_id == null) r.season_id = CURRENT_SEASON_ID; });
      }
      const chunkSize = 500;
      for (let i = 0; i < rows.length; i += chunkSize) {
        const chunk = rows.slice(i, i + chunkSize);
        const { error } = await sb.from(t).insert(chunk);
        if (error) throw new Error(`הוספת ${t}: ${error.message}`);
        added += chunk.length;
      }
    }

    toast('מאפס מזהים אוטומטיים...');
    await sb.rpc('reset_all_sequences');

    toast(`✓ שחזור הושלם: ${added.toLocaleString('he-IL')} רשומות. המסך יתרענן...`);
    setTimeout(() => location.reload(), 2000);
  } catch (e) {
    console.error(e);
    alert('❌ שגיאה בשחזור:\n' + e.message + '\n\nחלק מהנתונים אולי נמחקו. ייתכן שתצטרך לשחזר ידנית מהגיבוי. פנה לתמיכה אם נחוץ.');
  }
}

async function backupAllData() {
  if (!confirm('להוריד גיבוי מלא של כל הנתונים?\n\nהקובץ יכלול את כל הטבלאות כ־JSON, ניתן לשחזור עתידי. ניתן לשמור את הקובץ ב־Google Drive, Dropbox או כל מקום בטוח.')) return;

  toast('אוסף נתונים... זה לוקח כמה שניות');
  const tables = [
    'seasons',
    'girls', 'registrations', 'placements', 'siblings',
    'seminars', 'source_schools',
    'list_categories', 'list_statuses', 'list_responses',
    'list_affiliations', 'list_institution_categories',
    'user_profiles', 'audit_log',
  ];

  const backup = {
    backup_version: 1,
    app: 'seminar-registration',
    created_at: new Date().toISOString(),
    created_by: CURRENT_USER.email,
    tables: {},
  };

  let totalRows = 0;
  for (const t of tables) {
    try {
      let all = [];
      let from = 0;
      const pageSize = 1000;
      while (true) {
        const { data, error } = await sb.from(t).select('*').range(from, from + pageSize - 1);
        if (error) throw error;
        if (!data || !data.length) break;
        all = all.concat(data);
        if (data.length < pageSize) break;
        from += pageSize;
      }
      backup.tables[t] = all;
      totalRows += all.length;
    } catch (e) {
      console.error(`Backup ${t}:`, e);
      backup.tables[t] = { error: e.message };
    }
  }

  const json = JSON.stringify(backup, null, 2);
  const sizeMB = (json.length / 1024 / 1024).toFixed(2);

  const blob = new Blob([json], { type: 'application/json;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const now = new Date();
  const stamp = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}-${String(now.getMinutes()).padStart(2,'0')}`;
  a.download = `seminar-backup-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  toast(`✓ גיבוי הורד: ${totalRows.toLocaleString('he-IL')} רשומות, ${sizeMB}MB`);
}

async function approveRequest(reqId) {
  const role = document.getElementById(`role_${reqId}`).value;
  if (!confirm(`לאשר את הבקשה ולצור משתמש עם תפקיד: ${ASSIGNABLE_ROLES[role]}?`)) return;
  const { error } = await sb.rpc('approve_access_request', { req_id: reqId, assigned_role: role });
  if (error) { toast('שגיאה: ' + error.message, 'warn'); return; }
  toast('הבקשה אושרה ✓');
  openManageUsers();  // רענון
  refreshPendingBadge();
}

async function rejectRequest(reqId) {
  if (!confirm('לדחות את הבקשה?')) return;
  const { error } = await sb.rpc('reject_access_request', { req_id: reqId });
  if (error) { toast('שגיאה: ' + error.message, 'warn'); return; }
  toast('הבקשה נדחתה');
  openManageUsers();
  refreshPendingBadge();
}

async function refreshPendingBadge() {
  if (!isAdmin()) return;
  const { count } = await sb.from('access_requests').select('*', { count: 'exact', head: true }).eq('status', 'pending');
  const btn = document.getElementById('btn_manage_users');
  if (!btn) return;
  const existing = btn.querySelector('.pending-badge');
  if (existing) existing.remove();
  if (count && count > 0) {
    const badge = document.createElement('span');
    badge.className = 'pending-badge';
    badge.textContent = count;
    badge.style.cssText = 'background:#dc2626; color:white; font-size:11px; font-weight:700; border-radius:10px; padding:1px 6px; margin-right:4px;';
    btn.appendChild(badge);
  }
}

async function addNewUser() {
  const email = document.getElementById('new_user_email').value.trim().toLowerCase();
  const role = document.getElementById('new_user_role').value;
  if (!email || !email.includes('@')) { toast('מייל לא תקין', 'warn'); return; }
  const { error } = await sb.from('user_profiles').insert({ email, role, is_active: true });
  if (error) { toast('שגיאה: ' + error.message, 'warn'); return; }
  toast(`${email} נוסף כ־${ROLE_LABELS[role]} ✓`);
  openManageUsers();
}

async function updateUserRole(email, newRole) {
  const { error } = await sb.from('user_profiles').update({ role: newRole }).eq('email', email);
  if (error) { toast('שגיאה: ' + error.message, 'warn'); return; }
  toast(`תפקיד עודכן ל־${ROLE_LABELS[newRole]} ✓`);
}

async function toggleUserActive(email, currentlyActive) {
  const { error } = await sb.from('user_profiles').update({ is_active: !currentlyActive }).eq('email', email);
  if (error) { toast('שגיאה: ' + error.message, 'warn'); return; }
  toast(currentlyActive ? 'המשתמש הושבת' : 'המשתמש הופעל');
  openManageUsers();
}

async function deleteUser(email) {
  if (!confirm(`למחוק את ${email} מהמערכת?\n(הוא לא יוכל להתחבר יותר)`)) return;
  const { error } = await sb.from('user_profiles').delete().eq('email', email);
  if (error) { toast('שגיאה: ' + error.message, 'warn'); return; }
  toast('המשתמש נמחק');
  openManageUsers();
}

function openPrintOptions(btn) {
  // אם בדשבורד — רק מדפיסים, בלי אפשרויות
  if (document.body.classList.contains('view-dashboard')) {
    window.print();
    return;
  }
  const existing = document.getElementById('print_options_pop');
  if (existing) { existing.remove(); return; }

  const pop = document.createElement('div');
  pop.id = 'print_options_pop';
  pop.className = 'popover open';
  pop.style.position = 'fixed';
  pop.style.minWidth = '240px';
  pop.innerHTML = `
    <button class="col-picker-close" title="סגור">×</button>
    <div style="font-weight:700; color:var(--deep); margin-bottom:10px; font-size:14px; padding-right:28px;">איך להדפיס?</div>
    <button class="apply-big" data-mode="visible" style="margin-top:0; margin-bottom:8px;">🖨 הדפס עמודות בתצוגה</button>
    <button class="apply-big" data-mode="all" style="margin-top:0; margin-bottom:8px; background:var(--deep) !important;">🖨 הדפס את כל העמודות</button>
    <button class="apply-big" data-mode="choose" style="margin-top:0; background:#d97706 !important;">✎ בחר עמודות להדפסה</button>
  `;
  document.body.appendChild(pop);
  const r = btn.getBoundingClientRect();
  pop.style.top = (r.bottom + 10) + 'px';
  // ודא שהפופ־אפ בתוך המסך
  const popWidth = 260;
  const rightOffset = window.innerWidth - r.right;
  if (rightOffset + popWidth > window.innerWidth - 10) {
    // פופ-אפ יגלוש שמאלה → הצמד לקצה שמאל של הכפתור
    pop.style.left = Math.max(10, r.left) + 'px';
    pop.style.right = 'auto';
  } else {
    pop.style.right = rightOffset + 'px';
    pop.style.left = 'auto';
  }

  pop.querySelector('.col-picker-close').onclick = () => pop.remove();
  pop.querySelectorAll('[data-mode]').forEach(b => {
    b.onclick = () => {
      const mode = b.dataset.mode;
      pop.remove();
      doPrint(mode);
    };
  });
}

function doPrint(mode) {
  const saved = COLS.map(c => c.visible);

  const run = () => {
    renderHeader();
    applyFilters();
    setTimeout(() => {
      window.print();
      // החזרת המצב הקודם
      COLS.forEach((c, i) => c.visible = saved[i]);
      renderHeader();
      applyFilters();
    }, 100);
  };

  if (mode === 'all') {
    COLS.forEach(c => c.visible = true);
    run();
  } else if (mode === 'visible') {
    run();
  } else if (mode === 'choose') {
    openChoosePrintColumns(saved);
  }
}

function openChoosePrintColumns(savedVisibility) {
  const existing = document.getElementById('choose_print_pop');
  if (existing) existing.remove();

  // טען את בחירת ההדפסה האחרונה (אם קיימת)
  let lastPrintSelection;
  try { lastPrintSelection = JSON.parse(localStorage.getItem('print_col_selection') || 'null'); }
  catch { lastPrintSelection = null; }

  const isChecked = (key) => {
    if (lastPrintSelection && Array.isArray(lastPrintSelection)) {
      return lastPrintSelection.includes(key);
    }
    // ברירת מחדל: העמודות המוצגות כרגע
    return COLS.find(c => c.key === key)?.visible;
  };

  const pop = document.createElement('div');
  pop.id = 'choose_print_pop';
  pop.className = 'popover open';
  pop.style.position = 'fixed';
  pop.style.top = '50%';
  pop.style.left = '50%';
  pop.style.transform = 'translate(-50%, -50%)';
  pop.style.minWidth = '320px';
  pop.style.maxHeight = '80vh';
  pop.style.zIndex = '500';

  const groups = [...new Set(COLS.map(c => c.group))];
  pop.innerHTML = `
    <button class="col-picker-close" title="סגור">×</button>
    <div style="font-weight:700; color:var(--deep); margin-bottom:10px; font-size:14px; padding-right:28px;">בחר עמודות להדפסה</div>
    <div style="font-size:11px; color:var(--muted); margin-bottom:8px;">הבחירה תישמר כברירת מחדל לפעם הבאה</div>
    <div class="actions" style="margin-bottom:10px;">
      <button type="button" data-act="all">בחר הכל</button>
      <button type="button" data-act="none">נקה</button>
    </div>
    <div class="opts" style="max-height:50vh; overflow-y:auto;">
      ${groups.map(g => `
        <div class="group">${g}</div>
        ${COLS.filter(c => c.group === g).map((c) => {
          const idx = COLS.indexOf(c);
          return `<label><input type="checkbox" class="print-col" data-idx="${idx}" data-key="${c.key}" ${isChecked(c.key) ? 'checked' : ''}>${c.label}</label>`;
        }).join('')}
      `).join('')}
    </div>
    <button class="apply-big" data-act="print" style="margin-top:10px;">🖨 הדפס</button>
  `;

  // עם background scrim
  const scrim = document.createElement('div');
  scrim.id = 'choose_print_scrim';
  scrim.style.cssText = 'position:fixed; inset:0; background:rgba(0,0,0,0.3); z-index:499;';
  scrim.onclick = () => { pop.remove(); scrim.remove(); };
  document.body.appendChild(scrim);
  document.body.appendChild(pop);

  pop.querySelector('.col-picker-close').onclick = () => { pop.remove(); scrim.remove(); };
  pop.querySelector('[data-act="all"]').onclick = () => {
    pop.querySelectorAll('.print-col').forEach(cb => cb.checked = true);
  };
  pop.querySelector('[data-act="none"]').onclick = () => {
    pop.querySelectorAll('.print-col').forEach(cb => cb.checked = false);
  };
  pop.querySelector('[data-act="print"]').onclick = () => {
    // החל את הבחירה על COLS + שמור ב־localStorage לפעם הבאה
    const chosenKeys = [];
    pop.querySelectorAll('.print-col').forEach(cb => {
      const idx = parseInt(cb.dataset.idx);
      COLS[idx].visible = cb.checked;
      if (cb.checked) chosenKeys.push(cb.dataset.key);
    });
    localStorage.setItem('print_col_selection', JSON.stringify(chosenKeys));
    pop.remove(); scrim.remove();
    renderHeader();
    applyFilters();
    setTimeout(() => {
      window.print();
      // שחזור
      COLS.forEach((c, i) => c.visible = savedVisibility[i]);
      renderHeader();
      applyFilters();
    }, 100);
  };
}

// "דרוש טיפול" — מסנן לפי סטטוסים פרט ל־"שיבוץ בהסכמה"

function openProblemsPicker(btn, pop) {
  const problematicStatuses = ENUM_STATUS.filter(s => s !== 'שיבוץ בהסכמה');
  const saved = JSON.parse(localStorage.getItem('problem_prefs') || '{}');
  const selectedSet = new Set(saved.statuses || problematicStatuses);
  const includePlaced = saved.includePlaced !== undefined ? saved.includePlaced : false;

  pop.innerHTML = `
    <div class="actions" style="flex-wrap:wrap;">
      <button type="button" data-act="apply" class="apply-inline">✓ סנן</button>
      <button type="button" data-act="all">בחר הכל</button>
      <button type="button" data-act="none">נקה</button>
      <button type="button" class="close-x" data-act="cancel" title="ביטול">×</button>
    </div>
    <div style="font-weight:600; color:var(--deep); margin-bottom:6px; font-size:13px;">איזה סטטוסים לכלול?</div>
    <div class="opts" id="probs_opts">
      ${problematicStatuses.map(s => `
        <label><input type="checkbox" class="prob-stat" value="${s}" ${selectedSet.has(s) ? 'checked' : ''}>${s}</label>
      `).join('')}
    </div>
    <label style="display:flex; align-items:center; gap:6px; margin-top:10px; padding:6px 8px; background:#fff3bd; border-radius:5px; font-size:13px; font-weight:600;">
      <input type="checkbox" id="prob_include_placed" ${includePlaced ? 'checked' : ''}>
      לכלול גם בנות משובצות
    </label>
  `;

  const r = btn.getBoundingClientRect();
  const pr = btn.parentElement.getBoundingClientRect();
  pop.style.top = (r.bottom - pr.top + 4) + 'px';
  pop.style.left = (r.left - pr.left) + 'px';
  pop.style.minWidth = '260px';
  pop.classList.add('open');

  pop.querySelector('[data-act="all"]').addEventListener('click', () => {
    pop.querySelectorAll('.prob-stat').forEach(cb => cb.checked = true);
  });
  pop.querySelector('[data-act="none"]').addEventListener('click', () => {
    pop.querySelectorAll('.prob-stat').forEach(cb => cb.checked = false);
  });
  pop.querySelector('[data-act="apply"]').addEventListener('click', () => {
    const picked = [...pop.querySelectorAll('.prob-stat:checked')].map(cb => cb.value);
    const inclPlaced = pop.querySelector('#prob_include_placed').checked;
    localStorage.setItem('problem_prefs', JSON.stringify({ statuses: picked, includePlaced: inclPlaced }));
    applyProblemsFilter(picked, inclPlaced);
    pop.classList.remove('open');
  });
  pop.querySelector('[data-act="cancel"]').addEventListener('click', () => pop.classList.remove('open'));
}

function applyProblemsFilter(statuses, includePlaced) {
  // איפוס סינוני עמודות + סטטוס
  Object.values(FILTER_STATE).forEach(s => s.clear());
  Object.keys(COL_FILTERS).forEach(k => COL_FILTERS[k].clear());

  // סטטוסים הנבחרים
  if (!COL_FILTERS.placement_status) COL_FILTERS.placement_status = new Set();
  statuses.forEach(s => COL_FILTERS.placement_status.add(s));

  // לא נבחר "כלול משובצות" → גם לסנן placement_seminar לערכים לא משובצים
  if (!includePlaced) {
    if (!COL_FILTERS.placement_seminar) COL_FILTERS.placement_seminar = new Set();
    UNPLACED_VALUES.forEach(v => COL_FILTERS.placement_seminar.add(v));
  }

  document.querySelectorAll('.ms-wrap').forEach(w => w._updateBtn && w._updateBtn());
  renderHeader();
  applyFilters();

  const btn = document.getElementById('btn_problems');
  btn.classList.add('active-filter');
  toast(`הוחל סינון "דרוש טיפול" (${statuses.length} סטטוסים${includePlaced ? ', כולל משובצות' : ', רק ממתינות'})`);
}

// ===============================================
// "תצוגות שמורות" — localStorage
// ===============================================
function getSavedViews() {
  try { return JSON.parse(localStorage.getItem('saved_views') || '[]'); }
  catch { return []; }
}
function saveSavedViews(v) { localStorage.setItem('saved_views', JSON.stringify(v)); }

function getCurrentFilterState() {
  const out = {
    q: document.getElementById('q').value,
    filters: {},
    colFilters: {},
    sortKey, sortDir,
  };
  Object.entries(FILTER_STATE).forEach(([k, v]) => { out.filters[k] = [...v]; });
  Object.entries(COL_FILTERS).forEach(([k, v]) => { out.colFilters[k] = [...(v || [])]; });
  return out;
}

function applyFilterState(state) {
  Object.values(FILTER_STATE).forEach(s => s.clear());
  Object.keys(COL_FILTERS).forEach(k => COL_FILTERS[k].clear());
  document.getElementById('q').value = state.q || '';
  Object.entries(state.filters || {}).forEach(([k, arr]) => {
    if (FILTER_STATE[k]) arr.forEach(v => FILTER_STATE[k].add(v));
  });
  Object.entries(state.colFilters || {}).forEach(([k, arr]) => {
    if (!COL_FILTERS[k]) COL_FILTERS[k] = new Set();
    arr.forEach(v => COL_FILTERS[k].add(v));
  });
  if (state.sortKey) sortKey = state.sortKey;
  if (state.sortDir) sortDir = state.sortDir;
  document.querySelectorAll('.ms-wrap').forEach(w => w._updateBtn && w._updateBtn());
  renderHeader();
  applyFilters();
}

function openViewsPicker(btn, pop) {
  const views = getSavedViews();
  pop.innerHTML = `
    <div class="actions">
      <button type="button" class="close-x" data-act="cancel" title="סגור">×</button>
    </div>
    <button type="button" class="apply-big" data-act="save" style="margin-top:0; margin-bottom:10px;">💾 שמור תצוגה נוכחית</button>
    <div style="font-weight:600; color:var(--deep); margin:6px 0; font-size:13px;">תצוגות שמורות:</div>
    ${views.length === 0 ? '<div style="color:var(--muted); font-size:12px; padding:8px;">אין תצוגות שמורות עדיין</div>' :
      `<div class="opts">${views.map((v, i) => `
        <div style="display:flex; align-items:center; gap:4px; padding:4px 6px; border-radius:5px;" class="view-row" data-idx="${i}">
          <span style="flex:1; cursor:pointer; font-weight:500;" onclick="loadView(${i})">${v.name}</span>
          <button class="mini-btn danger" onclick="deleteView(${i})" title="מחק">×</button>
        </div>
      `).join('')}</div>`
    }
  `;

  // מיקום קבוע ב־viewport — מונע זליגה מהמסך
  const r = btn.getBoundingClientRect();
  pop.style.position = 'fixed';
  pop.style.top = (r.bottom + 4) + 'px';
  // מיקום לפי RTL: נצמד לקצה שמאל של הכפתור, אבל לא חורג ממסך
  const popWidth = 260;
  let leftPx = r.right - popWidth;
  if (leftPx < 10) leftPx = 10;
  pop.style.left = leftPx + 'px';
  pop.style.right = 'auto';
  pop.style.minWidth = popWidth + 'px';
  pop.classList.add('open');

  pop.querySelector('[data-act="save"]').addEventListener('click', () => {
    const name = prompt('שם התצוגה:');
    if (!name) return;
    const views = getSavedViews();
    views.push({ name, state: getCurrentFilterState(), created: Date.now() });
    saveSavedViews(views);
    openViewsPicker(btn, pop);  // רענון
    toast('נשמר ✓');
  });
  pop.querySelector('[data-act="cancel"]').addEventListener('click', () => pop.classList.remove('open'));
}

function loadView(idx) {
  const views = getSavedViews();
  if (!views[idx]) return;
  applyFilterState(views[idx].state);
  document.querySelectorAll('.popover.open').forEach(p => p.classList.remove('open'));
  toast(`נטענה תצוגה: ${views[idx].name}`);
}

function deleteView(idx) {
  const views = getSavedViews();
  if (!views[idx]) return;
  if (!confirm(`למחוק את התצוגה "${views[idx].name}"?`)) return;
  views.splice(idx, 1);
  saveSavedViews(views);
  openViewsPicker(document.getElementById('btn_hdr_views'), document.getElementById('hdr_views_pop'));
}
